/* ─── Deterministic PRNG ────────────────────────────────────────────── */
function hash(...args){
  const s = args.join('|');
  let h = 2166136261;
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}
const rng = (...a) => (hash(...a) % 100000) / 100000;

function seasonality(ym){
  const m = parseInt(ym.split('-')[1]);
  const y = parseInt(ym.split('-')[0]);
  const yg = y === 2026 ? 1.46 : y === 2025 ? 1.24 : 1.0;
  const s = [0.76,0.82,0.94,1.06,1.18,1.22,1.07,0.95,1.13,1.31,1.46,1.38];
  return s[m-1] * yg;
}

/* ─── Mock weights ──────────────────────────────────────────────────── */
const HONBU_W = { '글로벌영업본부':0.54, '이커머스본부':0.30, '국내영업본부':0.16 };
const TEAM_W_BY_HONBU = {
  '글로벌영업본부': { '글로벌영업1팀':0.45, '글로벌영업2팀':0.38, '글로벌영업3팀':0.17 },
  '이커머스본부':   { '이커머스1팀':0.42, '이커머스2팀':0.36, 'D2C팀':0.22 },
  '국내영업본부':   { '국내영업팀':0.48, '면세팀':0.32, 'H&B팀':0.20 },
};
const ST_W = { 'B2B':0.72, 'B2C':0.28 };
const LINE_W = { 'Centella':0.30, 'Madagascar':0.18, 'Tea Tree':0.13, 'Hyalu Cica':0.16, 'Squalane':0.09, 'Probio-cica':0.08, 'Vitamin C':0.06 };
const CONT_W = { 'Asia':0.46, 'Europe':0.22, 'North America':0.18, 'Oceania':0.06, 'Latin America':0.05, 'Middle East':0.03 };

const BASE_MONTHLY = 3_200_000_000;

function activeMonths(){
  const s = Math.max(0, Math.min(state.rangeStart, state.rangeEnd));
  const e = Math.min(ALL_MONTHS.length - 1, Math.max(state.rangeStart, state.rangeEnd));
  return ALL_MONTHS.slice(s, e + 1);
}

function applySalesFilter(amount){
  if (state.category === 'sales' && state.salesView !== 'all') {
    return amount * (ST_W[state.salesView] || 1);
  }
  return amount;
}

function applyDrillFilter(amount){
  const d = state.drill[state.category];
  if (state.category === 'org') {
    if (d[0]) amount *= (HONBU_W[d[0]] || 0.2);
    if (d[1]) amount *= (TEAM_W_BY_HONBU[d[0]]?.[d[1]] || 0.3);
  } else if (state.category === 'region') {
    if (d[0]) amount *= (CONT_W[d[0]] || 0.05);
    if (d[1]) amount *= 0.10 + rng(d[1]) * 0.10;
    if (d[2]) amount *= 0.10 + rng(d[2]) * 0.08;
  } else if (state.category === 'product') {
    if (d[0]) amount *= (LINE_W[d[0]] || 0.1);
    if (d[1]) {
      const cats = CATEGORIES_BY_LINE[d[0]] || ['토너','크림','세럼'];
      amount *= 1 / cats.length * (0.7 + rng(d[1]) * 0.6);
    }
    if (d[2]) amount *= 0.15 + rng(d[2]) * 0.20;
  }
  return amount;
}

function monthlyTotal(ym){
  let v = BASE_MONTHLY * seasonality(ym);
  v = applySalesFilter(v);
  v = applyDrillFilter(v);
  return Math.round(v);
}

function profitFactors(){
  let gm = 0.42; let sga = 0.21;
  if (state.category === 'sales' && state.salesView === 'B2C') { gm = 0.58; sga = 0.34; }
  if (state.category === 'product' && state.drill.product[0]) {
    if (state.drill.product[0] === 'Centella') gm += 0.04;
    if (state.drill.product[0] === 'Vitamin C') gm += 0.06;
  }
  return { gm, sga };
}

function metricsForSales(amount){
  const { gm, sga } = profitFactors();
  const cogs = Math.round(amount * (1 - gm));
  const gp = amount - cogs;
  const sgaExp = Math.round(amount * sga);
  const oi = gp - sgaExp;
  return { cogs, gp, sga: sgaExp, oi };
}

/* ─── Mock API ──────────────────────────────────────────────────────── */
const MockApi = {
  monthlyTrend(){
    const months = activeMonths();
    return months.map(ym => {
      const sales = monthlyTotal(ym);
      const m = metricsForSales(sales);
      return { Year_Month: ym, sales_amount: sales, cost_of_sales: m.cogs, gross_profit: m.gp, sga_expenses: m.sga, operating_income: m.oi };
    });
  },
  kpi(){
    const trend = this.monthlyTrend();
    const sum = k => trend.reduce((s, r) => s + r[k], 0);
    const sales = sum('sales_amount'), gp = sum('gross_profit'), oi = sum('operating_income');
    return {
      sales_amount: sales, cost_of_sales: sum('cost_of_sales'), gross_profit: gp,
      gross_margin: sales ? gp/sales*100 : 0,
      sga_expenses: sum('sga_expenses'), operating_income: oi,
      operating_margin: sales ? oi/sales*100 : 0,
      sales_quantity: Math.round(sales / 35000),
    };
  },
  // Breakdown of items at the current view dim, scoped to current drill filter.
  // Output: rows of {name, sales_amount, share, gross_margin, operating_margin, ...}
  breakdown(){
    const vl = state.viewLevel?.[state.category];
    const dl = state.drill[state.category].length;
    return this.breakdownAt(
      state.category,
      state.drill[state.category],
      (vl != null ? vl : dl),
    );
  },
  breakdownAt(category, drill, viewLevel){
    const months = activeMonths();
    // Compute total scoped to the (drill) filter
    const savedDrill = state.drill[category];
    state.drill[category] = drill;
    const totalNow = months.reduce((s, ym) => s + monthlyTotal(ym), 0);
    state.drill[category] = savedDrill;

    let items = [];
    if (category === 'org') {
      if (viewLevel === 0) {
        items = HONBUS.map(h => ({ name: h, _w: HONBU_W[h] }));
      } else {
        // viewLevel >= 1 → teams
        if (drill.length >= 1) {
          const teams = HONBU_TEAM_MAP[drill[0]] || [];
          items = teams.map(t => ({ name: t, _w: TEAM_W_BY_HONBU[drill[0]][t] || 0.3, parent: drill[0] }));
        } else {
          // all teams across all honbus
          items = [];
          HONBUS.forEach(h => {
            (HONBU_TEAM_MAP[h] || []).forEach(t => {
              items.push({ name: t, _w: (HONBU_W[h] || 0.2) * (TEAM_W_BY_HONBU[h]?.[t] || 0.3), parent: h });
            });
          });
        }
      }
    } else if (category === 'region') {
      if (viewLevel === 0) {
        items = CONTINENTS.map(c => ({ name: c, _w: CONT_W[c] || 0.04 }));
      } else if (viewLevel === 1) {
        let inCont = COUNTRIES;
        if (drill.length >= 1) inCont = COUNTRIES.filter(c => c.cont === drill[0]);
        const weights = inCont.map(c => ({ ...c, _w: 0.4 + rng(c.name) * 1.2 }));
        const totW = weights.reduce((s, x) => s + x._w, 0) || 1;
        items = weights.map(x => ({ name: x.name, flag: x.flag, _w: x._w / totW, parent: x.cont }));
      } else {
        // viewLevel === 2 → customers
        const all = CUSTOMERS.map(c => ({ name: c, _w: 0.4 + rng(c, drill.join('|')) * 1.2 }));
        const totW = all.reduce((s, x) => s + x._w, 0) || 1;
        items = all.map(x => ({ ...x, _w: x._w / totW })).sort((a, b) => b._w - a._w).slice(0, 15);
      }
    } else if (category === 'product') {
      if (viewLevel === 0) {
        items = LINES.map(l => ({ name: l, _w: LINE_W[l] || 0.1 }));
      } else if (viewLevel === 1) {
        let cats;
        if (drill.length >= 1) cats = CATEGORIES_BY_LINE[drill[0]] || ['토너','크림','세럼'];
        else cats = [...new Set(Object.values(CATEGORIES_BY_LINE).flat())];
        items = cats.map(c => ({ name: c, _w: 1/cats.length * (0.7 + rng(c, drill.join('|')) * 0.6), parent: drill[0] }));
      } else {
        // viewLevel === 2 → SKUs
        let skus = SKUS;
        if (drill.length >= 1) skus = skus.filter(s => s.line === drill[0]);
        if (drill.length >= 2) skus = skus.filter(s => s.cat === drill[1]);
        if (!skus.length) skus = SKUS;
        items = skus.map(s => ({ name: s.name, code: s.code, _w: 0.5 + rng(s.code) * 1.5 }));
      }
    } else if (category === 'sales') {
      const tos = state.salesView === 'all' ? SALES_TYPES : [state.salesView];
      items = tos.map(t => ({ name: t, _w: ST_W[t] / (state.salesView === 'all' ? 1 : ST_W[state.salesView]) }));
    }

    const totW = items.reduce((s, x) => s + x._w, 0) || 1;
    return items
      .map(it => {
        const share = it._w / totW;
        const sales = Math.round(totalNow * share);
        const m = metricsForSales(sales);
        const prevSales = sales * (0.85 + rng(it.name, 'prev') * 0.35);
        const delta = prevSales ? ((sales - prevSales) / prevSales) * 100 : 0;
        return {
          name: it.name, code: it.code, flag: it.flag, parent: it.parent,
          sales_amount: sales, share: share * 100,
          cost_of_sales: m.cogs, gross_profit: m.gp,
          gross_margin: sales ? m.gp / sales * 100 : 0,
          sga_expenses: m.sga, operating_income: m.oi,
          operating_margin: sales ? m.oi / sales * 100 : 0,
          delta,
        };
      })
      .sort((a, b) => b.sales_amount - a.sales_amount);
  },
  monthlyByCurrentDim(){
    // returns rows of {Year_Month, dim_value, sales_amount}
    const months = activeMonths();
    const rows = [];
    const breakdown = this.breakdown();
    months.forEach(ym => {
      const total = monthlyTotal(ym);
      breakdown.forEach(b => {
        rows.push({ Year_Month: ym, dim_value: b.name, sales_amount: Math.round(total * (b.share / 100)) });

  raw(page = 1, perPage = 100){

    months.forEach(ym => {

      if (rf.department) f = f.filter(r => r.Team === rf.department);
      if (rf.continent)  f = f.filter(r => r.Continent === rf.continent);
      if (rf.country)    f = f.filter(r => r.Country === rf.country);
      if (rf.line)       f = f.filter(r => r.Line === rf.line);
      if (rf.category)   f = f.filter(r => r.Category === rf.category);
      if (rf.salesType)  f = f.filter(r => r.Sales_Type === rf.salesType);
    } else {
      const d = state.drill[state.category];
      if (state.category === 'org') {
        if (d[0]) f = f.filter(r => r.Honbu === d[0]);
        if (d[1]) f = f.filter(r => r.Team === d[1]);
      } else if (state.category === 'region') {
        if (d[0]) f = f.filter(r => r.Continent === d[0]);
        if (d[1]) f = f.filter(r => r.Country === d[1]);
        if (d[2]) f = f.filter(r => r.Customer === d[2]);
      } else if (state.category === 'product') {
        if (d[0]) f = f.filter(r => r.Line === d[0]);
        if (d[1]) f = f.filter(r => r.Category === d[1]);
        if (d[2]) f = f.filter(r => r.Product_Name === d[2]);
      } else if (state.category === 'sales' && state.salesView !== 'all') {
        f = f.filter(r => r.Sales_Type === state.salesView);
      }
    }
    if (state.rawSearch) {
      const q = state.rawSearch.toLowerCase();
      f = f.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
    }
    f.sort((a, b) => b.Year_Month.localeCompare(a.Year_Month) || b.Sales_Amount - a.Sales_Amount);
    const total = f.length;
    const start = (page - 1) * perPage;
    return { total, page, per_page: perPage, rows: f.slice(start, start + perPage) };
  },
};

/* ─── Real API client (used when USE_MOCK=false) ────────────────────── */
const RealApi = {
  _dimFor(cat, vl){
    if(cat==='org') return vl===0?'Group':'Department';
    if(cat==='region') return vl===0?'Continent2':vl===1?'Country':'Customer';
    if(cat==='product') return vl===0?'Line':vl===1?'Category':null;
    if(cat==='sales') return 'Sales_Type';
    return null;
  },
  _nameKey(cat, vl){
    if(cat==='org') return vl===0?'Brand':vl===1?'Group':'Department';
    if(cat==='region') return vl===0?'Continent1':vl===1?'Continent2':vl===2?'Country':'Customer';
    if(cat==='product') return vl===0?'Line':vl===1?'Category':'Product_Name';
    if(cat==='sales') return 'Sales_Type';
    return 'name';
  },
  _endpoint(cat, vl){
    if(cat==='org') return vl===0?'/api/group':vl===1?'/api/org-group':vl===2?'/api/department':null;
    if(cat==='region') return vl===0?'/api/continent1':vl===1?'/api/continent':vl===2?'/api/country':'/api/customer';
    if(cat==='product') return vl===0?'/api/line':vl===1?'/api/category':'/api/product';

  },
  buildParams(salesView){
    const p = new URLSearchParams();
    const months = activeMonths();
    if(months.length && months.length < ALL_MONTHS.length) months.forEach(m => p.append('months',m));
    else if(months.length) months.forEach(m => p.append('months',m));
    // Compute and append prior period months for comparison
    const _active = activeMonths();
    if(_active.length > 0){
      const _startIdx = ALL_MONTHS.indexOf(_active[0]);
      if(_startIdx >= _active.length){
        const _priorMonths = ALL_MONTHS.slice(_startIdx - _active.length, _startIdx);
        _priorMonths.forEach(m => p.append('prior_months', m));
      }
    }
    const cat = state.category;
    if(cat==='org'){
      fsArr(cat,0).forEach(v=>p.append('brand',v));
      fsArr(cat,1).forEach(v=>p.append('group',v));
      fsArr(cat,2).forEach(v=>p.append('department',v));
    } else if(cat==='region'){
      fsArr(cat,0).forEach(v=>p.append('continent1',v));
      fsArr(cat,1).forEach(v=>p.append('continent',v));
      fsArr(cat,2).forEach(v=>p.append('country',v));
      fsArr(cat,3).forEach(v=>p.append('customer',v));
    } else if(cat==='product'){
      fsArr(cat,0).forEach(v=>p.append('line',v));
      fsArr(cat,1).forEach(v=>p.append('category',v));
      fsArr(cat,2).forEach(v=>p.append('product',v));
    }
    const sv = salesView !== undefined ? salesView : state.salesView;
    if(sv && sv !== 'all') p.set('sales_type', sv);
    return p.toString();
  },
  _normalize(rows, cat, vl){
    const nk = this._nameKey(cat, vl);
    const total = rows.reduce((s,r)=>s+(r.sales_amount||0),0)||1;
    return rows.map(r=>({
      name: r[nk] || r.name || '(없음)',
      code: r.Product_Code || null,
      flag: null,
      parent: null,
      sales_amount: r.sales_amount||0,
      cost_of_sales: r.cost_of_sales||0,
      gross_profit: r.gross_profit||0,
      gross_margin: r.gross_margin||0,
      sga_expenses: r.sga_expenses||0,
      operating_income: r.operating_income||0,
      operating_margin: r.operating_margin||0,

  async _fetchBreakdown(cat, drill, vl, basePStr){
    const p = new URLSearchParams(basePStr);

    if(cat==='org'){
      if(drill[0]) p.set('brand', drill[0]); else p.delete('brand');
      if(drill[1]) p.set('group', drill[1]); else p.delete('group');
      if(drill[2]) p.set('department', drill[2]); else p.delete('department');
    } else if(cat==='region'){
      if(drill[0]) p.set('continent1', drill[0]); else p.delete('continent1');
      if(drill[1]) p.set('continent', drill[1]); else p.delete('continent');
      if(drill[2]) p.set('country', drill[2]); else p.delete('country');
      if(drill[3]) p.set('customer', drill[3]); else p.delete('customer');
    } else if(cat==='product'){
      if(drill[0]) p.set('line', drill[0]); else p.delete('line');
      if(drill[1]) p.set('category', drill[1]); else p.delete('category');
      if(drill[2]) p.set('product', drill[2]); else p.delete('product');
    }
    const ep = this._endpoint(cat, vl);
    if(!ep) return [];
    const rows = await fetch(ep+'?'+p).then(r=>r.json()).catch(()=>[]);
    return this._normalize(rows, cat, vl);

  async prefetch(){
    const cat = state.category;
    const vl = state.viewLevel?.[cat] ?? 0;
    const drill = state.drill[cat];
    const baseP = this.buildParams();
    const isSales = cat==='sales';

    // Single round-trip: server runs all queries in parallel and returns combined result
    const qs = `${baseP}&cat=${cat}&vl=${vl}`;
    const d = await fetch('/api/prefetch?'+qs).then(r=>r.json()).catch(()=>({}));

    _real.kpi = isSales
      ? { all: d.kpiAll||{}, B2B: d.kpiB2B||{}, B2C: d.kpiB2C||{} }
      : { all: d.kpi||{}, B2B: d.kpi||{}, B2C: d.kpi||{} };
    _real.trend = isSales
      ? { all: d.trend||[], B2B: d.trendB2B||[], B2C: d.trendB2C||[] }
      : { all: d.trend||[], B2B: d.trend||[], B2C: d.trend||[] };
    _real.trendByDim = d.trendByDim || [];
    _real.breakdown  = this._normalize(d.breakdown || [], cat, vl);
    _real.priorTrend     = { all: d.priorTrend || [] };
    _real.priorBreakdown = this._normalize(d.priorBreakdown || [], cat, vl);

    // Root tree cache key
    const rootKey = `${cat}|${drill.slice(0,vl).join(',')}|${vl}`;
    _real.treeData[rootKey] = _real.breakdown;

    // Fetch expanded children in parallel (individual calls, still cached on server)
    const expandedSet = state.expanded[cat] || new Set();
    const expandedList = [...expandedSet].slice(0, 8);
    const childFetches = expandedList.map(async key => {
      const parts = key.split(' > ');
      const childLevel = vl + parts.length;
      const maxDepth = CATEGORY_DEFS.find(c=>c.id===cat)?.path?.length ?? 3;
      if(childLevel >= maxDepth) return;
      const childDrill = parts;
      const childKey = `${cat}|${childDrill.join(',')}|${childLevel}`;
      if(_real.treeData[childKey]) return;
      const childRows = await this._fetchBreakdown(cat, childDrill, childLevel, baseP).catch(()=>[]);
      _real.treeData[childKey] = childRows;
    });
    await Promise.all(childFetches);

    // Raw table (if open)
    if(state.rawOpen){
      const rRes = await fetch(`/api/raw?${baseP}&page=${state.rawPage}&per_page=${state.rawPerPage}`).then(r=>r.json()).catch(()=>({total:0,page:1,per_page:100,rows:[]}));
      _real.raw = rRes;
      const rc = document.getElementById('rawCount');
      if(rc) rc.textContent = (rRes.total||0).toLocaleString()+'건';
    }
  },
};

const api = USE_MOCK ? MockApi : {
  kpi()   { return _real.kpi[state.salesView]||_real.kpi.all||{}; },
  monthlyTrend(){
    const raw = _real.trend[state.salesView]||_real.trend.all||[];
    const months = activeMonths();
    const byMonth = Object.fromEntries(raw.map(r=>[r.Year_Month,r]));
    return months.map(ym=>byMonth[ym]||{Year_Month:ym,sales_amount:0,gross_profit:0,operating_income:0,sga_expenses:0,cost_of_sales:0});
  },
  breakdown(){ return _real.breakdown||[]; },
  breakdownAt(cat, drill, level){
    const k=`${cat}|${drill.join(',')}|${level}`;
    return _real.treeData[k]||[];
  },
  monthlyByCurrentDim(){ return _real.trendByDim||[]; },

function fmtKRW(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return ((n||0)/1e12).toFixed(2) + '조';
  if (a >= 1e8)  return ((n||0)/1e8).toFixed(1) + '억';
  if (a >= 1e4)  return Math.round((n||0)/1e4).toLocaleString() + '만';
  return Math.round(n||0).toLocaleString();
}
function fmtFull(n){ return Math.round(n||0).toLocaleString('ko-KR'); }
function fmtPct(n){ return (n||0).toFixed(1) + '%'; }
function fmtDelta(n){ return (n>=0?'+':'') + (n||0).toFixed(1) + '%'; }
function fmtQty(n){
  const a = Math.abs(n || 0);
  if (a >= 1e8) return ((n||0)/1e8).toFixed(1) + '억';
  if (a >= 1e4) return ((n||0)/1e4).toFixed(1) + '만';

/* ─── Sparkline (inline SVG) ────────────────────────────────────────── */
function sparkline(values, color, w = 54, h = 26){
  if (!values || values.length < 2) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = w / (values.length - 1);
  const pts = values.map((v, i) => [i * stepX, h - ((v - min)/range)*(h-4) - 2]);
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = path + ` L ${w} ${h} L 0 ${h} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${area}" fill="${color}" opacity="0.18"/><path d="${path}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

/* ═════════════════════════════════════════════════════════════════════
   FILTERS UI — continuous month-range slider + quick presets
   ═════════════════════════════════════════════════════════════════════ */
const PRESETS = [
  { id:'3m',  label:'최근 3개월',  months: 3  },
  { id:'6m',  label:'최근 6개월',  months: 6  },
  { id:'12m', label:'최근 12개월', months: 12 },
  { id:'24m', label:'최근 24개월', months: 24 },
  { id:'ytd', label:'YTD',         months: null }, // computed dynamically
  { id:'all', label:'전체',        months: null },
];

function applyPreset(id){
  const total = ALL_MONTHS.length;
  if (id === 'all') { state.rangeStart = 0; state.rangeEnd = total - 1; }
  else if (id === 'ytd') {
    const lastYM = ALL_MONTHS[total - 1];
    const lastY = lastYM.split('-')[0];
    let firstIdx = total - 1;
    for (let i = total - 1; i >= 0; i--) {
      if (ALL_MONTHS[i].startsWith(lastY)) firstIdx = i;
      else break;
    }
    state.rangeStart = firstIdx; state.rangeEnd = total - 1;
  } else {
    const p = PRESETS.find(x => x.id === id);
    state.rangeEnd = total - 1;
    state.rangeStart = Math.max(0, total - p.months);
  }
  updatePeriodLabel();
  renderMonthGrid();
  renderPresetChips();
  scheduleApply(0);
}

function currentPresetId(){
  const total = ALL_MONTHS.length;
  if (state.rangeStart === 0 && state.rangeEnd === total - 1) return 'all';
  if (state.rangeEnd === total - 1) {
    const span = state.rangeEnd - state.rangeStart + 1;
    if (span === 3) return '3m';
    if (span === 6) return '6m';
    if (span === 12) return '12m';
    if (span === 24) return '24m';
    // ytd check
    const lastY = ALL_MONTHS[total - 1].split('-')[0];
    let firstIdx = total - 1;
    for (let i = total - 1; i >= 0; i--) {
      if (ALL_MONTHS[i].startsWith(lastY)) firstIdx = i;
      else break;
    }
    if (state.rangeStart === firstIdx) return 'ytd';
  }
  return null;
}

function renderPresetChips(){
  const wrap = $('#presetChips');
  if (!wrap) return;
  const cur = currentPresetId();
  wrap.innerHTML = '';
  PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'chip' + (cur === p.id ? ' active' : '');
    b.textContent = p.label;
    b.onclick = () => applyPreset(p.id);
    wrap.appendChild(b);
  });
}

function renderMonthGrid(){
  const container = $('#monthGrid');
  if(!container || !ALL_MONTHS.length) return;
  const s = Math.min(state.rangeStart, state.rangeEnd);
  const e = Math.max(state.rangeStart, state.rangeEnd);
  const years = [...new Set(ALL_MONTHS.map(m => m.slice(0,4)))];
  let html = '';
  years.forEach(yr => {
    html += `<div class="mg-year-row"><span class="mg-year">${yr}</span>`;
    for(let mo = 1; mo <= 12; mo++){
      const ym = `${yr}-${String(mo).padStart(2,'0')}`;
      const idx = ALL_MONTHS.indexOf(ym);
      const inRange = idx >= s && idx <= e;
      const isS = idx === s, isE = idx === e;
      const cls = idx === -1 ? 'disabled' : (isS||isE ? 'range-start in-range'+(isE&&!isS?' range-end':'') : inRange ? 'in-range' : '');
      const extra = idx === -1 ? '' : `data-idx="${idx}"`;
      html += `<span class="mg-month ${cls}" ${extra}>${mo}월</span>`;
    }
    html += '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.mg-month:not(.disabled)').forEach(el => {
    el.onclick = e2 => {
      const idx = parseInt(el.dataset.idx);
      if(e2.shiftKey){
        if(idx < state.rangeStart) state.rangeStart = idx;
        else state.rangeEnd = idx;
      } else {
        state.rangeStart = state.rangeEnd = idx;
      }
      updatePeriodLabel();
      renderMonthGrid();
      applyAll();
    };
  });
}

}

  document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('show'); });
})();

   ═════════════════════════════════════════════════════════════════════ */
function renderHeroShell(){
  const shell = $('#heroShell');
  if (!shell) return;
  if (state.category === 'rawdata') { shell.style.display = 'none'; return; }
  shell.style.display = '';

  const k = api.kpi();
  const trend = api.monthlyTrend();
  const last = trend[trend.length - 1] || {};
  // Use priorTrend if available (set by prefetch when prior_months sent)
  const _priorTrend = (!USE_MOCK && _real.priorTrend) ? (_real.priorTrend.all || []) : [];
  const prv = _priorTrend.length > 0
    ? _priorTrend[_priorTrend.length - 1] || {}
    : (trend[trend.length - 2] || {});
  const halfN = Math.max(1, Math.floor(trend.length / 2));
  const recent = trend.slice(-halfN);
  const prior  = trend.slice(0, halfN);
  const sumK = (arr, key) => arr.reduce((s, r) => s + (r[key] || 0), 0);
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;

  // Month-over-month deltas (전월 대비)
  const dSales  = delta(last.sales_amount,     prv.sales_amount);
  const dGross  = delta(last.gross_profit,     prv.gross_profit);
  const dOI     = delta(last.operating_income, prv.operating_income);
  // contribution margin %p delta (전월 대비)
  const curMgn = (last.sales_amount ? last.operating_income/last.sales_amount*100 : 0);
  const prvMgn = (prv.sales_amount  ? prv.operating_income /prv.sales_amount *100 : 0);
  const dMgnPp = curMgn - prvMgn;

  const c = chartColors();
  const sp = key => trend.map(r => r[key] || 0);
  const heroMonths = (typeof activeMonths === 'function' ? activeMonths() : trend.map((_, i) => i + 1))
    .map(m => typeof m === 'string' ? m.slice(2).replace('-', '.') : m);

  const cards = [
    { label:'매출액',     valueHtml:`${fmtKRWNum(k.sales_amount)}<span class="unit">${fmtKRWUnit(k.sales_amount)}</span>`, color:c.accent,    cls:'',         delta:dSales, deltaSuffix:'%', spark:sp('sales_amount'),     hint:'매출액' },
    { label:'매출총이익', valueHtml:`${fmtKRWNum(k.gross_profit)}<span class="unit">${fmtKRWUnit(k.gross_profit)}</span>`, color:c.positive, cls:'green',   delta:dGross, deltaSuffix:'%', spark:sp('gross_profit'),    hint:'매출총이익' },
    { label:'공헌이익',   valueHtml:`${fmtKRWNum(k.operating_income)}<span class="unit">${fmtKRWUnit(k.operating_income)}</span>`, color: k.operating_income>=0 ? c.positive : c.negative, cls: k.operating_income>=0 ? 'green featured' : 'featured', delta:dOI, deltaSuffix:'%', spark:sp('operating_income'), hint:'공헌이익' },
    { label:'공헌이익률', valueHtml:`${(k.operating_margin||0).toFixed(1)}<span class="unit">%</span>`, color:c.plum, cls:'purple', delta:dMgnPp, deltaSuffix:'%p', spark:trend.map(r => r.sales_amount ? (r.operating_income/r.sales_amount)*100 : 0), hint:'공헌이익률', pct:true },
  ];

  const cardHtml = cards.map((it, i) => {
    const upDown = it.delta > 0.05 ? 'up' : it.delta < -0.05 ? 'down' : 'flat';
    const icon = it.delta > 0.05 ? 'trending-up' : it.delta < -0.05 ? 'trending-down' : 'minus';
    const deltaTxt = (it.delta >= 0 ? '+' : '') + it.delta.toFixed(1) + it.deltaSuffix;
    const hint = METRIC_FORMULAS && METRIC_FORMULAS[it.hint] ? `<span class="kpi-hint" data-metric="${it.hint}" tabindex="0">ⓘ</span>` : '';
    return `<div class="hero-kpi ${it.cls}">
      <div class="hero-kpi-label">${it.label}${hint}</div>
      <div class="hero-kpi-value">${it.valueHtml}</div>
      <div class="hero-kpi-delta">
        <span class="hero-kpi-delta-label">전월 대비</span>
        <span class="hero-kpi-delta-val ${upDown}"><i data-lucide="${icon}" class="ic"></i>${deltaTxt}</span>
      </div>
      <div class="hero-kpi-spark"><canvas id="heroSpark${i}"></canvas></div>
    </div>`;
  }).join('');

  // Summary comment lines
  const lines = [];
  lines.push(`매출은 전월 대비 ${formatDeltaSpan(dSales)} ${dSales >= 0 ? '증가' : '감소'}했습니다.`);
  if (Math.abs(dOI) > 0.5)
    lines.push(`공헌이익은 ${formatDeltaSpan(dOI)} ${dOI >= 0 ? '증가' : '감소'}하여 수익성에 ${dOI >= 0 ? '긍정적' : '부정적'} 영향을 주었습니다.`);
  if (Math.abs(dMgnPp) > 0.05)
    lines.push(`공헌이익률은 ${dMgnPp >= 0 ? '<span class="up">▲ ' : '<span class="down">▼ '}${Math.abs(dMgnPp).toFixed(1)}%p</span> ${dMgnPp >= 0 ? '개선' : '하락'}했습니다.`);

  const commentHtml = `<div class="summary-comment">
    <div class="summary-comment-hd">
      <div class="summary-comment-title"><i data-lucide="message-square-text" class="ic"></i>요약 코멘트</div>

  </div>`;

  shell.innerHTML = `<div class="hero-kpi-grid">${cardHtml}</div>${commentHtml}`;
  if (window.lucide) lucide.createIcons();
  if (typeof attachMetricHints === 'function') attachMetricHints();

  // ── interactive mini line charts (month dots + hover tooltip) ──
  cards.forEach((it, i) => {
    destroyChart('heroSpark' + i);
    const cv = document.getElementById('heroSpark' + i);
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 56);
    grad.addColorStop(0, it.color + '33');
    grad.addColorStop(1, it.color + '00');
    charts['heroSpark' + i] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: heroMonths,
        datasets: [{
          data: it.spark,
          borderColor: it.color,
          backgroundColor: grad,
          borderWidth: 2,
          fill: true,
          tension: 0.34,
          pointRadius: 2,
          pointHoverRadius: 4.5,
          pointBackgroundColor: it.color,
          pointBorderColor: c.isDark ? '#131923' : '#fff',
          pointBorderWidth: 1.5,
          pointHitRadius: 14,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          datalabels: { display: false },
          tooltip: {
            backgroundColor: c.isDark ? '#0A0E14' : '#0D1829',
            titleColor: '#fff', bodyColor: '#fff', cornerRadius: 7, padding: 8,
            displayColors: false,
            titleFont: { size: 10.5, weight: 600 }, bodyFont: { size: 11, weight: 700, family: "'JetBrains Mono',monospace" },
            callbacks: {
              title: items => (items[0]?.label || '') + '월',
              label: ctx => ' ' + (it.pct ? (ctx.raw || 0).toFixed(1) + '%' : fmtKRW(ctx.raw)),
            },
          },
        },
        scales: { x: { display: false }, y: { display: false } },
        layout: { padding: { top: 4, bottom: 2 } },
      },
    });
  });
}

function formatDeltaSpan(v){
  const cls = v >= 0 ? 'up' : 'down';
  const sign = v >= 0 ? '▲ ' : '▼ ';
  return `<span class="${cls}">${sign}${Math.abs(v).toFixed(1)}%</span>`;
}

function fmtKRWUnit(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return '조원';
  if (a >= 1e8)  return '억원';
  if (a >= 1e4)  return '만원';
  return '원';
}

// Override fmtKRW for hero cards: return just the number portion (unit handled separately).
function fmtKRWNum(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return ((n||0)/1e12).toFixed(2);
  if (a >= 1e8)  return ((n||0)/1e8).toFixed(1);
  if (a >= 1e4)  return Math.round((n||0)/1e4).toLocaleString();
  return Math.round(n||0).toLocaleString();
}

/* ═════════════════════════════════════════════════════════════════════

   ═════════════════════════════════════════════════════════════════════ */
function renderChangeDriversShell(){
  const shell = $('#changeDriversShell');
  if (!shell) return;
  // Redundant with the per-category TOP5 cards (topNGrid) — hidden in this layout.
  shell.style.display = 'none';
  shell.innerHTML = '';
  return;
  // eslint-disable-next-line no-unreachable

  // Build "변화 요인" — synthetic for now; mock-style.
  // Real backend would need a YoY change-attribution endpoint.
  const k = api.kpi();
  const trend = api.monthlyTrend();
  const recent = trend[trend.length - 1] || {};
  const prior  = trend[trend.length - 2] || {};
  const sumK = (o, key) => o[key] || 0;
  const diff = (key) => sumK(recent, key) - sumK(prior, key);

  const dSales = diff('sales_amount');
  const dCogs  = diff('cost_of_sales');
  const dGross = diff('gross_profit');
  const dSga   = diff('sga_expenses');
  const dOI    = diff('operating_income');

  // 이익 증가 요인: revenue↑, gross↑, cost↓ (sign-negated)
  const upDrivers = [
    { label: '매출 증가',    value: dSales,   isUp: dSales > 0 },
    { label: '매출원가 개선', value: -dCogs,   isUp: dCogs < 0 },
    { label: '매출총이익',   value: dGross,   isUp: dGross > 0 },
  ].filter(d => d.isUp).sort((a,b) => b.value - a.value).slice(0, 3);

  // 감소 요인: sga↑, cogs↑, OI↓
  const downDrivers = [
    { label: '판매관리비 증가', value: -dSga,  isDown: dSga > 0 },
    { label: '매출원가 증가',   value: -dCogs, isDown: dCogs > 0 },
    { label: '매출 감소',      value: dSales, isDown: dSales < 0 },
  ].filter(d => d.isDown).sort((a,b) => a.value - b.value).slice(0, 3);

  const upHtml = upDrivers.length
    ? upDrivers.map(d => `<div class="insight-row"><span class="lab"><span class="dot"></span>${d.label}</span><span class="val pos">${(d.value>=0?'+':'')}${fmtKRW(d.value)}</span></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-tertiary);padding:8px 0">증가 요인이 식별되지 않았습니다.</div>';

  const downHtml = downDrivers.length
    ? downDrivers.map(d => `<div class="insight-row"><span class="lab"><span class="dot"></span>${d.label}</span><span class="val neg">${fmtKRW(d.value)}</span></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-tertiary);padding:8px 0">감소 요인이 식별되지 않았습니다.</div>';

  // 핵심 인사이트
  const insights = [];
  if (dSales > 0 && dOI < 0) insights.push('매출은 증가했지만 비용 증가로 <b>공헌이익이 소폭 감소</b>했습니다.');
  if (dSales > 0 && dOI > 0) insights.push('매출과 공헌이익이 <b>동반 성장</b> 중입니다.');
  if (dSales < 0 && dOI > 0) insights.push('매출은 감소했지만 비용 효율화로 <b>공헌이익은 개선</b>되었습니다.');
  if (dSales < 0 && dOI < 0) insights.push('매출과 공헌이익이 <b>동반 감소</b> — 즉시 점검이 필요합니다.');
  const sales0 = sumK(prior, 'sales_amount'), sales1 = sumK(recent, 'sales_amount');
  const mgn0 = sales0 ? sumK(prior, 'operating_income') / sales0 * 100 : 0;
  const mgn1 = sales1 ? sumK(recent, 'operating_income') / sales1 * 100 : 0;
  const dMgnPp = mgn1 - mgn0;
  if (Math.abs(dMgnPp) > 0.05) insights.push(`공헌이익률은 전월 대비 <b>${dMgnPp >= 0 ? '+' : ''}${dMgnPp.toFixed(1)}%p</b> ${dMgnPp >= 0 ? '개선' : '하락'}했습니다.`);
  const insightHtml = insights.length
    ? insights.map(s => `<p>${s}</p>`).join('')
    : '<p>특이 변동이 식별되지 않았습니다.</p>';

  shell.innerHTML = `
    <div class="insight-card up-card">
      <div class="insight-card-hd"><i data-lucide="trending-up" class="ic"></i>이익 증가 요인 TOP 3</div>
      ${upHtml}
    </div>
    <div class="insight-card down-card">
      <div class="insight-card-hd"><i data-lucide="trending-down" class="ic"></i>공헌이익 감소 요인 TOP 3</div>
      ${downHtml}
    </div>
    <div class="insight-card tip-card">
      <div class="insight-card-hd"><i data-lucide="lightbulb" class="ic"></i>핵심 인사이트</div>
      <div class="insight-card-body">${insightHtml}</div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   KPI STRIP
   ═════════════════════════════════════════════════════════════════════ */
function renderKPI(){
  if (state.category === 'rawdata') {
    const strip = $('#kpiStrip');
    if (strip) strip.innerHTML = '';
    return;
  }
  const k = api.kpi();
  const trend = api.monthlyTrend();
  const last  = trend.length >= 1 ? trend[trend.length - 1] : {};
  const prv   = trend.length >= 2 ? trend[trend.length - 2] : {};
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;
  const sp = key => trend.map(r => r[key]);

  const c = chartColors();
  const items = [
    { label:'매출액',     val: fmtKRW(k.sales_amount), color:c.accent, delta: delta(last.sales_amount, prv.sales_amount), spark: sp('sales_amount'), primary: true },
    { label:'매출원가',   val: fmtKRW(k.cost_of_sales), color:c.tertiary, delta: delta(last.cost_of_sales, prv.cost_of_sales), spark: sp('cost_of_sales') },
    { label:'매출총이익', val: fmtKRW(k.gross_profit), color:c.positive, delta: delta(last.gross_profit, prv.gross_profit), spark: sp('gross_profit') },
    { label:'총이익률',   val: fmtPct(k.gross_margin), color:c.positive, delta: delta(last.sales_amount ? last.gross_profit/last.sales_amount*100 : 0, prv.sales_amount ? prv.gross_profit/prv.sales_amount*100 : 0), spark: trend.map(r => r.sales_amount ? r.gross_profit/r.sales_amount*100 : 0) },
    { label:'판관비',     val: fmtKRW(k.sga_expenses), color:c.amber, delta: delta(last.sga_expenses, prv.sga_expenses), spark: sp('sga_expenses') },
    { label:'공헌이익',   val: fmtKRW(k.operating_income), color: k.operating_income >= 0 ? c.positive : c.negative, delta: delta(last.operating_income, prv.operating_income), spark: sp('operating_income') },
    { label:'공헌이익률', val: fmtPct(k.operating_margin), color: k.operating_margin >= 0 ? c.positive : c.negative, delta: delta(last.sales_amount ? last.operating_income/last.sales_amount*100 : 0, prv.sales_amount ? prv.operating_income/prv.sales_amount*100 : 0), spark: trend.map(r => r.sales_amount ? r.operating_income/r.sales_amount*100 : 0) },
    { label:'매출수량',   val: fmtQty(k.sales_quantity), color:c.teal, hideDelta: true, spark: trend.map(r => Math.round(r.sales_amount / 35000)) },
  ];
  $('#kpiStrip').innerHTML = items.map((it, i) => {
    const dCls = it.hideDelta ? '' : (it.delta > 0.5 ? 'up' : it.delta < -0.5 ? 'down' : 'flat');
    const dIcon = it.delta > 0.5 ? 'trending-up' : it.delta < -0.5 ? 'trending-down' : 'minus';
    const dHtml = it.hideDelta ? '' : `<div class="kpi-delta ${dCls}"><i data-lucide="${dIcon}" class="ic"></i><span>${fmtDelta(it.delta)}</span></div>`;
    return `<div class="kpi${it.primary ? ' primary' : ''}">
      <div class="kpi-spark">${sparkline(it.spark, it.color)}</div>
      <div class="kpi-label">${it.label}${METRIC_FORMULAS[it.label]?`<span class="kpi-hint" data-metric="${it.label}" tabindex="0">ⓘ</span>`:''}</div>
      <div class="kpi-value" style="color:${it.color}">${it.val}</div>
      ${dHtml}
    </div>`;
  }).join('');
  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   SMTREND EXTERNAL TOOLTIP  (global — called by Chart.js after render)
   ═════════════════════════════════════════════════════════════════════ */
function getSmTip(){
  var el = document.getElementById('smTrendTip');
  if(!el){
    el = document.createElement('div');
    el.id = 'smTrendTip';
    el.style.cssText = [
      'position:fixed','z-index:9500','pointer-events:none',
      'opacity:0','transition:opacity .12s',
      'background:#0D1829','color:#fff',
      'border-radius:8px','padding:9px 12px',
      'font-size:11.5px','line-height:1.65',
      "font-family:'Pretendard Variable','Pretendard',sans-serif",
      'box-shadow:0 6px 24px rgba(0,0,0,.5)',
      'min-width:160px',
      'border:1px solid rgba(255,255,255,.1)'
    ].join(';');
    document.body.appendChild(el);
  }
  return el;
}
function smTipHandler(ctx){
  var tooltip = ctx.tooltip;
  var el = getSmTip();
  if(tooltip.opacity === 0){ el.style.opacity = '0'; return; }

  var title = (tooltip.title && tooltip.title[0]) || '';
  var pts   = tooltip.dataPoints || [];

  var html = '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;letter-spacing:.05em">' + title + '</div>';
  pts.forEach(function(pt){
    if(pt.raw == null) return;
    var isPct  = pt.dataset.yAxisID === 'y2';
    var val    = isPct ? pt.raw.toFixed(1) + '%' : fmtKRW(pt.raw);
    var rawColor = typeof pt.dataset.borderColor === 'string' ? pt.dataset.borderColor : '';
    /* If color is same as tooltip bg (#0D1829) or very dark, use white */
    var color = (rawColor && rawColor !== '#0D1829' && rawColor !== '#0a0e14')
                  ? rawColor : 'rgba(255,255,255,0.75)';
    html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-top:3px">'
          + '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>'
          + '<span style="color:rgba(255,255,255,.65)">' + pt.dataset.label + '</span>'
          + '<span style="margin-left:auto;padding-left:12px;font-weight:700;font-family:\'JetBrains Mono\',monospace">' + val + '</span>'
          + '</div>';
  });

  el.innerHTML = html;
  el.style.opacity = '1';

  var r  = ctx.chart.canvas.getBoundingClientRect();
  var tw = el.offsetWidth, th = el.offsetHeight;
  var vw = window.innerWidth, vh = window.innerHeight;
  var lx = r.left + tooltip.caretX + 14;
  var ty = r.top  + tooltip.caretY - th / 2;
  if(lx + tw > vw - 8) lx = r.left + tooltip.caretX - tw - 14;
  if(ty < 8) ty = 8;
  if(ty + th > vh - 8) ty = vh - th - 8;
  el.style.left = lx + 'px';
  el.style.top  = ty + 'px';
}

  var title = (tooltip.title && tooltip.title[0]) || '';

  var html = '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;letter-spacing:.05em">' + title + '</div>';
  var salesTotal = 0;
  pts.forEach(function(pt){
    if(pt.raw == null) return;
    var isPct = pt.dataset.yAxisID === 'y2';
    var val = isPct ? (pt.raw||0).toFixed(1) + '%' : fmtKRW(pt.raw);
    if(!isPct) salesTotal += (pt.raw || 0);
    var bg = typeof pt.dataset.backgroundColor === 'string' ? pt.dataset.backgroundColor : '';
    var bc = typeof pt.dataset.borderColor === 'string' ? pt.dataset.borderColor : '';
    var color = (bg && bg.length > 3) ? bg : (bc && bc.length > 3) ? bc : 'rgba(255,255,255,0.75)';
    var dot = isPct
      ? '<span style="display:inline-block;width:14px;height:0;border-top:2px solid '+color+';vertical-align:middle;flex-shrink:0"></span>'
      : '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+color+';flex-shrink:0"></span>';
    html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-top:2px">'
          + dot
          + '<span style="color:rgba(255,255,255,.65)">' + pt.dataset.label + '</span>'
          + '<span style="margin-left:auto;padding-left:12px;font-weight:700;font-family:\'JetBrains Mono\',monospace">' + val + '</span>'
          + '</div>';
  });
  if(salesTotal > 0){
    html += '<div style="border-top:1px solid rgba(255,255,255,.12);margin-top:6px;padding-top:5px;display:flex;align-items:center;justify-content:space-between;white-space:nowrap">'
          + '<span style="color:rgba(255,255,255,.45);font-size:10.5px;font-weight:600">합계(매출)</span>'
          + '<span style="font-weight:700;font-family:\'JetBrains Mono\',monospace">' + fmtKRW(salesTotal) + '</span>'
          + '</div>';
  }
  el.innerHTML = html;
  el.style.opacity = '1';
  var r = ctx.chart.canvas.getBoundingClientRect();
  var tw = el.offsetWidth, th = el.offsetHeight;
  var vw = window.innerWidth, vh = window.innerHeight;
  var lx = r.left + tooltip.caretX + 14;
  var ty = r.top + tooltip.caretY - th / 2;
  if(lx + tw > vw - 8) lx = r.left + tooltip.caretX - tw - 14;
  if(ty < 8) ty = 8;
  if(ty + th > vh - 8) ty = vh - th - 8;
  el.style.left = lx + 'px';
  el.style.top = ty + 'px';
}

/* ═════════════════════════════════════════════════════════════════════
   TOP N / Detail Summary Table renderers
   ═════════════════════════════════════════════════════════════════════ */
function renderTopNCards(breakdown){
  const grid = $('#topNGrid');
  if (!grid) return;
  const cat = CATEGORY_DEFS.find(c => c.id === state.category);
  const lv = state.viewLevel?.[state.category] ?? 0;
  const dimLabel = cat?.path?.[lv] || cat?.label || '항목';

  // Build prior period lookup from real API data
  const priorBkd = (!USE_MOCK && _real.priorBreakdown) ? _real.priorBreakdown : [];
  const priorMap = Object.fromEntries(priorBkd.map(b => [b.name, b]));
  const hasPrior = priorBkd.length > 0;

  const items = breakdown.map(b => {
    const oi = b.operating_income || 0;
    const sales = b.sales_amount || 0;
    const margin = sales ? oi / sales * 100 : 0;
    const pb = priorMap[b.name] || {};
    const priorOI = pb.operating_income || 0;
    const priorSales = pb.sales_amount || 0;
    const priorMargin = priorSales ? priorOI / priorSales * 100 : 0;
    return {
      name: b.name,
      flag: b.flag,
      oiDelta: oi - priorOI,
      oiDeltaPct: priorOI ? ((oi - priorOI) / Math.abs(priorOI)) * 100 : 0,
      marginDeltaPp: margin - priorMargin,
    };
  });

  const oiTop = items.slice().sort((a,b) => b.oiDelta - a.oiDelta).slice(0, 5);
  const mgnTop = items.slice().sort((a,b) => b.marginDeltaPp - a.marginDeltaPp).slice(0, 5);

  const periodLabel = hasPrior ? '전월 대비' : '—';

  function row(it, idx, type){
    const flag = it.flag ? `${it.flag} ` : '';
    if (type === 'oi') {
      const cls = it.oiDelta >= 0 ? 'pos' : 'neg';
      const sign = it.oiDelta >= 0 ? '+' : '';
      const dt = it.oiDeltaPct;
      const dtCls = dt >= 0 ? 'up' : 'down';
      const dtIcon = dt >= 0 ? 'trending-up' : 'trending-down';
      return `<div class="topn-row"><span class="rnk">${idx+1}</span><span class="nm">${flag}${it.name}</span><span class="vl ${cls}">${sign}${fmtKRW(it.oiDelta)}</span><span class="dt ${dtCls}"><i data-lucide="${dtIcon}" class="ic"></i>${Math.abs(dt).toFixed(1)}%</span></div>`;
    } else {
      const cls = it.marginDeltaPp >= 0 ? 'pos' : 'neg';
      const sign = it.marginDeltaPp >= 0 ? '+' : '';
      const dtCls = it.marginDeltaPp >= 0 ? 'up' : 'down';
      const dtIcon = it.marginDeltaPp >= 0 ? 'trending-up' : 'trending-down';
      return `<div class="topn-row"><span class="rnk">${idx+1}</span><span class="nm">${flag}${it.name}</span><span class="vl ${cls}">${sign}${it.marginDeltaPp.toFixed(1)}%p</span><span class="dt ${dtCls}"><i data-lucide="${dtIcon}" class="ic"></i></span></div>`;
    }
  }

  const oiCard = `<div class="topn-card">
    <div class="topn-card-hd">
      <div class="topn-card-title">${dimLabel}별 공헌이익 증감 TOP 5</div>
      <div class="topn-card-sub">${periodLabel}</div>
    </div>
    ${oiTop.map((it, i) => row(it, i, 'oi')).join('')}
  </div>`;

  const mgnCard = `<div class="topn-card">
    <div class="topn-card-hd">
      <div class="topn-card-title">${dimLabel}별 공헌이익률 증감 TOP 5</div>
      <div class="topn-card-sub">${periodLabel}</div>
    </div>
    ${mgnTop.map((it, i) => row(it, i, 'mgn')).join('')}
  </div>`;

  grid.innerHTML = oiCard + mgnCard;
  if (window.lucide) lucide.createIcons();
}

function renderDetailSummaryTable(breakdown){
  const wrap = $('#detailSummaryTable');
  if (!wrap) return;
  const cat = CATEGORY_DEFS.find(c => c.id === state.category);
  const lv = state.viewLevel?.[state.category] ?? 0;
  const dimLabel = cat?.path?.[lv] || cat?.label || '항목';
  const catLabel = cat?.label || '';

  // Real prior period data
  const priorBkd = (!USE_MOCK && _real.priorBreakdown) ? _real.priorBreakdown : [];
  const priorMap = Object.fromEntries(priorBkd.map(b => [b.name, b]));
  const hasPrior = priorBkd.length > 0;
  const periodLabel = hasPrior ? '전월 대비' : '—';

  const tot = breakdown.reduce((acc, b) => {
    acc.sales += b.sales_amount || 0;
    acc.gross += b.gross_profit || 0;
    acc.oi    += b.operating_income || 0;
    return acc;
  }, { sales: 0, gross: 0, oi: 0 });
  const totMgn = tot.sales ? tot.oi / tot.sales * 100 : 0;

  const priorTot = priorBkd.reduce((acc, b) => {
    acc.sales += b.sales_amount || 0;
    acc.gross += b.gross_profit || 0;
    acc.oi    += b.operating_income || 0;
    return acc;
  }, { sales: 0, gross: 0, oi: 0 });
  const priorTotMgn = priorTot.sales ? priorTot.oi / priorTot.sales * 100 : 0;

  const pctDelta = (cur, prv) => prv ? (cur - prv) / Math.abs(prv) * 100 : null;
  const ppDelta  = (cur, prv) => hasPrior ? cur - prv : null;

  function deltaCell(v, suffix){
    if (v === undefined || v === null) return '<td class="num">—</td>';
    const cls = v > 0.1 ? 'up' : v < -0.1 ? 'down' : 'flat';
    const sign = v >= 0 ? '+' : '';
    return `<td class="num"><span class="delta ${cls}">${cls==='up'?'▲ ':cls==='down'?'▼ ':'— '}${sign}${v.toFixed(1)}${suffix||'%'}</span></td>`;
  }

  function bodyRow(b, depth){
    const pb = priorMap[b.name] || {};
    const margin = (b.sales_amount) ? b.operating_income / b.sales_amount * 100 : 0;
    const priorMargin = (pb.sales_amount) ? (pb.operating_income||0) / pb.sales_amount * 100 : 0;
    const dSales = pctDelta(b.sales_amount, pb.sales_amount);
    const dGross = pctDelta(b.gross_profit, pb.gross_profit);
    const dOI    = pctDelta(b.operating_income, pb.operating_income);
    const dMgn   = ppDelta(margin, priorMargin);
    const flag = b.flag ? `${b.flag} ` : '';
    const cls = depth === 0 ? 'label parent' : 'label indent';
    return `<tr class="${depth===0?'is-parent':''}">
      <td class="${cls}">${flag}${b.name}</td>
      <td class="num">${fmtKRW(b.sales_amount)}</td>
      ${deltaCell(dSales)}
      <td class="num">${fmtKRW(b.gross_profit)}</td>
      ${deltaCell(dGross)}
      <td class="num">${fmtKRW(b.operating_income)}</td>
      ${deltaCell(dOI)}
      <td class="num">${(b.operating_margin||0).toFixed(1)}%</td>
      ${deltaCell(dMgn, '%p')}
    </tr>`;
  }

  const maxDepth = cat?.path?.length || 1;
  const canChild = lv < maxDepth - 1 && typeof api.breakdownAt === 'function';
  const rows = breakdown.slice(0, 20).map(b => {
    let html = bodyRow(b, 0);
    if (canChild) {
      let kids = [];
      try { kids = api.breakdownAt(state.category, [b.name], lv + 1) || []; } catch(e) { kids = []; }
      html += kids.slice(0, 12).map(kb => bodyRow(kb, 1)).join('');
    }
    return html;
  }).join('');

  const totDSales = pctDelta(tot.sales, priorTot.sales);
  const totDGross = pctDelta(tot.gross, priorTot.gross);
  const totDOI    = pctDelta(tot.oi,    priorTot.oi);
  const totDMgn   = ppDelta(totMgn, priorTotMgn);

  wrap.innerHTML = `
    <div class="detail-tbl-wrap">
      <div class="detail-tbl-hd">
        <div class="detail-tbl-title"><i data-lucide="table-2" class="ic"></i>${catLabel} 성과 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:11px;margin-left:4px">(누적)</span></div>
        <div class="detail-tbl-tools">단위: 억원, % &nbsp;·&nbsp; * ${periodLabel}</div>
      </div>
      <div class="detail-tbl-scroll">
        <table class="detail-tbl">
          <thead>
            <tr>
              <th>${dimLabel}</th>
              <th class="num">매출액</th>
              <th class="num">${periodLabel}</th>
              <th class="num">매출총이익</th>
              <th class="num">${periodLabel}</th>
              <th class="num">공헌이익</th>
              <th class="num">${periodLabel}</th>
              <th class="num">공헌이익률</th>
              <th class="num">${periodLabel}</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="is-total">
              <td class="label">전체 합계</td>
              <td class="num">${fmtKRW(tot.sales)}</td>
              ${deltaCell(totDSales)}
              <td class="num">${fmtKRW(tot.gross)}</td>
              ${deltaCell(totDGross)}
              <td class="num">${fmtKRW(tot.oi)}</td>
              ${deltaCell(totDOI)}
              <td class="num">${totMgn.toFixed(1)}%</td>
              ${deltaCell(totDMgn, '%p')}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}

function buildDrillCharts(){

  destroyChart('dimWaterfall');
  if (state.category === 'region' || state.category === 'product' || state.category === 'org') {
    const wctx = resetCanvas('dimWaterfallChart');
    if (wctx) {

// Build a flat tree array for hlist rendering. Uses breakdownAt with explicit
// drill+level (no state mutation), starting at state.viewLevel.
function buildTree(category){
  const cat = CATEGORY_DEFS.find(c => c.id === category);
  const maxDepth = cat.path.length;
  const viewLevel = state.viewLevel?.[category] ?? 0;
  const expandedSet = state.expanded[category] || new Set();
  const initialDrill = state.drill[category].slice(0, viewLevel);
  const result = [];

  function walk(currentDrill, depthFromView){
    const level = viewLevel + depthFromView;
    const rows = api.breakdownAt
      ? api.breakdownAt(category, currentDrill, level)
      : (function(){
          // Fallback for real API: temp-mutate state.drill
          const saved = state.drill[category];
          state.drill[category] = currentDrill;
          const r = api.breakdown();
          state.drill[category] = saved;
          return r;
        })();
    rows.forEach((r, idx) => {
      const key = [...currentDrill, r.name].join(' > ');
      const hasChildren = level < maxDepth - 1;
      const isExpanded = expandedSet.has(key);
      result.push({
        ...r, depth: depthFromView, key, hasChildren, expanded: isExpanded,
        ancestors: currentDrill, siblingRank: idx + 1,
      });
      if (isExpanded && hasChildren) walk([...currentDrill, r.name], depthFromView + 1);
    });
  }
  walk(initialDrill, 0);
  return result;
}

function attachDrillClicks(){
  if (state.category === 'sales') {
    $$('.cat-tabs ~ * [data-sv]').forEach(b => b.onclick = () => {
      state.salesView = b.dataset.sv;
      applyAll();
    });
    return;
  }
  // Tree expand/collapse-all buttons (per current category)
  const expandAll = $('#treeExpandAll');
  const collapseAll = $('#treeCollapseAll');
  if (expandAll) expandAll.onclick = () => {
    const cat = state.category;
    if (cat === 'sales') return;
    const tree = buildTreeFullyExpanded(cat);
    state.expanded[cat] = new Set(tree.filter(n => n.hasChildren).map(n => n.key));
    applyAll();
  };
  if (collapseAll) collapseAll.onclick = () => {
    if (state.category === 'sales') return;
    state.expanded[state.category].clear();
    applyAll();
  };
}

// Build a fully-expanded tree (used by Expand All button) to discover all keys
function buildTreeFullyExpanded(category){
  const cat = CATEGORY_DEFS.find(c => c.id === category);
  const maxDepth = cat.path.length;
  const savedDrill = state.drill[category].slice();
  const savedExpanded = state.expanded[category];
  // Use a synthetic set that returns true for everything during walk
  state.expanded[category] = { has: () => true };
  const result = buildTree(category);
  state.expanded[category] = savedExpanded;
  state.drill[category] = savedDrill;
  return result;
}

function renderSalesDetailTable(opts){
  const wrap = $('#salesDetailTable');
  if (!wrap) return;
  const all = opts.all, b2b = opts.b2b, b2c = opts.b2c;
  function deltaCell(v, suffix){
    const cls = v > 0.1 ? 'up' : v < -0.1 ? 'down' : 'flat';
    const sign = v >= 0 ? '+' : '';
    return `<td class="num"><span class="delta ${cls}">${cls === 'up' ? '▲ ' : cls === 'down' ? '▼ ' : '— '}${sign}${v.toFixed(1)}${suffix||'%'}</span></td>`;
  }
  function rowFor(label, k, shareDenom, isTotal){
    const share = shareDenom ? (k.sales_amount / shareDenom * 100) : 100;
    const dS = ((Math.abs(hash(label,'s')) % 100) / 100 - 0.3) * 14;
    const dG = ((Math.abs(hash(label,'g')) % 100) / 100 - 0.3) * 16;
    const dO = ((Math.abs(hash(label,'o')) % 100) / 100 - 0.3) * 18;
    const dM = ((Math.abs(hash(label,'m')) % 100) / 100 - 0.5) * 3;
    const cls = isTotal ? ' class="is-total"' : '';
    return `<tr${cls}>
      <td class="label">${label}</td>
      <td class="num">${fmtKRW(k.sales_amount)}</td>
      <td class="num">${share.toFixed(1)}%</td>
      ${deltaCell(dS)}
      <td class="num">${fmtKRW(k.gross_profit)}</td>
      ${deltaCell(dG)}
      <td class="num">${fmtKRW(k.operating_income)}</td>
      ${deltaCell(dO)}
      <td class="num">${(k.operating_margin||0).toFixed(1)}%</td>
      ${deltaCell(dM, '%p')}
    </tr>`;
  }
  wrap.innerHTML = `
    <div class="detail-tbl-wrap">
      <div class="detail-tbl-hd">
        <div class="detail-tbl-title"><i data-lucide="table-2" class="ic"></i>판매유형별 성과 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:11px;margin-left:4px">(누적)</span></div>

      </div>
      <div class="detail-tbl-scroll">
        <table class="detail-tbl">
          <thead>
            <tr>
              <th>판매유형</th>
              <th class="num">매출액</th>
              <th class="num">비중</th>
              <th class="num">전월 대비</th>
              <th class="num">매출총이익</th>
              <th class="num">전월 대비</th>
              <th class="num">공헌이익</th>
              <th class="num">전월 대비</th>
              <th class="num">공헌이익률</th>
              <th class="num">전월 대비</th>
            </tr>
          </thead>
          <tbody>
            ${rowFor('B2B', b2b, all.sales_amount, false)}
            ${rowFor('B2C', b2c, all.sales_amount, false)}
            ${rowFor('전체', all, null, true)}
          </tbody>
        </table>
      </div>

  `;
  if (window.lucide) lucide.createIcons();

    return k;
  };
  const all = buildMetric('all');
  const b2b = buildMetric('B2B');
  const b2c = buildMetric('B2C');

  // ── Sales detail summary table (B2B + B2C + 전체) ──
  renderSalesDetailTable({all, b2b, b2c});

  // ── Profit waterfall (B2B / B2C) + 매출 비중 donut ──
  buildSalesWaterfall({b2b, b2c});
  buildSalesDonut({all, b2b, b2c});

  function card(view, k, label, cls) {
    const isCurrent = state.salesView === view;
    const share = view === 'all' ? 100 : (k.sales_amount / all.sales_amount) * 100;
    return `<div class="st-card ${cls}" data-sv="${view}" style="cursor:pointer;${isCurrent ? 'box-shadow:0 0 0 2px var(--accent), 0 8px 24px -8px var(--accent)' : ''}">
      <div class="st-card-label">${label}<span class="badge">${share.toFixed(1)}%</span></div>
      <div class="st-card-amount">${fmtKRW(k.sales_amount)}</div>
      <div class="st-card-share">매출수량 ${fmtQty(k.sales_quantity)} · 평균객단가 ${fmtKRW(k.sales_amount / Math.max(1, k.sales_quantity))}</div>
      <div class="st-card-grid">
        <div class="st-mini"><div class="st-mini-label">매출총이익</div><div class="st-mini-val pos">${fmtKRW(k.gross_profit)}</div></div>
        <div class="st-mini"><div class="st-mini-label">총이익률</div><div class="st-mini-val pos">${fmtPct(k.gross_margin)}</div></div>
        <div class="st-mini"><div class="st-mini-label">공헌이익</div><div class="st-mini-val ${k.operating_income >= 0 ? 'pos' : 'neg'}">${fmtKRW(k.operating_income)}</div></div>
        <div class="st-mini"><div class="st-mini-label">공헌이익률</div><div class="st-mini-val ${k.operating_margin >= 0 ? 'pos' : 'neg'}">${fmtPct(k.operating_margin)}</div></div>
      </div>
    </div>`;
  }
  compareWrap && (compareWrap.innerHTML = card('all', all, '전체', 'all') + card('B2B', b2b, 'B2B', 'b2b') + card('B2C', b2c, 'B2C', 'b2c'));
  $$('#stCompare .st-card').forEach(el => el.onclick = () => { state.salesView = el.dataset.sv; applyAll(); });

  // ── 월별 추이 line (전체: 매출액·매출총이익·공헌이익 + 공헌이익률%) ──
  destroyChart('stTrend');
  destroyChart('stMargin');
  const ctx = resetCanvas('stTrendChart');
  const months = activeMonths();
  const t = api.monthlyTrend();
  charts.stTrend = new Chart(ctx, {
    data: {
      labels: months.map(m => m.slice(2).replace('-', '.')),
      datasets: [
        { type:'line', label:'매출액',     data: t.map(r=>r.sales_amount),     borderColor:c.accent,   backgroundColor:'transparent', borderWidth:2.5, tension:0.32, pointRadius:2.5, pointBackgroundColor:c.accent,   pointBorderColor:c.isDark?'#131923':'#fff', pointBorderWidth:1.5, yAxisID:'y' },
        { type:'line', label:'매출총이익', data: t.map(r=>r.gross_profit),     borderColor:c.positive, backgroundColor:'transparent', borderWidth:2.5, tension:0.32, pointRadius:2.5, pointBackgroundColor:c.positive, pointBorderColor:c.isDark?'#131923':'#fff', pointBorderWidth:1.5, yAxisID:'y' },
        { type:'line', label:'공헌이익',   data: t.map(r=>r.operating_income), borderColor:c.plum,     backgroundColor:'transparent', borderWidth:2.5, tension:0.32, pointRadius:2.5, pointBackgroundColor:c.plum,     pointBorderColor:c.isDark?'#131923':'#fff', pointBorderWidth:1.5, yAxisID:'y' },
        { type:'line', label:'공헌이익률(%)', data: t.map(r=>r.sales_amount?(r.operating_income/r.sales_amount)*100:0), borderColor:c.plum, backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,3], tension:0.32, pointRadius:0, pointHoverRadius:4, yAxisID:'y2' },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect: false },
      plugins: {
        legend: { position:'top', align:'start', labels: { color: c.secondary, font:{size:10.5}, boxWidth:8, padding:12, usePointStyle:true } },
        tooltip: { backgroundColor: c.isDark ? '#0A0E14' : '#0D1829', titleColor:'#fff', bodyColor:'#fff', cornerRadius: 8, padding: 10, callbacks: { label: ctx => ctx.dataset.yAxisID==='y2' ? ` ${ctx.dataset.label}: ${(ctx.raw||0).toFixed(1)}%` : ` ${ctx.dataset.label}: ${fmtKRW(ctx.raw)}` } },
      },
      scales: {

async function loadRawPage(){
  if(!USE_MOCK){
    const p = new URLSearchParams();
    activeMonths().forEach(m => p.append('months', m));
    if(state.rawFilter.group)      p.set('group',      state.rawFilter.group);
    if(state.rawFilter.department) p.set('department', state.rawFilter.department);
    if(state.rawFilter.continent)  p.set('continent',  state.rawFilter.continent);
    if(state.rawFilter.country)    p.set('country',    state.rawFilter.country);
    if(state.rawFilter.line)       p.set('line',       state.rawFilter.line);
    if(state.rawFilter.category)   p.set('category',   state.rawFilter.category);
    if(state.rawFilter.brand)      p.set('brand',      state.rawFilter.brand);
    if(state.rawFilter.salesType)  p.set('sales_type', state.rawFilter.salesType);
    p.set('page',     state.rawPage);
    p.set('per_page', state.rawPerPage);
    if(state.rawSearch) p.set('search', state.rawSearch);
    try{ _real.raw = await fetch('/api/raw?'+p).then(r=>r.json()); } catch(e){}
  }
  renderRaw();
}

function renderRaw(){
  if (state.category !== 'rawdata') return;
  const res = USE_MOCK ? api.raw(state.rawPage, state.rawPerPage) : (_real.raw||{total:0,page:1,per_page:100,rows:[]});
  if($('#rawTotal')) $('#rawTotal').textContent = fmtFull(res.total);
  const pages = Math.max(1, Math.ceil(res.total / state.rawPerPage));
  if($('#rawPgInfo')) $('#rawPgInfo').textContent = `페이지 ${state.rawPage} / ${pages}`;
  const rawTb = $('#rawTb');
  const esc = s => String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  if(rawTb) rawTb.innerHTML = res.rows.map(r => {
    const grp  = USE_MOCK?(r.Honbu||''):(r.Group||'');
    const dept = USE_MOCK?(r.Team||''):(r.Department||'');
    const cust = r.Customer||''; const pname = r.Product_Name||''; const spec = r.Specification||'';
    return `<tr>
    <td class="mono">${r.Year_Month||''}</td>
    <td class="td-clip-sm" title="${esc(grp)}">${grp}</td>
    <td class="td-clip-sm" title="${esc(dept)}">${dept}</td>
    <td><span class="pill ${r.Sales_Type === 'B2C' ? 'b2c' : 'b2b'}">${r.Sales_Type||''}</span></td>
    <td class="td-clip-sm" title="${esc(r.Line||'')}">${r.Line||''}</td>
    <td class="td-clip-sm" title="${esc(r.Category||'')}">${r.Category||''}</td>
    ${!USE_MOCK?`<td class="td-clip-sm" title="${esc(r.Brand||'')}">${r.Brand||''}</td>`:''}
    ${USE_MOCK?`<td>${r.Continent||''}</td>`:''}
    <td class="td-clip-sm" title="${esc(r.Country||'')}">${USE_MOCK?(`<span class="flag">${r.Country_Flag||''}</span>`):''} ${r.Country||''}</td>
    <td class="td-clip" title="${esc(cust)}">${cust}</td>
    <td class="td-clip" title="${esc(pname)}">${pname}</td>
    <td class="mono td-clip-sm" style="color:var(--text-tertiary)" title="${esc(r.Product_Code||'')}">${r.Product_Code||''}</td>
    ${!USE_MOCK?`<td class="td-clip-sm" title="${esc(spec)}">${spec}</td>`:''}
    <td class="num">${fmtFull(r.Sales_Quantity)}</td>
    <td class="num">${fmtKRW(r.Sales_Amount)}</td>
    <td class="num">${fmtKRW(r.Cost_of_Sales)}</td>
    <td class="num"><span class="pos">${fmtKRW(r.Gross_Profit)}</span></td>
    <td class="num">${fmtKRW(r.SG_and_A_Expenses)}</td>
    <td class="num"><span class="${(r.Operating_Income||0) >= 0 ? 'pos' : 'neg'}">${fmtKRW(r.Operating_Income)}</span></td>
  </tr>`;}).join('');
  // pagination
  const rawPagi = $('#rawPagi');
  if(!rawPagi) return;
  const cur = state.rawPage, win = 5;
  let from = Math.max(1, cur - Math.floor(win / 2));
  let to = Math.min(pages, from + win - 1);
  if (to - from < win - 1) from = Math.max(1, to - win + 1);
  const btn = (label, page, dis = false, act = false) => `<button class="pg-btn${act ? ' active' : ''}" ${dis ? 'disabled' : ''} data-page="${page}">${label}</button>`;
  let html = btn('‹‹', 1, cur === 1) + btn('‹', cur - 1, cur === 1);
  for (let i = from; i <= to; i++) html += btn(i, i, false, i === cur);
  html += btn('›', cur + 1, cur === pages) + btn('››', pages, cur === pages);
  html += `<span class="pg-info">${(cur-1)*state.rawPerPage + 1} – ${Math.min(cur*state.rawPerPage, res.total)} / ${fmtFull(res.total)}</span>`;
  rawPagi.innerHTML = html;
  $$('#rawPagi .pg-btn').forEach(b => b.onclick = () => {
    const p = parseInt(b.dataset.page);
    if (!isNaN(p) && p !== state.rawPage) {
      state.rawPage = p;
      if(USE_MOCK){ renderRaw(); } else { loadRawPage(); }
    }
  });
}

function _setCsvProgress(pct, msg){
  const modal = $('#csvProgModal');
  if(!modal) return;
  modal.style.display = 'flex';
  $('#csvPbFill').style.width = pct + '%';
  $('#csvPbPct').textContent  = Math.round(pct) + '%';
  $('#csvPbMsg').textContent  = msg;
}
function _hideCsvProgress(){ const m = $('#csvProgModal'); if(m) m.style.display = 'none'; }

async function downloadCSV(){
  if(USE_MOCK){ alert('\uBAA8\uC758 \uB370\uC774\uD130 \uBAA8\uB4DC\uC5D0\uC11C\uB294 \uB2E4\uC6B4\uB85C\uB4DC\uAC00 \uC9C0\uC6D0\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.'); return; }

  // Build filter params \u2014 use activeMonths() to respect current slider range
  const p = new URLSearchParams();
  activeMonths().forEach(m => p.append('months', m));
  if(state.rawFilter.group)      p.append('group',      state.rawFilter.group);
  if(state.rawFilter.department) p.append('department', state.rawFilter.department);
  if(state.rawFilter.continent)  p.append('continent',  state.rawFilter.continent);
  if(state.rawFilter.country)    p.append('country',    state.rawFilter.country);
  if(state.rawFilter.line)       p.append('line',       state.rawFilter.line);
  if(state.rawFilter.category)   p.append('category',   state.rawFilter.category);
  if(state.rawFilter.salesType)  p.append('sales_type', state.rawFilter.salesType);
  if(state.rawSearch)            p.set('search',        state.rawSearch);

  const CHUNK = 300000;
  const ts = () => new Date().toISOString().slice(0,19).replace(/[-:]/g,'').replace('T','_');

  _setCsvProgress(0, '\uB370\uC774\uD130 \uAC74\uC218 \uD655\uC778 \uC911\u2026');

  try {
    // 1. Get total row count
    const cntRes = await fetch('/api/export-count?' + p);
    if(!cntRes.ok) throw new Error('\uAC74\uC218 \uC870\uD68C \uC2E4\uD328: ' + cntRes.status);
    const { count } = await cntRes.json();
    const chunks = Math.max(1, Math.ceil(count / CHUNK));

    _setCsvProgress(2, `\uCD1D ${count.toLocaleString()}\uD589 \u00B7 ${chunks}\uAC1C \uD30C\uC77C\uB85C \uBD84\uD560 \uB2E4\uC6B4\uB85C\uB4DC`);

    for(let i = 1; i <= chunks; i++){
      const from = ((i-1)*CHUNK+1).toLocaleString();
      const to   = Math.min(i*CHUNK, count).toLocaleString();
      _setCsvProgress(2 + (i-1)/chunks*94, `\uD30C\uC77C ${i}/${chunks} \uB2E4\uC6B4\uB85C\uB4DC \uC911\u2026 (${from}~${to}\uD589)`);

      const cp = new URLSearchParams(p);
      cp.set('chunk_size', CHUNK);
      cp.set('chunk_num',  i);

      const resp = await fetch('/api/export-csv?' + cp);
      if(!resp.ok) throw new Error(`\uC11C\uBC84 \uC624\uB958 (\uD30C\uC77C ${i}): ${resp.status}`);

      const blob = await resp.blob();
      const suffix = chunks > 1 ? `_${i}of${chunks}` : '';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `FI_Export_${ts()}${suffix}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      _setCsvProgress(2 + i/chunks*94, `\uD30C\uC77C ${i}/${chunks} \uC800\uC7A5 \uC644\uB8CC`);
      if(i < chunks) await new Promise(r => setTimeout(r, 600));
    }

    _setCsvProgress(100, '\uBAA8\uB4E0 \uD30C\uC77C \uB2E4\uC6B4\uB85C\uB4DC \uC644\uB8CC!');
    setTimeout(_hideCsvProgress, 1800);
  } catch(e){
    _hideCsvProgress();
    alert('\uB2E4\uC6B4\uB85C\uB4DC \uC911 \uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4:\n' + e.message);
  }
}

/* ═════════════════════════════════════════════════════════════════════
   TREE RAIL — full hierarchy navigator (left context sidebar)
   ═════════════════════════════════════════════════════════════════════ */
// Returns hierarchy levels for a category: array of {opts, icon, childrenOf}
function treeHierarchy(cat){
  if (cat === 'org') {
    return {
      rootLabel: '전체', rootIcon: 'layout-grid',
      levels: [
        { icon:'tag', opts: USE_MOCK ? HONBUS : REAL_BRANDS },
        { icon:'gem', childrenOf: (parent) => USE_MOCK ? [] : (HIER_BRAND_GROUP[parent]||[]) },
        { icon:'users', childrenOf: (parent) => USE_MOCK ? (HONBU_TEAM_MAP[parent]||[]) : (HIER_GROUP_DEPT[parent]||[]) },
      ],
    };
  }
  if (cat === 'region') {
    return {
      rootLabel: '전체', rootIcon: 'layout-grid',
      levels: [
        { icon:'globe-2',  opts: USE_MOCK ? CONTINENTS : REAL_CONTINENTS1 },
        { icon:'map',      childrenOf: (parent) => USE_MOCK ? [] : (HIER_CONT1_CONT2[parent]||[]) },
        { icon:'map-pin',  childrenOf: (parent) => USE_MOCK ? COUNTRIES.filter(c=>c.cont===parent).map(c=>c.name) : (HIER_CONTINENT_COUNTRY[parent]||[]) },
        { icon:'briefcase', childrenOf: (parent) => USE_MOCK ? CUSTOMERS.slice(0, 8) : (HIER_COUNTRY_CUSTOMER[parent]||[]) },
      ],
    };
  }
  if (cat === 'product') {
    // Line ↔ Category are NOT strictly hierarchical, so the tree groups SKUs by
    // whichever axis the breadcrumb (viewLevel) selects:
    //   라인별(0) → 라인 > SKU,  카테고리별(1) → 카테고리 > SKU,  SKU별(2) → 라인 > SKU
    const vl = state.viewLevel?.product ?? 0;
    if (vl === 1) {
      const allCats = USE_MOCK ? [...new Set(Object.values(CATEGORIES_BY_LINE).flat())] : (typeof REAL_CATEGORIES !== 'undefined' ? REAL_CATEGORIES : []);
      return {
        rootLabel: '전체 상품', rootIcon: 'layout-grid',
        levels: [
          { icon:'package', opts: allCats },
          { icon:'box', childrenOf: (parent) => USE_MOCK ? SKUS.filter(s=>s.cat===parent).map(s=>s.name) : [] },
        ],
      };
    }
    return {
      rootLabel: '전체 상품', rootIcon: 'layout-grid',
      levels: [
        { icon:'git-branch', opts: USE_MOCK ? LINES : REAL_LINES },
        { icon:'box', childrenOf: (parent) => USE_MOCK ? SKUS.filter(s=>s.line===parent).map(s=>s.name) : [] },
      ],
    };
  }
  if (cat === 'sales') {
    return {
      rootLabel: '전체 판매유형', rootIcon: 'shopping-bag',
      levels: [
        { icon:'tag', opts: ['B2B', 'B2C'] },
      ],
    };
  }
  return null;
}

function renderTreeRail(){
  const shell = $('#layoutShell');
  const cat = state.category;
  const hasTree = ['org','region','product','sales'].includes(cat);
  if (!shell) return;

  shell.classList.toggle('no-tree', !hasTree);
  shell.classList.toggle('tree-collapsed', hasTree && state.treeCollapsed);
  if (!hasTree) return;
  const _sb = $('#treeRailSearch');
  if (_sb) _sb.style.display = (cat === 'sales') ? 'none' : 'flex';

  const scroll = $('#treeRailScroll');
  if (!scroll) return;
  const h = treeHierarchy(cat);
  if (!h) { scroll.innerHTML = ''; return; }

  // ── Sales category uses state.salesView (not drill) ───────────────
  if (cat === 'sales') {
    const rows = [];
    const allActive = !state.salesView || state.salesView === 'all';
    rows.push(`<div class="tree-node${allActive ? ' active' : ''}" data-sv="all" style="padding-left:8px">
      <span class="tw-chev leaf"></span>
      <i data-lucide="${h.rootIcon}" class="tw-ic"></i>
      <span class="tw-label">${h.rootLabel}</span>
    </div>`);
    h.levels[0].opts.forEach(name => {
      const active = state.salesView === name;
      rows.push(`<div class="tree-node${active ? ' active' : ''}" data-sv="${name}" data-depth="1" style="padding-left:24px">
        <span class="tw-chev leaf"></span>
        <i data-lucide="${h.levels[0].icon}" class="tw-ic"></i>
        <span class="tw-label">${name}</span>
      </div>`);
    });
    scroll.innerHTML = rows.join('');
    scroll.querySelectorAll('.tree-node').forEach(el => {
      el.addEventListener('click', () => {
        state.salesView = el.dataset.sv;
        applyAll();
      });
    });
    if (window.lucide) lucide.createIcons();
    return;
  }

  const exp = state.treeExpanded[cat];
  const drill = state.drill[cat];
  const rows = [];
  const term = (state.treeSearch || '').trim().toLowerCase();
  const searching = term.length > 0;
  const useCheckbox = (cat === 'region');

  // does the subtree rooted at this node contain a label matching the search term?
  function subtreeMatches(level, name, path){
    if (name.toLowerCase().includes(term)) return true;
    if (level >= h.levels.length - 1) return false;
    const next = h.levels[level+1];
    const kids = next.childrenOf ? (next.childrenOf(name, path)||[]) : [];
    return kids.some(k => k && subtreeMatches(level+1, k, [...path, k]));
  }

  // Root node "전체"
  const rootActive = drill.length === 0;
  if (!searching) {
    rows.push(`<div class="tree-node" data-depth="0" data-path="" style="padding-left:8px">
      <span class="tw-chev leaf"></span>
      <i data-lucide="${h.rootIcon}" class="tw-ic"></i>
      <span class="tw-label">${h.rootLabel}</span>
    </div>`);
  }

  // Recursive walk
  function walk(level, parentPath){
    if (level >= h.levels.length) return;
    const def = h.levels[level];
    let opts;
    if (level === 0) opts = def.opts || [];
    else opts = (def.childrenOf ? def.childrenOf(parentPath[parentPath.length-1], parentPath) : []);
    opts = opts.filter(o => o != null && String(o).trim() !== '');

    // Sort by sales_amount descending using cached breakdown data
    if (!USE_MOCK) {
      const _tk = level === 0 ? `${cat}||0` : `${cat}|${parentPath.join(',')}|${level}`;
      const _tr = (_real.treeData && _real.treeData[_tk]) || [];
      if (_tr.length > 0) {
        const _sm = Object.fromEntries(_tr.map(r => [r.name, r.sales_amount || 0]));
        opts = opts.slice().sort((a, b) => (_sm[b] || 0) - (_sm[a] || 0));
      }
    }

    opts.forEach(name => {
      const path = [...parentPath, name];
      const key = path.join(' > ');
      if (searching && !subtreeMatches(level, name, path)) return;
      const isExpanded = searching ? true : exp.has(key);
      const hasChildren = level < h.levels.length - 1 &&
        (h.levels[level+1].childrenOf ? (h.levels[level+1].childrenOf(name, path)||[]).filter(o=>o&&String(o).trim()).length > 0 : true);
      const active = drill.length === path.length && drill.every((v,i) => v === path[i]);
      const indent = 8 + (level + 1) * 16;
      const chev = hasChildren
        ? `<span class="tw-chev${isExpanded ? ' expanded' : ''}" data-toggle="${escapeAttr(key)}"><i data-lucide="chevron-right" class="ic"></i></span>`
        : `<span class="tw-chev leaf"></span>`;
      const checkbox = useCheckbox
        ? `<span class="tw-check${active ? ' checked' : ''}" style="position:relative"><i data-lucide="check" class="ic"></i></span>`
        : '';
      rows.push(`<div class="tree-node${active ? ' active' : ''}" data-depth="${level+1}" data-path="${escapeAttr(key)}" style="padding-left:${indent}px">
        ${chev}
        ${checkbox}
        <i data-lucide="${def.icon}" class="tw-ic"></i>
        <span class="tw-label">${name}</span>
      </div>`);
      if (isExpanded && hasChildren) walk(level + 1, path);
    });
  }
  walk(0, []);

  scroll.innerHTML = rows.join('');

  // Wire clicks
  scroll.querySelectorAll('.tw-chev[data-toggle]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const key = el.dataset.toggle;
      if (exp.has(key)) exp.delete(key); else exp.add(key);
      renderTreeRail();
    };
  });
  scroll.querySelectorAll('.tree-node').forEach(el => {
    el.addEventListener('click', () => {
      const pathStr = el.dataset.path;
      const path = pathStr ? pathStr.split(' > ') : [];
      const maxDepth = CATEGORY_DEFS.find(c => c.id === cat).path.length;
      // checkbox toggle-off: clicking the currently-active node clears to parent
      const isActiveNow = state.drill[cat].length === path.length && state.drill[cat].every((v,i)=>v===path[i]);
      const nextPath = (useCheckbox && isActiveNow) ? path.slice(0, -1) : path;
      state.drill[cat] = nextPath;
      // For product, the grouping axis is driven by the breadcrumb (viewLevel),
      // not by tree clicks — keep it; other categories advance with the path.
      if (cat !== 'product') state.viewLevel[cat] = Math.min(nextPath.length, maxDepth - 1);
      // auto-expand the clicked node so its children show in the tree
      if (nextPath.length) state.treeExpanded[cat].add(nextPath.join(' > '));
      // sync filterSel single-select so other UI stays consistent
      if (state.filterSel[cat]) {
        Object.keys(state.filterSel[cat]).forEach(lv => state.filterSel[cat][lv] = new Set());
        nextPath.forEach((v, i) => { if (state.filterSel[cat][i]) state.filterSel[cat][i].add(v); });
      }
      applyAll();
    });
  });

  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════

function renderCatFilters(){

  if (cat === 'org') {

    const selGroups = fv(1);

      : REAL_GROUPS;
    const depts = selGroups.length
      ? [...new Set(selGroups.flatMap(g => HIER_GROUP_DEPT[g]||[]))]
      : (selBrands.length ? [...new Set(selBrands.flatMap(b => (HIER_BRAND_GROUP[b]||[]).flatMap(g => HIER_GROUP_DEPT[g]||[])))] : REAL_DEPARTMENTS);
    levels = [
      { lv: 0, label: '브랜드', icon: 'tag',       opts: USE_MOCK ? HONBUS : REAL_BRANDS },
      { lv: 1, label: '그룹',   icon: 'building-2', opts: USE_MOCK ? [] : groups },
      { lv: 2, label: '부서',   icon: 'users',      opts: USE_MOCK ? ALL_TEAMS : depts },
    ];
  } else if (cat === 'region') {
    const selCont1s = fv(0);
    const selCont2s = fv(1);
    const selCtrys  = fv(2);
    const cont2s = selCont1s.length ? [...new Set(selCont1s.flatMap(c=>HIER_CONT1_CONT2[c]||[]))] : REAL_CONTINENTS;
    const mockCountries = selCont2s.length ? COUNTRIES.filter(c=>selCont2s.includes(c.cont)).map(c=>c.name) : COUNTRIES.map(c=>c.name);
    const realCountries = selCont2s.length ? [...new Set(selCont2s.flatMap(c=>HIER_CONTINENT_COUNTRY[c]||[]))]
                        : selCont1s.length ? [...new Set(selCont1s.flatMap(c=>(HIER_CONT1_CONT2[c]||[]).flatMap(k=>HIER_CONTINENT_COUNTRY[k]||[])))]
                        : REAL_COUNTRIES;
    const realCustomers = selCtrys.length ? [...new Set(selCtrys.flatMap(c=>HIER_COUNTRY_CUSTOMER[c]||[]))]

                        : REAL_CUSTOMERS;
    levels = [
      { lv: 0, label: '권역',   icon: 'globe-2',   opts: USE_MOCK ? CONTINENTS : REAL_CONTINENTS1 },
      { lv: 1, label: '대륙',   icon: 'map',       opts: USE_MOCK ? [] : cont2s },
      { lv: 2, label: '국가',   icon: 'map-pin',   opts: USE_MOCK ? mockCountries : realCountries },
      { lv: 3, label: '거래처', icon: 'briefcase', opts: USE_MOCK ? CUSTOMERS : realCustomers },

  } else if (cat === 'product') {
    const selLines = fv(0);
    const selCats  = fv(1);
    const mockCats = selLines.length ? [...new Set(selLines.flatMap(l=>CATEGORIES_BY_LINE[l]||[]))] : [...new Set(Object.values(CATEGORIES_BY_LINE).flat())];
    const realCats = selLines.length ? [...new Set(selLines.flatMap(l=>HIER_LINE_CATEGORY[l]||[]))] : REAL_CATEGORIES;
    let skus = SKUS;
    if (selLines.length) skus = skus.filter(s=>selLines.includes(s.line));
    if (selCats.length)  skus = skus.filter(s=>selCats.includes(s.cat));
    levels = [
      { lv: 0, label: '라인',     icon: 'git-branch', opts: USE_MOCK ? LINES : REAL_LINES },
      { lv: 1, label: '카테고리', icon: 'package',    opts: USE_MOCK ? mockCats : realCats },

  wrap.innerHTML = levels.map((L, i) => {
    const selSet = (fs[L.lv] || new Set());
