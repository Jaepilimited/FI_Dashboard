/* ═══ Palette overrides ════════════════════════════════════════════════ */
html.theme-dark[data-palette="sunset"]{
  --accent:#FB923C; --accent-hover:#F97316;
  --accent-soft:rgba(251,146,60,0.13); --accent-soft-2:rgba(251,146,60,0.20);
  --plum:#F472B6; --teal:#FCD34D; --amber:#FBBF24;
}
html.theme-light[data-palette="sunset"]{
  --accent:#EA580C; --accent-hover:#C2410C;
  --accent-soft:rgba(234,88,12,0.09); --accent-soft-2:rgba(234,88,12,0.15);
  --plum:#DB2777; --teal:#CA8A04; --amber:#D97706;
}
html.theme-dark[data-palette="forest"]{
  --accent:#34D399; --accent-hover:#10B981;
  --accent-soft:rgba(52,211,153,0.13); --accent-soft-2:rgba(52,211,153,0.20);
  --plum:#2DD4BF; --teal:#A7F3D0; --amber:#FBBF24;
}
html.theme-light[data-palette="forest"]{
  --accent:#059669; --accent-hover:#047857;
  --accent-soft:rgba(5,150,105,0.09); --accent-soft-2:rgba(5,150,105,0.15);
  --plum:#0D9488; --teal:#0F766E; --amber:#D97706;
}
html.theme-dark[data-palette="mono"]{
  --accent:#94A3B8; --accent-hover:#CBD5E1;
  --accent-soft:rgba(148,163,184,0.12); --accent-soft-2:rgba(148,163,184,0.18);
  --plum:#CBD5E1; --teal:#94A3B8; --amber:#E2E8F0;
  --positive:#86EFAC; --negative:#FCA5A5;
}
html.theme-light[data-palette="mono"]{
  --accent:#475569; --accent-hover:#1E293B;
  --accent-soft:rgba(71,85,105,0.07); --accent-soft-2:rgba(71,85,105,0.13);
  --plum:#64748B; --teal:#475569; --amber:#94A3B8;
}
/* mono additionally desaturates the slider fill */
html[data-palette="mono"] .slider-fill{background:linear-gradient(90deg, var(--accent), var(--plum))}
html[data-palette="mono"] .brand-mark{background:linear-gradient(135deg, var(--accent) 0%, var(--plum) 110%);box-shadow:0 4px 12px -4px rgba(148,163,184,0.4)}

/* ═══ SYNTHEX TONE — ultra-minimal cool-white, frosted glass, charcoal accent ═══
   Re-tokenises the light palette to a near-monochrome cool off-white with a
   single charcoal accent. Charts read these vars, so they recolor automatically.
   Toggle via Tweaks → 톤. */
html.theme-light[data-tone="synthex"]{
  --bg:#E8ECEA;
  --surface:#FBFCFC;
  --surface-2:#F1F4F3;
  --surface-hover:#ECF0EE;
  --surface-active:#E2E8E5;
  --border:rgba(28,38,34,0.065);
  --border-strong:rgba(28,38,34,0.12);
  --border-focus:rgba(40,56,49,0.26);
  --text:#1B2521;
  --text-secondary:#5C6863;
  --text-tertiary:#99A39E;
  --text-disabled:#BCC4BF;
  --accent:#283631;
  --accent-hover:#161F1B;
  --accent-soft:rgba(40,54,49,0.06);
  --accent-soft-2:rgba(40,54,49,0.11);
  --plum:#7E8C85;
  --teal:#5E7A6E;
  --amber:#A98C5E;
  --positive:#3E7A5E;
  --positive-soft:rgba(62,122,94,0.10);
  --negative:#BE6A5C;
  --negative-soft:rgba(190,106,92,0.10);
  --warning:#A98C5E;
  --topnav-bg:rgba(232,236,234,0.80);
  --kpi-row-bg:linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
}
/* Clean, larger-radius, softly-shadowed cards (solid — frost only on popovers) */
html.theme-light[data-tone="synthex"] .card,
html.theme-light[data-tone="synthex"] .hero-kpi,
html.theme-light[data-tone="synthex"] .st-card,
html.theme-light[data-tone="synthex"] .change-factor-card,
html.theme-light[data-tone="synthex"] .summary-comment-card,
html.theme-light[data-tone="synthex"] .insight-card,
html.theme-light[data-tone="synthex"] .breakdown-card,
html.theme-light[data-tone="synthex"] .scope-card,
html.theme-light[data-tone="synthex"] .raw-view{
  border-radius:18px;
  background:#FCFDFD;
  border-color:rgba(28,38,34,0.06);
  box-shadow:0 1px 2px rgba(28,38,34,0.03), 0 16px 38px -26px rgba(28,38,34,0.32);
}
html.theme-light[data-tone="synthex"] .hero-kpi.featured{
  border-color:rgba(62,122,94,0.45);
  box-shadow:0 1px 2px rgba(28,38,34,0.04), 0 18px 44px -22px rgba(62,122,94,0.42);
}
/* Airier numbers, lighter weight */
html.theme-light[data-tone="synthex"] .hero-kpi-value{font-weight:600;letter-spacing:-0.032em}
html.theme-light[data-tone="synthex"] .crumb-summary-val{font-weight:600}
html.theme-light[data-tone="synthex"] .brand-mark{
  background:linear-gradient(135deg,#2A3833,#566860);
  box-shadow:0 4px 14px -6px rgba(28,38,34,0.4);
}
html.theme-light[data-tone="synthex"] .topnav{-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px)}
/* Soft frosted dropdowns / tooltips */
html.theme-light[data-tone="synthex"] .period-pop,
html.theme-light[data-tone="synthex"] .tweaks-panel{
  border-radius:18px;
  background:rgba(251,252,252,0.86);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
}
/* Chips/pills: cleaner ghost look */
html.theme-light[data-tone="synthex"] .chip{border-color:var(--border-strong)}

/* ─── 커스텀 분석 (Tableau Builder) ──────────────────────────────── */
.tbl-wrap{display:flex;flex-direction:column;height:calc(100vh - 76px);overflow:hidden}
/* 커스텀 분석탭은 작업 공간이 화면을 꽉 채우도록 메인 패딩 축소 */
main.wrap:has(.tbl-wrap){padding-bottom:14px}
.tbl-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.tbl-chart-btns{display:flex;gap:2px;align-items:center;background:var(--surface-hover);border:1px solid var(--border);border-radius:8px;padding:2px}
.tbl-chart-btn{display:flex;align-items:center;justify-content:center;width:32px;height:30px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text-tertiary);cursor:pointer;font-size:13px;transition:all 0.15s}
.tbl-ct-sep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0}
.tbl-chart-btn:hover{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tbl-chart-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 6px -1px rgba(91,158,249,.5)}
.tbl-chart-btn .ic{width:15px;height:15px;stroke-width:1.75}
.tbl-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.tbl-mode-toggle{display:flex;gap:2px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface-hover);padding:2px}
.tbl-mode-btn{padding:3px 12px;font-size:11.5px;font-weight:600;background:transparent;border:none;border-radius:6px;cursor:pointer;color:var(--text-tertiary);transition:all 0.15s}
.tbl-mode-btn:hover{background:var(--surface);color:var(--text)}
.tbl-mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 6px -1px rgba(91,158,249,.5)}
.tbl-sheet-tabs{display:flex;align-items:flex-end;gap:0;overflow-x:auto;max-width:40%}
.tbl-sheet-tab{display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:11.5px;border:1px solid var(--border);border-bottom:none;border-radius:5px 5px 0 0;background:var(--surface-hover);color:var(--text-tertiary);cursor:pointer;white-space:nowrap;position:relative;top:1px;user-select:none}
.tbl-sheet-tab.active{background:var(--bg);color:var(--text);border-color:var(--border-strong);z-index:1}
.tbl-sheet-tab:hover:not(.active){background:var(--surface)}
.tbl-sheet-tab-name{outline:none}
.tbl-sheet-tab-del{opacity:0;font-size:13px;line-height:1;cursor:pointer;color:var(--text-tertiary);margin-left:2px}
.tbl-sheet-tab:hover .tbl-sheet-tab-del,.tbl-sheet-tab.active .tbl-sheet-tab-del{opacity:1}
.tbl-add-sheet{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text-tertiary);cursor:pointer;font-size:18px;line-height:1;flex-shrink:0}
.tbl-add-sheet:hover{background:var(--surface-hover);color:var(--text)}
.tbl-save-btn{padding:4px 13px;font-size:11.5px;font-weight:600;border-radius:7px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;transition:opacity 0.15s,box-shadow .15s;flex-shrink:0;box-shadow:0 2px 6px -1px rgba(91,158,249,.4)}
.tbl-save-btn:hover{opacity:0.85}
.tbl-save-btn.saved{background:transparent;color:var(--accent);box-shadow:none}
.tbl-body{display:flex;flex:1;min-height:0;overflow:hidden}
.tbl-fields{width:190px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;background:var(--surface)}
.tbl-fields-section{padding:0 0 8px}
.tbl-fields-label{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 12px 4px}
.tbl-field-chip{display:flex;align-items:center;gap:6px;padding:4px 12px;margin:0 4px;border-radius:6px;font-size:11.5px;cursor:grab;user-select:none;color:var(--text);transition:background 0.1s,padding-left 0.12s}
.tbl-field-chip:hover{background:var(--surface-hover);padding-left:15px}
.tbl-field-chip:active{cursor:grabbing}
.tbl-field-chip .ic{width:12px;height:12px;stroke-width:2;flex-shrink:0}
.tbl-field-chip.dim .ic{color:#5b9ef9}
.tbl-field-chip.dim.date-dim .ic{color:#f7c948}
.tbl-field-chip.meas .ic{color:#4ecb71}
.tbl-right{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}
.tbl-shelves{display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:7px 10px}
.tbl-shelf{display:flex;align-items:center;gap:4px;min-height:32px;min-width:150px;border:1px solid var(--border);border-radius:8px;padding:3px 8px;background:var(--bg);flex:1;transition:border-color 0.15s,background 0.15s,box-shadow 0.15s;overflow:hidden}
.tbl-shelf:hover{border-color:var(--border-strong)}
/* 주요 선반(행/열/측정값/필터)은 더 넓게 */
.tbl-shelf[data-shelf="rows"],.tbl-shelf[data-shelf="columns"],.tbl-shelf[data-shelf="measures"],.tbl-shelf[data-shelf="filters"]{flex:1.6;min-width:200px}
/* 보조 선반(색상/크기/레이블/세부정보)은 좁게 */
.tbl-shelf[data-shelf="color"],.tbl-shelf[data-shelf="size"],.tbl-shelf[data-shelf="label"]{flex:0.9;min-width:130px}
.tbl-shelf.drag-over{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 3px rgba(91,158,249,.15)}
.tbl-shelf-label{font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-tertiary);white-space:nowrap;padding-right:4px;flex-shrink:0}
/* 선반 아이콘 컬러 코딩 */
.tbl-shelf[data-shelf="color"] .tbl-shelf-icon{color:#f472b6}
.tbl-shelf[data-shelf="size"] .tbl-shelf-icon{color:#a78bfa}
.tbl-shelf[data-shelf="label"] .tbl-shelf-icon{color:#f7c948}
.tbl-shelf[data-shelf="filters"] .tbl-shelf-icon{color:#60a5fa}
.tbl-shelf[data-shelf="measures"] .tbl-shelf-icon{color:#4ecb71}
.tbl-shelf-chips{display:flex;flex-wrap:wrap;gap:3px;align-items:center;flex:1;min-width:0}
.tbl-s-chip{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;background:var(--surface-hover);border:1px solid var(--border);cursor:default;white-space:nowrap;max-width:100%;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.tbl-s-chip .tbl-chip-txt{overflow:hidden;text-overflow:ellipsis;min-width:0}
.tbl-s-chip.dim{border-color:#5b9ef955;color:#5b9ef9;background:rgba(91,158,249,.08)}
.tbl-s-chip.meas{border-color:#4ecb7155;color:#3cb863;background:rgba(78,203,113,.08)}
html.theme-dark .tbl-s-chip.meas{color:#4ecb71}
.tbl-s-chip-del{cursor:pointer;opacity:0.5;font-size:12px;line-height:1;padding:0 2px;border-radius:50%;flex-shrink:0;transition:opacity .12s}
.tbl-s-chip-del:hover{opacity:1;color:#f87171}
.tbl-viz{flex:1;min-height:0;overflow:auto;padding:14px 16px;position:relative;background:var(--bg)}
.tbl-viz-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);text-align:center;gap:12px;border:1.5px dashed var(--border);border-radius:14px}
.tbl-viz-empty .ic{width:46px;height:46px;stroke-width:1;opacity:0.35;padding:14px;box-sizing:content-box;border-radius:50%;background:var(--surface-hover)}
.tbl-viz-empty p{font-size:13px;letter-spacing:-0.01em}
/* 빈 상태 — 원클릭 시작 템플릿 */
.tbl-qs{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;border:1.5px dashed var(--border);border-radius:14px;padding:24px}
.tbl-qs-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:-0.01em}
.tbl-qs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,210px));gap:10px;justify-content:center;width:100%;max-width:920px}
.tbl-qs-card{display:flex;flex-direction:column;gap:8px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s,transform .15s}
.tbl-qs-card:hover{border-color:var(--accent);box-shadow:0 4px 14px -6px rgba(91,158,249,.35);transform:translateY(-2px)}
.tbl-qs-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tbl-qs-card .ic{width:18px;height:18px;stroke-width:1.75;color:var(--accent)}
.tbl-qs-card-name{font-size:12.5px;font-weight:600;color:var(--text)}
.tbl-qs-card-desc{font-size:11px;color:var(--text-tertiary);line-height:1.45}
.tbl-qs-hint{font-size:11.5px;color:var(--text-tertiary)}
.tbl-qs-hint b{color:var(--text-secondary);font-weight:600}
.tbl-echarts{width:100%;min-height:400px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 32px -16px rgba(0,0,0,.10)}
.tbl-pivot-wrap{overflow:auto;height:100%}
.tbl-pivot-table{border-collapse:separate;border-spacing:0;font-size:11.5px;width:100%}
.tbl-pivot-table th{background:var(--surface);border:1px solid var(--border);padding:5px 8px;font-weight:600;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1}
.tbl-pivot-table td{border:1px solid var(--border);padding:4px 8px;white-space:nowrap}
.tbl-pivot-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.tbl-pivot-table td.num.neg{color:#f9784b}
.tbl-pivot-table tr:hover td{background:var(--surface-hover)}
.tbl-pivot-table .total-row td{background:var(--surface);font-weight:600}
/* 커스텀 분석 확장 UI */
.tbl-toolbar-row2{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;font-size:11.5px}
.tbl-control-label{font-size:10.5px;color:var(--text-tertiary);white-space:nowrap}
.tbl-select{font-size:11.5px;padding:3px 7px;border-radius:6px;border:1px solid var(--border);background:var(--surface-hover);color:var(--text);cursor:pointer;transition:border-color .15s}
.tbl-select:hover{border-color:var(--border-strong)}
.tbl-export-btn{display:flex;align-items:center;gap:4px;padding:3px 10px;font-size:11.5px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.tbl-export-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-strong);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tbl-export-btn .ic{width:11px;height:11px;stroke-width:2}
.tbl-agg-badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(78,203,113,.15);color:#4ecb71;margin-right:2px;cursor:pointer;letter-spacing:.03em;user-select:none}
.tbl-agg-badge:hover{background:rgba(78,203,113,.35)}
.tbl-filter-count{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(91,158,249,.15);color:#5b9ef9;margin-left:3px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tbl-agg-drop{position:fixed;background:var(--surface);border:1px solid var(--border-strong);border-radius:7px;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:9999;display:none;min-width:150px}
.tbl-agg-opt{padding:5px 14px;font-size:12px;cursor:pointer;border-radius:4px;color:var(--text);white-space:nowrap}
.tbl-agg-opt:hover{background:var(--surface-hover)}
.tbl-agg-opt.active{color:var(--accent);font-weight:600}
.tbl-agg-section-label{padding:3px 14px;font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em}
/* Granularity badge on date chips */
.tbl-gran-badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(247,201,72,.2);color:#f7c948;margin-right:3px;cursor:pointer;user-select:none}
.tbl-gran-badge:hover{background:rgba(247,201,72,.35)}
.tbl-calc-badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(167,139,250,.2);color:#a78bfa;margin-left:3px}
/* Tool buttons (undo/redo/swap/refline) */
.tbl-tool-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:transparent;border:1px solid transparent;border-radius:5px;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.tbl-tool-btn:hover{background:var(--surface-hover);border-color:var(--border);color:var(--text)}
.tbl-tool-btn.active{background:rgba(91,158,249,.12);border-color:rgba(91,158,249,.4);color:var(--accent)}
.tbl-tool-btn:disabled{opacity:.35;pointer-events:none}
/* 키보드 포커스 가시화 (WCAG 2.4.7) */
.tbl-chart-btn:focus-visible,.tbl-mode-btn:focus-visible,.tbl-add-sheet:focus-visible,
.tbl-save-btn:focus-visible,.tbl-tool-btn:focus-visible,.tbl-select:focus-visible,
.tbl-export-btn:focus-visible,.tbl-reset-btn:focus-visible,.tbl-sort-reset:focus-visible,
.tbl-shelf-clear-btn:focus-visible,.tbl-ftab:focus-visible,.tbl-field-search-inp:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px}
/* 셸프 칩·선반 인터랙션 피드백 */
.tbl-s-chip{transition:box-shadow .12s,border-color .12s}
.tbl-s-chip:hover{box-shadow:0 2px 5px rgba(0,0,0,.10);border-color:var(--border-strong)}
.tbl-shelf:hover{border-color:var(--border-strong);background:var(--surface)}
/* 비활성 상태 통일 */
.tbl-chart-btn:disabled,.tbl-mode-btn:disabled,.tbl-select:disabled,.tbl-export-btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
/* 피벗 모드: 차트 전용 컨트롤 비활성화 표시 */
.tbl-wrap.pivot-mode .tbl-chart-btns,
.tbl-wrap.pivot-mode #tblRefLine,
.tbl-wrap.pivot-mode #tblExportPNG{opacity:.35;pointer-events:none}
/* 허용되지 않는 필드 드롭 시 빨간 플래시 */
.tbl-shelf.reject{border-color:#f87171!important;background:rgba(248,113,113,.1)!important;transition:none}
/* 칩을 필드 패널로 끌어 제거할 때 하이라이트 */
#tblFields.drag-remove{outline:2px dashed #f87171;outline-offset:-2px;background:rgba(248,113,113,.04)}
/* Filter tabs */
.tbl-filter-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 8px}
.tbl-ftab{flex:1;padding:7px 4px;font-size:11px;background:none;border:none;cursor:pointer;color:var(--text-tertiary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tbl-ftab:hover{color:var(--text)}
.tbl-ftab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tbl-filter-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9990;display:none}
.tbl-filter-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;max-height:480px;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.22);display:flex;flex-direction:column;overflow:hidden}
.tbl-filter-popup-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;flex-shrink:0}
.tbl-filter-popup-hd .tbl-filter-close-btn{background:transparent;border:none;cursor:pointer;color:var(--text-tertiary);font-size:20px;line-height:1;padding:0 2px}
.tbl-filter-search-wrap{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.tbl-filter-search-wrap input{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;box-sizing:border-box;outline:none}
.tbl-filter-values-list{flex:1;overflow-y:auto;padding:4px 0}
.tbl-filter-val-row{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:12px;cursor:pointer;color:var(--text);user-select:none}
.tbl-filter-val-row:hover{background:var(--surface-hover)}
.tbl-filter-val-row input[type=checkbox]{width:13px;height:13px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.tbl-filter-popup-ft{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}
.tbl-filter-popup-ft button{padding:4px 10px;font-size:11.5px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.tbl-filter-popup-ft button:hover{background:var(--surface-hover)}
.tbl-filter-popup-ft .tbl-filter-apply{background:var(--accent);border-color:var(--accent);color:#fff;margin-left:auto}
.tbl-filter-popup-ft .tbl-filter-apply:hover{opacity:.85}
/* Field panel search */
.tbl-field-search-wrap{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:1}
.tbl-field-search-icon{width:12px;height:12px;color:var(--text-tertiary);flex-shrink:0}
.tbl-field-search-inp{flex:1;background:transparent;border:none;outline:none;font-size:11.5px;color:var(--text);caret-color:var(--accent)}
.tbl-field-search-inp::placeholder{color:var(--text-tertiary)}
/* Shelf icons + placeholder */
.tbl-shelf-icon{width:11px;height:11px;stroke-width:2;color:var(--text-tertiary);flex-shrink:0;margin-right:2px}
.tbl-shelf-chips:empty::before{content:'드래그';font-size:9.5px;color:var(--text-tertiary);opacity:0.35;pointer-events:none}
/* 선반별 placeholder — 무엇을 놓는 곳인지 한눈에 */
.tbl-shelf[data-shelf="rows"] .tbl-shelf-chips:empty::before,
.tbl-shelf[data-shelf="columns"] .tbl-shelf-chips:empty::before{content:'차원 필드'}
.tbl-shelf[data-shelf="measures"] .tbl-shelf-chips:empty::before{content:'측정값 필드'}
.tbl-shelf[data-shelf="filters"] .tbl-shelf-chips:empty::before{content:'필드를 끌어 조건 추가'}
/* 다크모드 — 저대비 배지·칩 보정 */
html.theme-dark .tbl-agg-badge{background:rgba(78,203,113,.22)}
html.theme-dark .tbl-filter-count{background:rgba(91,158,249,.22)}
html.theme-dark .tbl-gran-badge{background:rgba(247,201,72,.26)}
html.theme-dark .tbl-calc-badge{background:rgba(167,139,250,.26)}
html.theme-dark .tbl-s-chip.dim{color:#7eb3fb}
/* Cross-tab pivot table improvements */
.tbl-pivot-table{table-layout:auto}
.tbl-pivot-table td:first-child,.tbl-pivot-table th:first-child{position:sticky;left:0;z-index:1;background:var(--surface)}
.tbl-pivot-table thead th:first-child{z-index:2;background:var(--surface-2)}
.tbl-pivot-table thead th.col-total{background:var(--surface-2);font-weight:700;color:var(--accent)}
.tbl-pivot-table .total-row td{background:var(--surface-2);font-weight:600;color:var(--text)}
.tbl-pivot-table .total-row td:first-child{color:var(--accent)}
.tbl-crosstab-info{font-size:11px;color:var(--text-tertiary);padding:2px 12px 6px;text-align:right}
/* Sortable pivot headers */
.tbl-pivot-table th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.tbl-pivot-table th.sortable:hover{background:var(--surface-hover)}
.tbl-sort-ind{font-size:9.5px;margin-left:3px;opacity:0.3;transition:opacity .15s}
.tbl-sort-ind.active{opacity:1;color:var(--accent);font-weight:700}
/* Chip sort button */
.tbl-sort-btn{display:inline-flex;align-items:center;justify-content:center;gap:1px;height:14px;padding:0 2px;font-size:10px;line-height:1;cursor:pointer;opacity:0.3;user-select:none;transition:opacity .15s,color .15s;border-radius:2px;flex-shrink:0}
.tbl-sort-btn:hover{opacity:0.8}
.tbl-sort-btn.sorted{opacity:1;color:var(--accent);font-weight:700}
.tbl-sort-priority{font-size:8px;opacity:0.8;line-height:1}
/* Shelf chip drag-to-reorder */
.tbl-s-chip.dragging{opacity:0.35;cursor:grabbing}
.tbl-s-chip.drag-over{outline:2px solid var(--accent);outline-offset:-1px}
/* Shelf clear button */
.tbl-shelf-clear-btn{display:none;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-tertiary);opacity:0;padding:1px 3px;border-radius:2px;transition:opacity .15s,color .15s;flex-shrink:0;line-height:1}
.tbl-shelf:hover .tbl-shelf-clear-btn{opacity:0.7}
.tbl-shelf-clear-btn:hover{opacity:1 !important;color:var(--negative)}
/* Viz footer */
.tbl-viz-footer{height:24px;padding:0 12px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-secondary);flex-shrink:0;background:var(--surface);font-variant-numeric:tabular-nums}
.tbl-viz-footer .tbl-vf-sep{width:1px;height:10px;background:var(--border)}
/* Sort reset in toolbar */
.tbl-sort-reset{display:none;align-items:center;gap:3px;background:none;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:10.5px;padding:3px 8px;cursor:pointer;opacity:.85;transition:opacity .15s}
.tbl-sort-reset:hover{opacity:1}
.tbl-sort-reset .ic{width:10px;height:10px}
/* 전체 초기화 버튼 — 위험 액션 고스트 스타일 */
.tbl-reset-btn{display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:11px;padding:3px 9px;cursor:pointer;transition:all .15s}
.tbl-reset-btn:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.08)}
.tbl-reset-btn .ic{width:11px;height:11px;stroke-width:2}
</style>
</head>

      </button>

    </section>

  <!-- ── Waterfall shell (손익 흐름 + 현황 요약) ──────────────────── -->

</main>

<!-- ═══ Tweaks panel ════════════════════════════════════════════════════ -->
<div class="tweaks-panel" id="tweaksPanel" role="dialog" aria-label="Tweaks">
  <div class="tweaks-hd">
    <span class="tweaks-title"><i data-lucide="sliders-horizontal" class="ic"></i>Tweaks</span>
    <button class="tweaks-close" id="tweaksClose" aria-label="닫기"><i data-lucide="x" class="ic"></i></button>
  </div>
  <div class="tweaks-body">
    <!-- Tone -->
    <div class="tweak-group">
      <div class="tweak-label">
        <span>톤</span>
        <span class="tweak-label-val" id="toneVal">default</span>
      </div>
      <div class="tweak-seg" data-tweak="tone">
        <button data-v="default">기본</button>
        <button data-v="synthex">Synthex</button>
      </div>
    </div>

    <!-- Density -->
    <div class="tweak-group">
      <div class="tweak-label">
        <span>밀도</span>
        <span class="tweak-label-val" id="densityVal">comfy</span>
      </div>
      <div class="tweak-seg" data-tweak="density">
        <button data-v="compact">컴팩트</button>
        <button data-v="comfy">보통</button>
        <button data-v="spacious">여유</button>
      </div>
    </div>

    <!-- Palette -->
    <div class="tweak-group">
      <div class="tweak-label">
        <span>팔레트</span>
        <span class="tweak-label-val" id="paletteVal">marine</span>
      </div>
      <div class="tweak-palette" data-tweak="palette">
        <button class="tweak-swatch" data-v="marine">
          <div class="tweak-swatch-grad" style="background:linear-gradient(135deg, #60A5FA, #A78BFA)"></div>
          <div class="tweak-swatch-name">MARINE</div>
        </button>
        <button class="tweak-swatch" data-v="sunset">
          <div class="tweak-swatch-grad" style="background:linear-gradient(135deg, #FB923C, #F472B6)"></div>
          <div class="tweak-swatch-name">SUNSET</div>
        </button>
        <button class="tweak-swatch" data-v="forest">
          <div class="tweak-swatch-grad" style="background:linear-gradient(135deg, #34D399, #2DD4BF)"></div>
          <div class="tweak-swatch-name">FOREST</div>
        </button>
        <button class="tweak-swatch" data-v="mono">
          <div class="tweak-swatch-grad" style="background:linear-gradient(135deg, #94A3B8, #CBD5E1)"></div>
          <div class="tweak-swatch-name">MONO</div>
        </button>
      </div>
    </div>

    <!-- Chart style -->
    <div class="tweak-group">
      <div class="tweak-label">
        <span>차트 스타일</span>
        <span class="tweak-label-val" id="chartStyleVal">crisp</span>
      </div>
      <div class="tweak-seg" data-tweak="chartStyle">

// Build a continuous month range across multiple years.
// In production, this gets replaced by the response from /api/filters.
function buildAllMonths(fromYM, toYM){
  const [fy, fm] = fromYM.split('-').map(Number);
  const [ty, tm] = toYM.split('-').map(Number);
  const out = [];
  let y = fy, m = fm;
  while (y < ty || (y === ty && m <= tm)) {
    out.push(`${y}-${String(m).padStart(2,'0')}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}

/* ─── Deterministic PRNG ────────────────────────────────────────────── */
function hash(...args){
  const s = args.join('|');
  let h = 2166136261;
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}
const rng = (...a) => (hash(...a) % 100000) / 100000;

function seasonality(ym){
  const m = parseInt(ym.split('-')[1]);
  const y = parseInt(ym.split('-')[0]);
  const yg = y === 2026 ? 1.46 : y === 2025 ? 1.24 : 1.0;
  const s = [0.76,0.82,0.94,1.06,1.18,1.22,1.07,0.95,1.13,1.31,1.46,1.38];
  return s[m-1] * yg;
}

/* ─── Mock weights ──────────────────────────────────────────────────── */
const HONBU_W = { '글로벌영업본부':0.54, '이커머스본부':0.30, '국내영업본부':0.16 };
const TEAM_W_BY_HONBU = {
  '글로벌영업본부': { '글로벌영업1팀':0.45, '글로벌영업2팀':0.38, '글로벌영업3팀':0.17 },
  '이커머스본부':   { '이커머스1팀':0.42, '이커머스2팀':0.36, 'D2C팀':0.22 },
  '국내영업본부':   { '국내영업팀':0.48, '면세팀':0.32, 'H&B팀':0.20 },
};
const ST_W = { 'B2B':0.72, 'B2C':0.28 };
const LINE_W = { 'Centella':0.30, 'Madagascar':0.18, 'Tea Tree':0.13, 'Hyalu Cica':0.16, 'Squalane':0.09, 'Probio-cica':0.08, 'Vitamin C':0.06 };
const CONT_W = { 'Asia':0.46, 'Europe':0.22, 'North America':0.18, 'Oceania':0.06, 'Latin America':0.05, 'Middle East':0.03 };

const BASE_MONTHLY = 3_200_000_000;

function activeMonths(){
  const s = Math.max(0, Math.min(state.rangeStart, state.rangeEnd));
  const e = Math.min(ALL_MONTHS.length - 1, Math.max(state.rangeStart, state.rangeEnd));
  return ALL_MONTHS.slice(s, e + 1);
}

function applySalesFilter(amount){
  if (state.category === 'sales' && state.salesView !== 'all') {
    return amount * (ST_W[state.salesView] || 1);
  }
  return amount;
}

function applyDrillFilter(amount){
  const d = state.drill[state.category];
  if (state.category === 'org') {
    if (d[0]) amount *= (HONBU_W[d[0]] || 0.2);
    if (d[1]) amount *= (TEAM_W_BY_HONBU[d[0]]?.[d[1]] || 0.3);
  } else if (state.category === 'region') {
    if (d[0]) amount *= (CONT_W[d[0]] || 0.05);
    if (d[1]) amount *= 0.10 + rng(d[1]) * 0.10;
    if (d[2]) amount *= 0.10 + rng(d[2]) * 0.08;
  } else if (state.category === 'product') {
    if (d[0]) amount *= (LINE_W[d[0]] || 0.1);
    if (d[1]) {
      const cats = CATEGORIES_BY_LINE[d[0]] || ['토너','크림','세럼'];
      amount *= 1 / cats.length * (0.7 + rng(d[1]) * 0.6);
    }
    if (d[2]) amount *= 0.15 + rng(d[2]) * 0.20;
  }
  return amount;
}

function monthlyTotal(ym){
  let v = BASE_MONTHLY * seasonality(ym);
  v = applySalesFilter(v);
  v = applyDrillFilter(v);
  return Math.round(v);
}

function profitFactors(){
  let gm = 0.42; let sga = 0.21;
  if (state.category === 'sales' && state.salesView === 'B2C') { gm = 0.58; sga = 0.34; }
  if (state.category === 'product' && state.drill.product[0]) {
    if (state.drill.product[0] === 'Centella') gm += 0.04;
    if (state.drill.product[0] === 'Vitamin C') gm += 0.06;
  }
  return { gm, sga };
}

function metricsForSales(amount){
  const { gm, sga } = profitFactors();
  const cogs = Math.round(amount * (1 - gm));
  const gp = amount - cogs;
  const sgaExp = Math.round(amount * sga);
  const oi = gp - sgaExp;
  return { cogs, gp, sga: sgaExp, oi };
}

// Synthesize a prior-period (전월) row for a breakdown item in mock-preview
// mode, so 조직/지역/상품/판매유형 detail views can show 전월비 without a
// backend — mirrors what the 요약 page does. Deterministic per item name so
// the numbers stay stable across re-renders.
function synthPriorRow(b){
  const r = (s) => rng(b.name || '', s);
  const dS = -0.06 + r('pS') * 0.20;   // 매출액     -6% .. +14%
  const dG = -0.08 + r('pG') * 0.24;   // 매출총이익 -8% .. +16%
  const dO = -0.12 + r('pO') * 0.32;   // 공헌이익   -12% .. +20%
  return {
    sales_amount:     (b.sales_amount     || 0) / (1 + dS),
    gross_profit:     (b.gross_profit     || 0) / (1 + dG),
    operating_income: (b.operating_income || 0) / (1 + dO),
  };
}

/* ─── Mock API ──────────────────────────────────────────────────────── */
const MockApi = {
  monthlyTrend(){
    const months = activeMonths();
    return months.map(ym => {
      const sales = monthlyTotal(ym);
      const m = metricsForSales(sales);
      return { Year_Month: ym, sales_amount: sales, cost_of_sales: m.cogs, gross_profit: m.gp, sga_expenses: m.sga, operating_income: m.oi };
    });
  },
  kpi(){
    const trend = this.monthlyTrend();
    const sum = k => trend.reduce((s, r) => s + r[k], 0);
    const sales = sum('sales_amount'), gp = sum('gross_profit'), oi = sum('operating_income');
    return {
      sales_amount: sales, cost_of_sales: sum('cost_of_sales'), gross_profit: gp,
      gross_margin: sales ? gp/sales*100 : 0,
      sga_expenses: sum('sga_expenses'), operating_income: oi,
      operating_margin: sales ? oi/sales*100 : 0,
      sales_quantity: Math.round(sales / 35000),
    };
  },
  // Breakdown of items at the current view dim, scoped to current drill filter.
  // Output: rows of {name, sales_amount, share, gross_margin, operating_margin, ...}
  breakdown(){
    const vl = state.viewLevel?.[state.category];
    const dl = state.drill[state.category].length;
    return this.breakdownAt(
      state.category,
      state.drill[state.category],
      (vl != null ? vl : dl),
    );
  },
  breakdownAt(category, drill, viewLevel){
    const months = activeMonths();
    // Compute total scoped to the (drill) filter
    const savedDrill = state.drill[category];
    state.drill[category] = drill;
    const totalNow = months.reduce((s, ym) => s + monthlyTotal(ym), 0);
    state.drill[category] = savedDrill;

    let items = [];
    if (category === 'org') {
      if (viewLevel === 0) {
        items = HONBUS.map(h => ({ name: h, _w: HONBU_W[h] }));
      } else {
        // viewLevel >= 1 → teams
        if (drill.length >= 1) {
          const teams = HONBU_TEAM_MAP[drill[0]] || [];
          items = teams.map(t => ({ name: t, _w: TEAM_W_BY_HONBU[drill[0]][t] || 0.3, parent: drill[0] }));
        } else {
          // all teams across all honbus
          items = [];
          HONBUS.forEach(h => {
            (HONBU_TEAM_MAP[h] || []).forEach(t => {
              items.push({ name: t, _w: (HONBU_W[h] || 0.2) * (TEAM_W_BY_HONBU[h]?.[t] || 0.3), parent: h });
            });
          });
        }
      }
    } else if (category === 'region') {
      if (viewLevel === 0) {
        items = CONTINENTS.map(c => ({ name: c, _w: CONT_W[c] || 0.04 }));
      } else if (viewLevel === 1) {
        let inCont = COUNTRIES;
        if (drill.length >= 1) inCont = COUNTRIES.filter(c => c.cont === drill[0]);
        const weights = inCont.map(c => ({ ...c, _w: 0.4 + rng(c.name) * 1.2 }));
        const totW = weights.reduce((s, x) => s + x._w, 0) || 1;
        items = weights.map(x => ({ name: x.name, flag: x.flag, _w: x._w / totW, parent: x.cont }));
      } else {
        // viewLevel === 2 → customers
        const all = CUSTOMERS.map(c => ({ name: c, _w: 0.4 + rng(c, drill.join('|')) * 1.2 }));
        const totW = all.reduce((s, x) => s + x._w, 0) || 1;
        items = all.map(x => ({ ...x, _w: x._w / totW })).sort((a, b) => b._w - a._w).slice(0, 15);
      }
    } else if (category === 'product') {
      if (viewLevel === 0) {
        items = LINES.map(l => ({ name: l, _w: LINE_W[l] || 0.1 }));
      } else if (viewLevel === 1) {
        let cats;
        if (drill.length >= 1) cats = CATEGORIES_BY_LINE[drill[0]] || ['토너','크림','세럼'];
        else cats = [...new Set(Object.values(CATEGORIES_BY_LINE).flat())];
        items = cats.map(c => ({ name: c, _w: 1/cats.length * (0.7 + rng(c, drill.join('|')) * 0.6), parent: drill[0] }));
      } else {
        // viewLevel === 2 → SKUs
        let skus = SKUS;
        if (drill.length >= 1) skus = skus.filter(s => s.line === drill[0]);
        if (drill.length >= 2) skus = skus.filter(s => s.cat === drill[1]);
        if (!skus.length) skus = SKUS;
        items = skus.map(s => ({ name: s.name, code: s.code, _w: 0.5 + rng(s.code) * 1.5 }));
      }
    } else if (category === 'sales') {
      const tos = state.salesView === 'all' ? SALES_TYPES : [state.salesView];
      items = tos.map(t => ({ name: t, _w: ST_W[t] / (state.salesView === 'all' ? 1 : ST_W[state.salesView]) }));
    }

    const totW = items.reduce((s, x) => s + x._w, 0) || 1;
    return items
      .map(it => {
        const share = it._w / totW;
        const sales = Math.round(totalNow * share);
        const m = metricsForSales(sales);
        const prevSales = sales * (0.85 + rng(it.name, 'prev') * 0.35);
        const delta = prevSales ? ((sales - prevSales) / prevSales) * 100 : 0;
        return {
          name: it.name, code: it.code, flag: it.flag, parent: it.parent,
          sales_amount: sales, share: share * 100,
          cost_of_sales: m.cogs, gross_profit: m.gp,
          gross_margin: sales ? m.gp / sales * 100 : 0,
          sga_expenses: m.sga, operating_income: m.oi,
          operating_margin: sales ? m.oi / sales * 100 : 0,
          delta,
        };
      })
      .sort((a, b) => b.sales_amount - a.sales_amount);
  },
  monthlyByCurrentDim(){
    // returns rows of {Year_Month, dim_value, sales_amount}
    const months = activeMonths();
    const rows = [];
    const breakdown = this.breakdown();
    months.forEach(ym => {
      const total = monthlyTotal(ym);
      breakdown.forEach(b => {
        rows.push({ Year_Month: ym, dim_value: b.name, sales_amount: Math.round(total * (b.share / 100)) });
      });
    });
    return rows;
  },
  raw(page = 1, perPage = 100){
    const months = activeMonths();
    const rows = [];
    months.forEach(ym => {
      for (let i = 0; i < 14; i++) {
        const seed = ym + i;
        const honbu = HONBUS[Math.floor(rng(seed, 'h') * HONBUS.length)];
        const brand = BRANDS[Math.floor(rng(seed, 'b') * BRANDS.length)];
        const team = HONBU_TEAM_MAP[honbu][Math.floor(rng(seed, 't') * HONBU_TEAM_MAP[honbu].length)];
        const st = rng(seed, 's') > 0.28 ? 'B2B' : 'B2C';
        const sku = SKUS[Math.floor(rng(seed, 'sk') * SKUS.length)];
        const country = COUNTRIES[Math.floor(rng(seed, 'c') * COUNTRIES.length)];
        const cust = CUSTOMERS[Math.floor(rng(seed, 'cu') * CUSTOMERS.length)];
        const qty = Math.round(800 + rng(seed, 'q') * 6000);
        const unit = 22000 + rng(seed, 'u') * 18000;
        const sales = Math.round(qty * unit * seasonality(ym) / 1.2);
        const m = metricsForSales(sales);
        rows.push({
          Year_Month: ym, Brand: brand, Honbu: honbu, Team: team, Sales_Type: st,
          Line: sku.line, Category: sku.cat,
          Continent1: CONT1_MAP[country.cont] || country.cont, Continent2: country.cont,
          Continent: country.cont, Country: country.name, Country_Flag: country.flag,
          Customer: cust, Product_Name: sku.name, Product_Code: sku.code, Specification: sku.spec,
          Sales_Quantity: qty, Sales_Amount: sales,
          Cost_of_Sales: m.cogs, Gross_Profit: m.gp,
          SG_and_A_Expenses: m.sga, Operating_Income: m.oi,
        });
      }
    });
    // apply state filters
    let f = rows;
    if (state.category === 'rawdata') {
      const rf = state.rawFilter;
      if (rf.brand)      f = f.filter(r => r.Brand === rf.brand);
      if (rf.group)      f = f.filter(r => r.Honbu === rf.group);
      if (rf.department) f = f.filter(r => r.Team === rf.department);
      if (rf.continent1) f = f.filter(r => r.Continent1 === rf.continent1);
      if (rf.continent)  f = f.filter(r => r.Continent === rf.continent);
      if (rf.country)    f = f.filter(r => r.Country === rf.country);
      if (rf.line)       f = f.filter(r => r.Line === rf.line);
      if (rf.category)   f = f.filter(r => r.Category === rf.category);
      if (rf.salesType)  f = f.filter(r => r.Sales_Type === rf.salesType);
    } else {
      const d = state.drill[state.category];
      if (state.category === 'org') {
        if (d[0]) f = f.filter(r => r.Honbu === d[0]);
        if (d[1]) f = f.filter(r => r.Team === d[1]);
      } else if (state.category === 'region') {
        if (d[0]) f = f.filter(r => r.Continent === d[0]);
        if (d[1]) f = f.filter(r => r.Country === d[1]);
        if (d[2]) f = f.filter(r => r.Customer === d[2]);
      } else if (state.category === 'product') {
        if (d[0]) f = f.filter(r => r.Line === d[0]);
        if (d[1]) f = f.filter(r => r.Category === d[1]);
        if (d[2]) f = f.filter(r => r.Product_Name === d[2]);
      } else if (state.category === 'sales' && state.salesView !== 'all') {
        f = f.filter(r => r.Sales_Type === state.salesView);
      }
    }
    if (state.rawSearch) {
      const q = state.rawSearch.toLowerCase();
      f = f.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
    }
    f.sort((a, b) => b.Year_Month.localeCompare(a.Year_Month) || b.Sales_Amount - a.Sales_Amount);
    const total = f.length;
    const start = (page - 1) * perPage;
    return { total, page, per_page: perPage, rows: f.slice(start, start + perPage) };
  },
};

/* ─── Real API client (used when USE_MOCK=false) ────────────────────── */
const RealApi = {
  _dimFor(cat, vl){
    if(cat==='org') return vl===0?'Group':'Department';
    if(cat==='region') return vl===0?'Continent2':vl===1?'Country':'Customer';
    if(cat==='product') return vl===0?'Line':vl===1?'Category':null;
    if(cat==='sales') return 'Sales_Type';
    return null;
  },
  _nameKey(cat, vl){
    if(cat==='org') return vl===0?'Brand':vl===1?'Group':'Department';
    if(cat==='region') return vl===0?'Continent1':vl===1?'Continent2':vl===2?'Country':'Customer';
    if(cat==='product') return vl===0?'Line':vl===1?'Category':'Product_Name';
    if(cat==='sales') return 'Sales_Type';
    return 'name';
  },
  _endpoint(cat, vl){
    if(cat==='org') return vl===0?'/api/group':vl===1?'/api/org-group':vl===2?'/api/department':null;
    if(cat==='region') return vl===0?'/api/continent1':vl===1?'/api/continent':vl===2?'/api/country':'/api/customer';
    if(cat==='product') return vl===0?'/api/line':vl===1?'/api/category':'/api/product';
    if(cat==='sales') return '/api/sales-type';
    return null;
  },
  buildParams(salesView){
    const p = new URLSearchParams();
    const months = activeMonths();
    if(months.length && months.length < ALL_MONTHS.length) months.forEach(m => p.append('months',m));
    else if(months.length) months.forEach(m => p.append('months',m));
    // Compute and append prior period months for comparison
    const _active = activeMonths();
    if(_active.length > 0){
      const _startIdx = ALL_MONTHS.indexOf(_active[0]);
      if(_startIdx >= _active.length){
        const _priorMonths = ALL_MONTHS.slice(_startIdx - _active.length, _startIdx);
        _priorMonths.forEach(m => p.append('prior_months', m));
      }
    }
    const cat = state.category;
    if(cat==='org'){
      fsArr(cat,0).forEach(v=>p.append('brand',v));
      fsArr(cat,1).forEach(v=>p.append('group',v));
      fsArr(cat,2).forEach(v=>p.append('department',v));
    } else if(cat==='region'){
      fsArr(cat,0).forEach(v=>p.append('continent1',v));
      fsArr(cat,1).forEach(v=>p.append('continent',v));
      fsArr(cat,2).forEach(v=>p.append('country',v));
      fsArr(cat,3).forEach(v=>p.append('customer',v));
    } else if(cat==='product'){
      fsArr(cat,0).forEach(v=>p.append('line',v));
      fsArr(cat,1).forEach(v=>p.append('category',v));
      fsArr(cat,2).forEach(v=>p.append('product',v));
    }
    const sv = salesView !== undefined ? salesView : state.salesView;
    if(sv && sv !== 'all') p.set('sales_type', sv);
    return p.toString();
  },
  _normalize(rows, cat, vl){
    const nk = this._nameKey(cat, vl);
    const total = rows.reduce((s,r)=>s+(r.sales_amount||0),0)||1;
    return rows.map(r=>({
      name: r[nk] || r.name || '(없음)',
      code: r.Product_Code || null,
      flag: null,
      parent: null,
      sales_amount: r.sales_amount||0,
      cost_of_sales: r.cost_of_sales||0,
      gross_profit: r.gross_profit||0,
      gross_margin: r.gross_margin||0,
      sga_expenses: r.sga_expenses||0,
      operating_income: r.operating_income||0,
      operating_margin: r.operating_margin||0,
      share: (r.sales_amount||0)/total*100,
      delta: 0,
    }));
  },
  async _fetchBreakdown(cat, drill, vl, basePStr){
    const p = new URLSearchParams(basePStr);
    // Ensure drill filters
    if(cat==='org'){
      if(drill[0]) p.set('brand', drill[0]); else p.delete('brand');
      if(drill[1]) p.set('group', drill[1]); else p.delete('group');
      if(drill[2]) p.set('department', drill[2]); else p.delete('department');
    } else if(cat==='region'){
      if(drill[0]) p.set('continent1', drill[0]); else p.delete('continent1');
      if(drill[1]) p.set('continent', drill[1]); else p.delete('continent');
      if(drill[2]) p.set('country', drill[2]); else p.delete('country');
      if(drill[3]) p.set('customer', drill[3]); else p.delete('customer');
    } else if(cat==='product'){
      if(drill[0]) p.set('line', drill[0]); else p.delete('line');
      if(drill[1]) p.set('category', drill[1]); else p.delete('category');
      if(drill[2]) p.set('product', drill[2]); else p.delete('product');
    }
    const ep = this._endpoint(cat, vl);
    if(!ep) return [];
    const rows = await fetch(ep+'?'+p).then(r=>r.json()).catch(()=>[]);
    return this._normalize(rows, cat, vl);
  },
  async prefetch(){
    const cat = state.category;
    const vl = state.viewLevel?.[cat] ?? 0;
    const drill = state.drill[cat] || [];
    const baseP = this.buildParams();
    const isSales = cat==='sales';

    // Single round-trip: server runs all queries in parallel and returns combined result
    const qs = `${baseP}&cat=${cat}&vl=${vl}`;
    const d = await fetch('/api/prefetch?'+qs).then(r=>r.json()).catch(()=>({}));

    _real.kpi = isSales
      ? { all: d.kpiAll||{}, B2B: d.kpiB2B||{}, B2C: d.kpiB2C||{} }
      : { all: d.kpi||{}, B2B: d.kpi||{}, B2C: d.kpi||{} };
    _real.trend = isSales
      ? { all: d.trend||[], B2B: d.trendB2B||[], B2C: d.trendB2C||[] }
      : { all: d.trend||[], B2B: d.trend||[], B2C: d.trend||[] };
    _real.trendByDim = d.trendByDim || [];
    _real.breakdown  = this._normalize(d.breakdown || [], cat, vl);
    _real.priorTrend     = { all: d.priorTrend || [] };
    _real.priorBreakdown = this._normalize(d.priorBreakdown || [], cat, vl);

    // Root tree cache key
    const rootKey = `${cat}|${drill.slice(0,vl).join(',')}|${vl}`;
    _real.treeData[rootKey] = _real.breakdown;

    // Fetch expanded children in parallel (individual calls, still cached on server)
    const expandedSet = state.expanded[cat] || new Set();
    const expandedList = [...expandedSet].slice(0, 8);
    const childFetches = expandedList.map(async key => {
      const parts = key.split(' > ');
      const childLevel = vl + parts.length;
      const maxDepth = CATEGORY_DEFS.find(c=>c.id===cat)?.path?.length ?? 3;
      if(childLevel >= maxDepth) return;
      const childDrill = parts;
      const childKey = `${cat}|${childDrill.join(',')}|${childLevel}`;
      if(_real.treeData[childKey]) return;
      const childRows = await this._fetchBreakdown(cat, childDrill, childLevel, baseP).catch(()=>[]);
      _real.treeData[childKey] = childRows;
    });
    await Promise.all(childFetches);

    // Raw table (if open)
    if(state.rawOpen){
      const rRes = await fetch(`/api/raw?${baseP}&page=${state.rawPage}&per_page=${state.rawPerPage}`).then(r=>r.json()).catch(()=>({total:0,page:1,per_page:100,rows:[]}));
      _real.raw = rRes;
      const rc = document.getElementById('rawCount');
      if(rc) rc.textContent = (rRes.total||0).toLocaleString()+'건';
    }
  },
};

const api = USE_MOCK ? MockApi : {
  kpi()   { return _real.kpi[state.salesView]||_real.kpi.all||{}; },
  monthlyTrend(){
    const raw = _real.trend[state.salesView]||_real.trend.all||[];
    const months = activeMonths();
    const byMonth = Object.fromEntries(raw.map(r=>[r.Year_Month,r]));
    return months.map(ym=>byMonth[ym]||{Year_Month:ym,sales_amount:0,gross_profit:0,operating_income:0,sga_expenses:0,cost_of_sales:0});
  },
  breakdown(){ return _real.breakdown||[]; },
  breakdownAt(cat, drill, level){
    const k=`${cat}|${drill.join(',')}|${level}`;
    return _real.treeData[k]||[];
  },
  monthlyByCurrentDim(){ return _real.trendByDim||[]; },
  raw(page, perPage){ return _real.raw||{total:0,page:1,per_page:100,rows:[]}; },
};

function fmtKRW(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return ((n||0)/1e12).toFixed(2) + '조';
  if (a >= 1e8)  return ((n||0)/1e8).toFixed(1) + '억';
  if (a >= 1e4)  return Math.round((n||0)/1e4).toLocaleString() + '만';
  return Math.round(n||0).toLocaleString();
}
function fmtFull(n){ return Math.round(n||0).toLocaleString('ko-KR'); }
function fmtPct(n){ return (n||0).toFixed(1) + '%'; }
function fmtDelta(n){ return (n>=0?'+':'') + (n||0).toFixed(1) + '%'; }
function fmtQty(n){
  const a = Math.abs(n || 0);
  if (a >= 1e8) return ((n||0)/1e8).toFixed(1) + '억';
  if (a >= 1e4) return ((n||0)/1e4).toFixed(1) + '만';

}

/* ─── Sparkline (inline SVG) ────────────────────────────────────────── */
function sparkline(values, color, w = 54, h = 26){
  if (!values || values.length < 2) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = w / (values.length - 1);
  const pts = values.map((v, i) => [i * stepX, h - ((v - min)/range)*(h-4) - 2]);
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = path + ` L ${w} ${h} L 0 ${h} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${area}" fill="${color}" opacity="0.18"/><path d="${path}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

/* ═════════════════════════════════════════════════════════════════════
   FILTERS UI — continuous month-range slider + quick presets
   ═════════════════════════════════════════════════════════════════════ */
const PRESETS = [
  { id:'3m',  label:'최근 3개월',  months: 3  },
  { id:'6m',  label:'최근 6개월',  months: 6  },
  { id:'12m', label:'최근 12개월', months: 12 },
  { id:'24m', label:'최근 24개월', months: 24 },
  { id:'ytd', label:'YTD',         months: null }, // computed dynamically
  { id:'all', label:'전체',        months: null },
];

function applyPreset(id){
  const total = ALL_MONTHS.length;
  if (id === 'all') { state.rangeStart = 0; state.rangeEnd = total - 1; }
  else if (id === 'ytd') {
    const lastYM = ALL_MONTHS[total - 1];
    const lastY = lastYM.split('-')[0];
    let firstIdx = total - 1;
    for (let i = total - 1; i >= 0; i--) {
      if (ALL_MONTHS[i].startsWith(lastY)) firstIdx = i;
      else break;
    }
    state.rangeStart = firstIdx; state.rangeEnd = total - 1;
  } else {
    const p = PRESETS.find(x => x.id === id);
    state.rangeEnd = total - 1;
    state.rangeStart = Math.max(0, total - p.months);
  }
  updatePeriodLabel();
  renderMonthGrid();
  renderPresetChips();
  scheduleApply(0);
}

function currentPresetId(){
  const total = ALL_MONTHS.length;
  if (state.rangeStart === 0 && state.rangeEnd === total - 1) return 'all';
  if (state.rangeEnd === total - 1) {
    const span = state.rangeEnd - state.rangeStart + 1;
    if (span === 3) return '3m';
    if (span === 6) return '6m';
    if (span === 12) return '12m';
    if (span === 24) return '24m';
    // ytd check
    const lastY = ALL_MONTHS[total - 1].split('-')[0];
    let firstIdx = total - 1;
    for (let i = total - 1; i >= 0; i--) {
      if (ALL_MONTHS[i].startsWith(lastY)) firstIdx = i;
      else break;
    }
    if (state.rangeStart === firstIdx) return 'ytd';
  }
  return null;
}

function renderPresetChips(){
  const wrap = $('#presetChips');
  if (!wrap) return;
  const cur = currentPresetId();
  wrap.innerHTML = '';
  PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'chip' + (cur === p.id ? ' active' : '');
    b.textContent = p.label;
    b.onclick = () => applyPreset(p.id);
    wrap.appendChild(b);
  });
}

function renderMonthGrid(){
  const container = $('#monthGrid');
  if(!container || !ALL_MONTHS.length) return;
  const s = Math.min(state.rangeStart, state.rangeEnd);
  const e = Math.max(state.rangeStart, state.rangeEnd);
  const years = [...new Set(ALL_MONTHS.map(m => m.slice(0,4)))];
  let html = '';
  years.forEach(yr => {
    html += `<div class="mg-year-row"><span class="mg-year">${yr}</span>`;
    for(let mo = 1; mo <= 12; mo++){
      const ym = `${yr}-${String(mo).padStart(2,'0')}`;
      const idx = ALL_MONTHS.indexOf(ym);
      const inRange = idx >= s && idx <= e;
      const isS = idx === s, isE = idx === e;
      const cls = idx === -1 ? 'disabled' : (isS||isE ? 'range-start in-range'+(isE&&!isS?' range-end':'') : inRange ? 'in-range' : '');
      const extra = idx === -1 ? '' : `data-idx="${idx}"`;
      html += `<span class="mg-month ${cls}" ${extra}>${mo}월</span>`;
    }
    html += '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.mg-month:not(.disabled)').forEach(el => {
    el.onclick = e2 => {
      const idx = parseInt(el.dataset.idx);
      if(e2.shiftKey){
        if(idx < state.rangeStart) state.rangeStart = idx;
        else state.rangeEnd = idx;
      } else {
        state.rangeStart = state.rangeEnd = idx;
      }
      updatePeriodLabel();
      renderMonthGrid();
      applyAll();
    };
  });
}

        <div class="cat-tab-path">${path}</div>
      </div>

  }).join('');
  $$('.cat-tab').forEach(b => b.onclick = () => switchCategory(b.dataset.cat));
  if (typeof updateNavRawBtn === 'function') updateNavRawBtn();
}
function switchCategory(cat){
  if (state.category === cat) return;
  state.category = cat;
  state.treeSearch = '';
  const _tsi = $('#treeSearchInput'); if (_tsi) _tsi.value = '';
  // reset drill within category? keep per-category drill, just switch view
  renderCatTabs();
  applyAll();
  if (window.lucide) lucide.createIcons();
}

   ═════════════════════════════════════════════════════════════════════ */
function renderCrumb(){
  const wrap = $('#crumbTrail');
  const cat = CATEGORY_DEFS.find(c => c.id === state.category);

  if (state.category === 'rawdata' || state.category === 'overview' || state.category === 'tableau') { wrap.innerHTML = ''; return; }
  if (state.category === 'sales') {
    wrap.innerHTML = `
      <span class="crumb-item crumb-root">${cat.label}</span>
      <span class="crumb-sep">→</span>
      <span class="crumb-item current">${state.salesView === 'all' ? '전체' : state.salesView}</span>
    `;
  } else {
    const vl = state.viewLevel[state.category];
    const fs = state.filterSel[state.category] || {};
    const parts = [`<span class="crumb-item crumb-root">${cat.label}</span>`];
    cat.path.forEach((p, i) => {
      parts.push(`<span class="crumb-sep">→</span>`);
      const isActive = vl === i;
      const selSet = fs[i];
      const chips = selSet && selSet.size
        ? [...selSet].map(v => `<span class="crumb-filter-chip">${v}</span>`).join('')
        : '';
      parts.push(`<button type="button" class="crumb-item${isActive ? ' current' : ''}" data-view-level="${i}">${p}별${chips}</button>`);
    });
    wrap.innerHTML = parts.join('');
    $$('#crumbTrail .crumb-item[data-view-level]').forEach(el => {
      el.onclick = () => {
        const lv = parseInt(el.dataset.viewLevel);
        state.viewLevel[state.category] = lv;
        // 클릭한 레벨 이하의 filterSel 클리어
        for (let k = lv; k <= 2; k++) { if (fs[k]) fs[k].clear(); }
        state.expanded[state.category] = new Set();
        applyAll();
      };
    });
  }

}

    tip.style.display = ''; tip.style.visibility = '';

    const vw = window.innerWidth, vh = window.innerHeight;
    const GAP = 8;

    // Prefer below, fall back to above
    let top = r.bottom + GAP;
    if (top + th > vh - 8) top = r.top - th - GAP;

    // Prefer centered on icon, stay within viewport
    let left = r.left + r.width / 2 - tw / 2;
    left = Math.max(8, Math.min(left, vw - tw - 8));

    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

function renderHeroShell(){
  const shell = $('#heroShell');
  if (!shell) return;
  if (state.category === 'rawdata' || state.category === 'tableau') { shell.style.display = 'none'; return; }
  shell.style.display = '';

  const k = api.kpi();
  const trend = api.monthlyTrend();
  const last = trend[trend.length - 1] || {};
  // Use priorTrend if available (set by prefetch when prior_months sent)
  const _priorTrend = (!USE_MOCK && _real.priorTrend) ? (_real.priorTrend.all || []) : [];
  const prv = _priorTrend.length > 0
    ? _priorTrend[_priorTrend.length - 1] || {}
    : (trend[trend.length - 2] || {});
  const halfN = Math.max(1, Math.floor(trend.length / 2));
  const recent = trend.slice(-halfN);
  const prior  = trend.slice(0, halfN);
  const sumK = (arr, key) => arr.reduce((s, r) => s + (r[key] || 0), 0);
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;

  // Month-over-month deltas (전월 대비)
  const dSales  = delta(last.sales_amount,     prv.sales_amount);
  const dGross  = delta(last.gross_profit,     prv.gross_profit);
  const dOI     = delta(last.operating_income, prv.operating_income);
  // contribution margin %p delta (전월 대비)
  const curMgn = (last.sales_amount ? last.operating_income/last.sales_amount*100 : 0);
  const prvMgn = (prv.sales_amount  ? prv.operating_income /prv.sales_amount *100 : 0);
  const dMgnPp = curMgn - prvMgn;

  const c = chartColors();
  const sp = key => trend.map(r => r[key] || 0);
  const heroMonths = (typeof activeMonths === 'function' ? activeMonths() : trend.map((_, i) => i + 1))
    .map(m => typeof m === 'string' ? m.slice(2).replace('-', '.') : m);

  const cards = [
    { label:'매출액',     valueHtml:`${fmtKRWNum(k.sales_amount)}<span class="unit">${fmtKRWUnit(k.sales_amount)}</span>`, color:c.accent,    cls:'',         delta:dSales, deltaSuffix:'%', spark:sp('sales_amount'),     hint:'매출액' },
    { label:'매출총이익', valueHtml:`${fmtKRWNum(k.gross_profit)}<span class="unit">${fmtKRWUnit(k.gross_profit)}</span>`, color:c.positive, cls:'green',   delta:dGross, deltaSuffix:'%', spark:sp('gross_profit'),    hint:'매출총이익' },
    { label:'공헌이익',   valueHtml:`${fmtKRWNum(k.operating_income)}<span class="unit">${fmtKRWUnit(k.operating_income)}</span>`, color: k.operating_income>=0 ? c.positive : c.negative, cls: k.operating_income>=0 ? 'green featured' : 'featured', delta:dOI, deltaSuffix:'%', spark:sp('operating_income'), hint:'공헌이익' },
    { label:'공헌이익률', valueHtml:`${(k.operating_margin||0).toFixed(1)}<span class="unit">%</span>`, color:c.plum, cls:'purple', delta:dMgnPp, deltaSuffix:'%p', spark:trend.map(r => r.sales_amount ? (r.operating_income/r.sales_amount)*100 : 0), hint:'공헌이익률', pct:true },
  ];

  const cardHtml = cards.map((it, i) => {
    const upDown = it.delta > 0.05 ? 'up' : it.delta < -0.05 ? 'down' : 'flat';
    const icon = it.delta > 0.05 ? 'trending-up' : it.delta < -0.05 ? 'trending-down' : 'minus';
    const deltaTxt = (it.delta >= 0 ? '+' : '') + it.delta.toFixed(1) + it.deltaSuffix;
    const hint = METRIC_FORMULAS && METRIC_FORMULAS[it.hint] ? `<span class="kpi-hint" data-metric="${it.hint}" tabindex="0">ⓘ</span>` : '';
    return `<div class="hero-kpi ${it.cls}">
      <div class="hero-kpi-label">${it.label}${hint}</div>
      <div class="hero-kpi-value">${it.valueHtml}</div>
      <div class="hero-kpi-delta">
        <span class="hero-kpi-delta-label">전월 대비</span>
        <span class="hero-kpi-delta-val ${upDown}"><i data-lucide="${icon}" class="ic"></i>${deltaTxt}</span>
      </div>
      <div class="hero-kpi-spark"><canvas id="heroSpark${i}"></canvas></div>
    </div>`;
  }).join('');

  // Summary comment lines
  const lines = [];
  lines.push(`매출은 전월 대비 ${formatDeltaSpan(dSales)} ${dSales >= 0 ? '증가' : '감소'}했습니다.`);
  if (Math.abs(dOI) > 0.5)
    lines.push(`공헌이익은 ${formatDeltaSpan(dOI)} ${dOI >= 0 ? '증가' : '감소'}하여 수익성에 ${dOI >= 0 ? '긍정적' : '부정적'} 영향을 주었습니다.`);
  if (Math.abs(dMgnPp) > 0.05)
    lines.push(`공헌이익률은 ${dMgnPp >= 0 ? '<span class="up">▲ ' : '<span class="down">▼ '}${Math.abs(dMgnPp).toFixed(1)}%p</span> ${dMgnPp >= 0 ? '개선' : '하락'}했습니다.`);

  const commentHtml = `<div class="summary-comment">
    <div class="summary-comment-hd">
      <div class="summary-comment-title"><i data-lucide="message-square-text" class="ic"></i>요약 코멘트</div>
      <span class="summary-comment-badge">AUTO</span>
    </div>
    <div class="summary-comment-body">
      ${lines.map(l => `<p><span>${l}</span></p>`).join('')}
    </div>
  </div>`;

  shell.innerHTML = `<div class="hero-kpi-grid">${cardHtml}</div>${commentHtml}`;
  if (window.lucide) lucide.createIcons();
  if (typeof attachMetricHints === 'function') attachMetricHints();

  // ── interactive mini line charts (month dots + hover tooltip) ──
  cards.forEach((it, i) => {
    destroyChart('heroSpark' + i);
    const cv = document.getElementById('heroSpark' + i);
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 56);
    grad.addColorStop(0, it.color + '33');
    grad.addColorStop(1, it.color + '00');
    charts['heroSpark' + i] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: heroMonths,
        datasets: [{
          data: it.spark,
          borderColor: it.color,
          backgroundColor: grad,
          borderWidth: 2,
          fill: true,
          tension: 0.34,
          pointRadius: 2,
          pointHoverRadius: 4.5,
          pointBackgroundColor: it.color,
          pointBorderColor: c.isDark ? '#131923' : '#fff',
          pointBorderWidth: 1.5,
          pointHitRadius: 14,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          datalabels: { display: false },
          tooltip: {
            backgroundColor: c.isDark ? '#0A0E14' : '#0D1829',
            titleColor: '#fff', bodyColor: '#fff', cornerRadius: 7, padding: 8,
            displayColors: false,
            titleFont: { size: 10.5, weight: 600 }, bodyFont: { size: 11, weight: 700, family: "'JetBrains Mono',monospace" },
            callbacks: {
              title: items => (items[0]?.label || '') + '월',
              label: ctx => ' ' + (it.pct ? (ctx.raw || 0).toFixed(1) + '%' : fmtKRW(ctx.raw)),
            },
          },
        },
        scales: { x: { display: false }, y: { display: false } },
        layout: { padding: { top: 4, bottom: 2 } },
      },
    });
  });
}

function formatDeltaSpan(v){
  const cls = v >= 0 ? 'up' : 'down';
  const sign = v >= 0 ? '▲ ' : '▼ ';
  return `<span class="${cls}">${sign}${Math.abs(v).toFixed(1)}%</span>`;
}

function fmtKRWUnit(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return '조원';
  if (a >= 1e8)  return '억원';
  if (a >= 1e4)  return '만원';
  return '원';
}

// Override fmtKRW for hero cards: return just the number portion (unit handled separately).
function fmtKRWNum(n){
  const a = Math.abs(n || 0);
  if (a >= 1e12) return ((n||0)/1e12).toFixed(2);
  if (a >= 1e8)  return ((n||0)/1e8).toFixed(1);
  if (a >= 1e4)  return Math.round((n||0)/1e4).toLocaleString();
  return Math.round(n||0).toLocaleString();
}

function changeFactorCardHtml(){
  const trend = api.monthlyTrend();

  const prior = _pt.length > 0 ? (_pt[_pt.length - 1] || {}) : (trend[trend.length - 2] || {});
  const g = (o, key) => o[key] || 0;
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;
  const dSales = delta(g(recent,'sales_amount'),     g(prior,'sales_amount'));
  const dCogs  = delta(g(recent,'cost_of_sales'),    g(prior,'cost_of_sales'));
  const dGross = delta(g(recent,'gross_profit'),     g(prior,'gross_profit'));
  const dSga   = delta(g(recent,'sga_expenses'),     g(prior,'sga_expenses'));
  const dOI    = delta(g(recent,'operating_income'), g(prior,'operating_income'));
  const curMgn = g(recent,'sales_amount') ? g(recent,'operating_income')/g(recent,'sales_amount')*100 : 0;
  const prvMgn = g(prior,'sales_amount')  ? g(prior,'operating_income') /g(prior,'sales_amount') *100 : 0;
  const dMgnPp = curMgn - prvMgn;
  const fr = (label, d, isPp) => {
    const up = d > 0.05, down = d < -0.05;
    const cls = up ? 'up' : down ? 'down' : 'flat';

    const word = up ? '증가' : down ? (isPp ? '하락' : '감소') : '유지';
    return `<div class="cf-row"><span class="cf-label">${label}</span><span class="cf-delta ${cls}">${arrow} ${Math.abs(d).toFixed(1)}${isPp?'%p':'%'}</span><span class="cf-word ${cls}">${word}</span></div>`;
  };
  return `<div class="change-factor-card">
    <div class="breakdown-list-hd"><i data-lucide="git-compare-arrows" class="ic"></i>증감 요인 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:10.5px;margin-left:2px">(전월 대비)</span></div>
    ${fr('매출액', dSales)}${fr('매출원가', dCogs)}${fr('매출총이익', dGross)}${fr('판매관리비', dSga)}${fr('공헌이익', dOI)}${fr('공헌이익률', dMgnPp, true)}
  </div>`;
}

  const _wfPt = (!USE_MOCK && _real.priorTrend) ? (_real.priorTrend.all || []) : [];
  const prior = _wfPt.length > 0 ? (_wfPt[_wfPt.length - 1] || {}) : (trend[trend.length - 2] || {});
  const sumK = (o, key) => o[key] || 0;
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;
  const dSales = delta(sumK(recent,'sales_amount'),     sumK(prior,'sales_amount'));
  const dCogs  = delta(sumK(recent,'cost_of_sales'),    sumK(prior,'cost_of_sales'));
  const dGross = delta(sumK(recent,'gross_profit'),     sumK(prior,'gross_profit'));
  const dSga   = delta(sumK(recent,'sga_expenses'),     sumK(prior,'sga_expenses'));
  const dOI    = delta(sumK(recent,'operating_income'), sumK(prior,'operating_income'));

  const dlt = (v) => {
    const cls = v > 0.5 ? 'up' : v < -0.5 ? 'down' : 'flat';
    const sign = v >= 0 ? '▲ ' : '▼ ';
    return `<span class="delta ${cls}">${sign}${Math.abs(v).toFixed(1)}%</span>`;
  };

  // 공헌이익률 %p delta
  const curMgn = sumK(recent,'sales_amount') ? sumK(recent,'operating_income')/sumK(recent,'sales_amount')*100 : 0;
  const prvMgn = sumK(prior,'sales_amount')  ? sumK(prior,'operating_income') /sumK(prior,'sales_amount') *100 : 0;
  const dMgnPp = curMgn - prvMgn;

  const factorRow = (label, d, isPp) => {
    const up = d > 0.05, down = d < -0.05;
    const cls = up ? 'up' : down ? 'down' : 'flat';
    const arrow = up ? '▲' : down ? '▼' : '–';
    const word = up ? '증가' : down ? (isPp ? '하락' : '감소') : '유지';
    const val = `${arrow} ${Math.abs(d).toFixed(1)}${isPp ? '%p' : '%'}`;
    return `<div class="cf-row">
      <span class="cf-label">${label}</span>
      <span class="cf-delta ${cls}">${val}</span>
      <span class="cf-word ${cls}">${word}</span>
    </div>`;
  };

  shell.innerHTML = `
    <div class="waterfall-card">
      <div class="waterfall-card-hd">
        <div>
          <div class="card-title"><i data-lucide="bar-chart-3"></i>손익 흐름 <span style="color:var(--text-tertiary);font-weight:500;font-size:11px;margin-left:4px">(누적)</span></div>
          <div class="card-sub" style="color:var(--text-tertiary);font-size:11px;margin-top:3px">매출액 → 매출원가 → 매출총이익 → 판매관리비 → 공헌이익 <span style="opacity:.8">· 막대 안 %는 매출 대비 비중</span></div>
        </div>
        <div class="waterfall-card-unit">단위: 억원</div>
      </div>
      <div class="waterfall-chart"><canvas id="waterfallChart"></canvas></div>
    </div>
    <div class="change-factor-card">
      <div class="breakdown-list-hd"><i data-lucide="git-compare-arrows" class="ic"></i>증감 요인 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:10.5px;margin-left:2px">(전월 대비)</span></div>
      ${factorRow('매출액', dSales)}
      ${factorRow('매출원가', dCogs)}
      ${factorRow('매출총이익', dGross)}
      ${factorRow('판매관리비', dSga)}
      ${factorRow('공헌이익', dOI)}
      ${factorRow('공헌이익률', dMgnPp, true)}
    </div>
  `;

  if (window.lucide) lucide.createIcons();
  buildWaterfallChart(k);
}

function buildWaterfallChart(k){
  destroyChart('waterfall');
  const ctx = resetCanvas('waterfallChart');
  if (!ctx) return;
  const c = chartColors();
  const sales = k.sales_amount || 0;
  const cogs  = k.cost_of_sales || 0;
  const gross = k.gross_profit  || 0;
  const sga   = k.sga_expenses  || 0;
  const oi    = k.operating_income || 0;

  // 5 floating-bar columns: [low, high] for each step
  const pctOf = (v) => sales ? (Math.abs(v) / sales * 100) : 0;
  const data = [
    { label:'매출액',    base:0,         top:sales,        color:c.accent,   value:sales, pct:100 },
    { label:'매출원가',  base:sales-cogs, top:sales,       color:c.tertiary, value:-cogs, isSub:true, pct:pctOf(cogs) },
    { label:'매출총이익', base:0,        top:gross,        color:c.positive, value:gross, isSubtotal:true, pct:pctOf(gross) },
    { label:'판매관리비', base:gross-sga, top:gross,       color: c.isDark ? '#5A6478' : '#AEB7C7', value:-sga, isSub:true, pct:pctOf(sga) },
    { label:'공헌이익',  base:0,         top:oi,           color:c.positive, value:oi, isSubtotal:true, emphasized:true, pct:pctOf(oi) },
  ];

  // floating bar requires array data [low, high]
  charts.waterfall = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.label),
      datasets: [{
        label: '',
        data: data.map(d => [d.base, d.top]),
        backgroundColor: data.map(d => d.color),
        borderColor: data.map(d => d.emphasized ? d.color : 'transparent'),
        borderWidth: data.map(d => d.emphasized ? 2 : 0),
        borderRadius: 5,
        borderSkipped: false,
        barPercentage: 0.62,
        categoryPercentage: 0.86,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: c.isDark ? '#0A0E14' : '#0D1829',
          titleColor: '#fff', bodyColor: '#fff',
          padding: 10, cornerRadius: 8,
          callbacks: {
            title: (items) => data[items[0].dataIndex].label,
            label: (item) => ' ' + fmtKRW(data[item.dataIndex].value),
            afterLabel: (item) => ' 매출 대비 ' + (data[item.dataIndex].pct || 0).toFixed(1) + '%',
          },
        },
        datalabels: {
          labels: {
            value: {
              display: true,
              anchor: (ctx) => data[ctx.dataIndex].value >= 0 ? 'end' : 'start',
              align: (ctx) => data[ctx.dataIndex].value >= 0 ? 'end' : 'start',
              offset: 7,
              clip: false,
              color: (ctx) => data[ctx.dataIndex].value >= 0 ? c.positive : c.negative,
              font: { family: "'JetBrains Mono',monospace", size: 11.5, weight: 800 },
              formatter: (v, ctx) => fmtKRW(data[ctx.dataIndex].value),
            },
            pct: {
              display: true,
              anchor: 'center',
              align: 'center',
              color: (ctx) => {
                const d = data[ctx.dataIndex];
                return d.isSubtotal ? '#FFFFFF' : (c.isDark ? '#E6E9EF' : '#2C3340');
              },
              backgroundColor: (ctx) => data[ctx.dataIndex].isSubtotal ? 'rgba(0,0,0,0.18)' : (c.isDark ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.74)'),
              borderRadius: 5,
              padding: { top: 3, bottom: 3, left: 6, right: 6 },
              font: { family: "'JetBrains Mono',monospace", size: 10, weight: 700 },
              formatter: (v, ctx) => (data[ctx.dataIndex].pct || 0).toFixed(1) + '%',
            },

/* ═════════════════════════════════════════════════════════════════════
   CHANGE DRIVERS — 이익 증가 TOP 3 / 공헌이익 감소 TOP 3 / 핵심 인사이트
   ═════════════════════════════════════════════════════════════════════ */
function renderChangeDriversShell(){
  const shell = $('#changeDriversShell');
  if (!shell) return;
  // Redundant with the per-category TOP5 cards (topNGrid) — hidden in this layout.
  shell.style.display = 'none';
  shell.innerHTML = '';
  return;
  // eslint-disable-next-line no-unreachable

  // Build "변화 요인" — synthetic for now; mock-style.
  // Real backend would need a YoY change-attribution endpoint.
  const k = api.kpi();
  const trend = api.monthlyTrend();
  const recent = trend[trend.length - 1] || {};
  const prior  = trend[trend.length - 2] || {};
  const sumK = (o, key) => o[key] || 0;
  const diff = (key) => sumK(recent, key) - sumK(prior, key);

  const dSales = diff('sales_amount');
  const dCogs  = diff('cost_of_sales');
  const dGross = diff('gross_profit');
  const dSga   = diff('sga_expenses');
  const dOI    = diff('operating_income');

  // 이익 증가 요인: revenue↑, gross↑, cost↓ (sign-negated)
  const upDrivers = [
    { label: '매출 증가',    value: dSales,   isUp: dSales > 0 },
    { label: '매출원가 개선', value: -dCogs,   isUp: dCogs < 0 },
    { label: '매출총이익',   value: dGross,   isUp: dGross > 0 },
  ].filter(d => d.isUp).sort((a,b) => b.value - a.value).slice(0, 3);

  // 감소 요인: sga↑, cogs↑, OI↓
  const downDrivers = [
    { label: '판매관리비 증가', value: -dSga,  isDown: dSga > 0 },
    { label: '매출원가 증가',   value: -dCogs, isDown: dCogs > 0 },
    { label: '매출 감소',      value: dSales, isDown: dSales < 0 },
  ].filter(d => d.isDown).sort((a,b) => a.value - b.value).slice(0, 3);

  const upHtml = upDrivers.length
    ? upDrivers.map(d => `<div class="insight-row"><span class="lab"><span class="dot"></span>${d.label}</span><span class="val pos">${(d.value>=0?'+':'')}${fmtKRW(d.value)}</span></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-tertiary);padding:8px 0">증가 요인이 식별되지 않았습니다.</div>';

  const downHtml = downDrivers.length
    ? downDrivers.map(d => `<div class="insight-row"><span class="lab"><span class="dot"></span>${d.label}</span><span class="val neg">${fmtKRW(d.value)}</span></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-tertiary);padding:8px 0">감소 요인이 식별되지 않았습니다.</div>';

  // 핵심 인사이트
  const insights = [];
  if (dSales > 0 && dOI < 0) insights.push('매출은 증가했지만 비용 증가로 <b>공헌이익이 소폭 감소</b>했습니다.');
  if (dSales > 0 && dOI > 0) insights.push('매출과 공헌이익이 <b>동반 성장</b> 중입니다.');
  if (dSales < 0 && dOI > 0) insights.push('매출은 감소했지만 비용 효율화로 <b>공헌이익은 개선</b>되었습니다.');
  if (dSales < 0 && dOI < 0) insights.push('매출과 공헌이익이 <b>동반 감소</b> — 즉시 점검이 필요합니다.');
  const sales0 = sumK(prior, 'sales_amount'), sales1 = sumK(recent, 'sales_amount');
  const mgn0 = sales0 ? sumK(prior, 'operating_income') / sales0 * 100 : 0;
  const mgn1 = sales1 ? sumK(recent, 'operating_income') / sales1 * 100 : 0;
  const dMgnPp = mgn1 - mgn0;
  if (Math.abs(dMgnPp) > 0.05) insights.push(`공헌이익률은 전월 대비 <b>${dMgnPp >= 0 ? '+' : ''}${dMgnPp.toFixed(1)}%p</b> ${dMgnPp >= 0 ? '개선' : '하락'}했습니다.`);
  const insightHtml = insights.length
    ? insights.map(s => `<p>${s}</p>`).join('')
    : '<p>특이 변동이 식별되지 않았습니다.</p>';

  shell.innerHTML = `
    <div class="insight-card up-card">
      <div class="insight-card-hd"><i data-lucide="trending-up" class="ic"></i>이익 증가 요인 TOP 3</div>
      ${upHtml}
    </div>
    <div class="insight-card down-card">
      <div class="insight-card-hd"><i data-lucide="trending-down" class="ic"></i>공헌이익 감소 요인 TOP 3</div>
      ${downHtml}
    </div>
    <div class="insight-card tip-card">
      <div class="insight-card-hd"><i data-lucide="lightbulb" class="ic"></i>핵심 인사이트</div>
      <div class="insight-card-body">${insightHtml}</div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
}
