async function tblLoadViews(){
  try {
    const r=await fetch('/api/views').then(r=>r.json());
    state.tableau.views=r.views||[];
    if (!state.tableau.views.length){
      const newView=await fetch('/api/views',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'시트 1',config:state.tableau.config})}).then(r=>r.json());
      state.tableau.views=[newView];state.tableau.currentId=newView.id;
    } else {
      state.tableau.currentId=state.tableau.views[0].id;
      tblApplyViewConfig(state.tableau.views[0].config);
    }
    tblRenderSheetTabs(); tblRenderShelfChips(); tblExecuteQuery();
  } catch(e){console.error('[tbl] views load error',e);}
}

function tblApplyViewConfig(cfg){
  const allowed=new Set([...state.tableau.fields.dimensions,...state.tableau.fields.measures]);
  const prune=arr=>(arr||[]).filter(f=>allowed.size===0||allowed.has(f));
  const c=JSON.parse(JSON.stringify(cfg));
  c.rows=prune(c.rows);c.columns=prune(c.columns);c.measures=prune(c.measures);
  if(c.color&&allowed.size&&!allowed.has(c.color))c.color=null;
  if(c.size&&allowed.size&&!allowed.has(c.size))c.size=null;
  if(c.label&&allowed.size&&!allowed.has(c.label))c.label=null;
  c.detail=prune(c.detail);
  if(c.measureAggs){Object.keys(c.measureAggs).forEach(f=>{if(allowed.size&&!allowed.has(f))delete c.measureAggs[f];});}
  else{c.measureAggs={};}
  if(c.fieldSorts&&!Array.isArray(c.fieldSorts)){
    c.fieldSorts=Object.entries(c.fieldSorts).map(([field,dir])=>({field,dir})).filter(s=>s.dir==='asc'||s.dir==='desc');
  }
  c.fieldSorts=(c.fieldSorts||[]).filter(s=>!allowed.size||allowed.has(s.field));
  /* 신규 키 기본값 보정 (구버전 저장 뷰 호환) */
  if(!c.dateGranularity)c.dateGranularity={};
  if(!c.tableCalcs)c.tableCalcs={};
  if(c.showRefLine===undefined)c.showRefLine=false;
  if(c.topN===undefined)c.topN=null;
  state.tableau.config=c;
}

function tblRenderSheetTabs(){
  const bar=$('#tblSheetTabs');
  if(!bar)return;
  bar.innerHTML=state.tableau.views.map(v=>
    `<div class="tbl-sheet-tab${v.id===state.tableau.currentId?' active':''}" data-id="${v.id}">` +
    `<span class="tbl-sheet-tab-name" contenteditable="false">${v.name}</span>` +
    `<span class="tbl-sheet-tab-del" data-id="${v.id}">×</span></div>`
  ).join('');
  $$('#tblSheetTabs .tbl-sheet-tab').forEach(tab=>{
    tab.onclick=e=>{if(e.target.classList.contains('tbl-sheet-tab-del'))return;const id=parseInt(tab.dataset.id);if(id===state.tableau.currentId)return;tblSwitchView(id);};
    const nameEl=tab.querySelector('.tbl-sheet-tab-name');
    nameEl.ondblclick=function(){
      this.contentEditable='true';this.focus();
      const sel=window.getSelection(),range=document.createRange();range.selectNodeContents(this);sel.removeAllRanges();sel.addRange(range);
      const finish=async()=>{this.contentEditable='false';const newName=this.textContent.trim()||'시트';const id=parseInt(tab.dataset.id);
        await fetch(`/api/views/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newName})});
        const v=state.tableau.views.find(v=>v.id===id);if(v)v.name=newName;};
      this.onblur=finish;this.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();this.blur();}};
    };
  });
  $$('#tblSheetTabs .tbl-sheet-tab-del').forEach(btn=>{
    btn.onclick=async()=>{
      const id=parseInt(btn.dataset.id);
      if(state.tableau.views.length<=1){alert('마지막 시트는 삭제할 수 없습니다');return;}
      if(!confirm('이 시트를 삭제할까요?'))return;
      await fetch(`/api/views/${id}`,{method:'DELETE'});
      state.tableau.views=state.tableau.views.filter(v=>v.id!==id);
      if(state.tableau.currentId===id){state.tableau.currentId=state.tableau.views[0].id;tblApplyViewConfig(state.tableau.views[0].config);}
      tblRenderSheetTabs();tblRenderShelfChips();tblExecuteQuery();
    };
  });
  const addBtn=$('#tblAddSheet');
  if(addBtn)addBtn.onclick=async()=>{
    const name=`시트 ${state.tableau.views.length+1}`;
    const emptyConfig=tblEmptyConfig();
    const newView=await fetch('/api/views',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,config:emptyConfig})}).then(r=>r.json());
    clearTimeout(state.tableau.saveTimer);
    state.tableau.views.push(newView);state.tableau.currentId=newView.id;state.tableau.config=JSON.parse(JSON.stringify(emptyConfig));
    /* 새 시트 — undo 히스토리 격리 */
    state.tableau.history=[JSON.stringify(state.tableau.config)];
    state.tableau.historyIndex=0;
    tblRenderSheetTabs();tblRenderShelfChips();tblSyncToolbar();tblRenderViz();
  };
}

function tblSwitchView(id){
  const v=state.tableau.views.find(v=>v.id===id);if(!v)return;
  /* 대기 중 자동저장 취소 — 이전 시트 config가 새 시트에 저장되는 것 방지 */
  clearTimeout(state.tableau.saveTimer);
  state.tableau.currentId=id;tblApplyViewConfig(v.config);
  /* 시트별 undo 히스토리 격리 — 다른 시트 config로 되돌리는 교차 오염 방지 */
  state.tableau.history=[JSON.stringify(state.tableau.config)];
  state.tableau.historyIndex=0;
  tblRenderSheetTabs();tblRenderShelfChips();tblSyncToolbar();tblExecuteQuery();
}

function tblMarkUnsaved(){const btn=$('#tblSaveBtn');if(btn){btn.textContent='저장';btn.classList.remove('saved');}}

function tblAutoSave(){
  clearTimeout(state.tableau.saveTimer);
  state.tableau.saveTimer=setTimeout(async()=>{
    const id=state.tableau.currentId;if(!id)return;
    await fetch(`/api/views/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:state.tableau.config})});
    const v=state.tableau.views.find(v=>v.id===id);if(v)v.config=JSON.parse(JSON.stringify(state.tableau.config));
    const btn=$('#tblSaveBtn');if(btn){btn.textContent='저장됨';btn.classList.add('saved');}
  },3000);
}

function tblShowAggSelector(event, fieldName){
  let drop=$('#tblAggDrop');
  if(!drop){drop=document.createElement('div');drop.id='tblAggDrop';drop.className='tbl-agg-drop';document.body.appendChild(drop);}
  const aggs=['SUM','AVG','MIN','MAX','COUNT','COUNTD'];
  const labels={COUNTD:'COUNTD (고유값수)'};
  const tableCalcOpts = [
    {key:'none',   label:'기본 집계'},
    {key:'pct_total',  label:'전체 대비 %'},
    {key:'running_sum',label:'누적 합계'},
    {key:'diff_prev',  label:'전기 대비 차이'},
  ];
  const currentAgg=(state.tableau.config.measureAggs||{})[fieldName]||'SUM';
  const currentCalc=(state.tableau.config.tableCalcs||{})[fieldName]||'none';
  drop.innerHTML=
    `<div class="tbl-agg-section-label">집계 방식</div>`+
    aggs.map(a=>`<div class="tbl-agg-opt${a===currentAgg?' active':''}" data-agg="${a}">${labels[a]||a}</div>`).join('')+
    `<div class="tbl-agg-section-label" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">테이블 계산</div>`+
    tableCalcOpts.map(o=>`<div class="tbl-agg-opt${o.key===currentCalc?' active':''}" data-calc="${o.key}">${o.label}</div>`).join('');
  drop.querySelectorAll('[data-agg]').forEach(opt=>{
    opt.onclick=()=>{
      if(!state.tableau.config.measureAggs)state.tableau.config.measureAggs={};
      state.tableau.config.measureAggs[fieldName]=opt.dataset.agg;
      drop.style.display='none';
      tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblExecuteQuery();
    };
  });
  drop.querySelectorAll('[data-calc]').forEach(opt=>{
    opt.onclick=()=>{
      if(!state.tableau.config.tableCalcs)state.tableau.config.tableCalcs={};
      if(opt.dataset.calc==='none') delete state.tableau.config.tableCalcs[fieldName];
      else state.tableau.config.tableCalcs[fieldName]=opt.dataset.calc;
      drop.style.display='none';
      tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblRenderViz();
    };
  });
  const r=event.target.getBoundingClientRect();
  drop.style.left=r.left+'px';drop.style.top=(r.bottom+4)+'px';drop.style.display='block';
  setTimeout(()=>{
    const close=(e)=>{if(!drop.contains(e.target)){drop.style.display='none';document.removeEventListener('click',close);}};
    document.addEventListener('click',close);
  },0);
}

/* 테이블 계산 적용 (클라이언트 사이드) */
function tblApplyTableCalcs(rows, measures, tableCalcs){
  if(!tableCalcs||!Object.keys(tableCalcs).length) return rows;
  const result = rows.map(r=>({...r}));
  measures.forEach(m=>{
    const calc = tableCalcs[m];
    if(!calc||calc==='none') return;
    if(calc==='pct_total'){
      const total = result.reduce((s,r)=>s+(r[m]||0),0);
      /* 합계 0이면 % 미정의 — 0%로 표기 (원시값을 %로 오인하는 것 방지) */
      result.forEach(r=>{ r[m+'__orig']=r[m]; r[m]=total?((r[m]||0)/total*100):0; });
    } else if(calc==='running_sum'){
      let acc=0;
      result.forEach(r=>{ r[m+'__orig']=r[m]; acc+=(r[m]||0); r[m]=acc; });
    } else if(calc==='diff_prev'){
      for(let i=result.length-1;i>=0;i--){
        result[i][m+'__orig']=result[i][m];
        result[i][m]= i>0 ? (result[i][m]||0)-(result[i-1][m]||0) : 0;
      }
    }
  });
  return result;
}

  document.getElementById('tblFiltSelAll').onclick=()=>{currentSel=new Set(allValues);renderList(document.getElementById('tblFiltSearch').value);};
  document.getElementById('tblFiltSelNone').onclick=()=>{currentSel.clear();renderList(document.getElementById('tblFiltSearch').value);};
  document.getElementById('tblFiltApply').onclick=()=>{
    if(!state.tableau.config.filters)state.tableau.config.filters={};
    state.tableau.config.filters[fieldName]=[...currentSel];
    overlay.style.display='none';
    tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblExecuteQuery();
  };
  // Top-N apply
  document.getElementById('tblTopnApply').onclick=()=>{
    const n=parseInt(document.getElementById('tblTopnN').value)||10;
    const dir=document.getElementById('tblTopnDir').value;
    const measure=document.getElementById('tblTopnMeasure').value;
    if(!measure){alert('측정값을 먼저 추가하세요');return;}
    state.tableau.config.topN={n,dir,measure};
    overlay.style.display='none';
    tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblExecuteQuery();
  };
  document.getElementById('tblTopnClear').onclick=()=>{
    state.tableau.config.topN=null;
    overlay.style.display='none';
    tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblExecuteQuery();
  };
  // Wildcard apply
  document.getElementById('tblWildcardApply').onclick=()=>{
    const raw=document.getElementById('tblWildcardInput').value;
    const exclude=document.getElementById('tblWildcardExclude').checked;
    if(!raw.trim()){alert('패턴을 입력하세요');return;}
    // Store as wildcard meta; client-side filtering of current result
    // For simplicity store as __wildcard__ special key
    if(!state.tableau.config.filters)state.tableau.config.filters={};
    // Use special prefix __wc__ to mark wildcard filters
    const key='__wc__'+fieldName;
    state.tableau.config.filters[key]={patterns:raw.split(',').map(s=>s.trim()).filter(Boolean), exclude, field:fieldName};
    overlay.style.display='none';
    tblRenderShelfChips();tblMarkUnsaved();tblAutoSave();tblExecuteQuery();
  };
  try{
    const r=await fetch(`/api/tableau/filter-values?field=${encodeURIComponent(fieldName)}`).then(r=>r.json());
    allValues=r.values||[];
    renderList('');
  }catch(e){
    const list=document.getElementById('tblFiltValList');
    if(list)list.innerHTML='<div style="padding:12px;text-align:center;color:var(--danger,#f87171);font-size:12px">값 로드 실패</div>';
  }
}

function tblExportCSV(){
  const result=state.tableau.queryResult;
  if(!result||!result.rows||!result.rows.length){alert('내보낼 데이터가 없습니다');return;}
  const cols=result.columns||[];
  /* 테이블 계산 활성 시 화면과 동일한 값으로 내보내기 */
  const tc=state.tableau.config.tableCalcs||{};
  const exportRows=Object.keys(tc).length?tblApplyTableCalcs(result.rows,result.measures||[],tc):result.rows;
  let csv=cols.join(',')+'\n';
  exportRows.forEach(row=>{
    csv+=cols.map(c=>{const v=row[c]??'';const s=String(v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')+'\n';
  });
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`커스텀분석_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function tblExportPNG(){
  const inst=state.tableau.echartsInst;
  if(!inst){alert('저장할 차트가 없습니다 (피벗 모드에서는 PNG 저장이 불가합니다)');return;}
  try{
    const url=inst.getDataURL({type:'png',pixelRatio:2,backgroundColor:document.documentElement.classList.contains('theme-dark')?'#1e2027':'#ffffff'});
    const a=document.createElement('a');a.href=url;a.download=`커스텀분석_${new Date().toISOString().slice(0,10)}.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){alert('PNG 저장 실패: '+e.message);}
}

function renderTopNCards(breakdown){
  const grid = $('#topNGrid');
  if (!grid) return;
  const cat = CATEGORY_DEFS.find(c => c.id === state.category);
  const lv = state.viewLevel?.[state.category] ?? 0;
  const dimLabel = cat?.path?.[lv] || cat?.label || '항목';

  // Prior-period lookup: real backend data when available, otherwise
  // synthesized in mock-preview mode so 전월비 shows like the 요약 page.
  const priorBkd = (!USE_MOCK && _real.priorBreakdown) ? _real.priorBreakdown : [];
  const priorMap = Object.fromEntries(priorBkd.map(b => [b.name, b]));
  const hasPrior = USE_MOCK ? true : priorBkd.length > 0;

  const items = breakdown.map(b => {
    const oi = b.operating_income || 0;
    const sales = b.sales_amount || 0;
    const margin = sales ? oi / sales * 100 : 0;
    const pb = USE_MOCK ? synthPriorRow(b) : (priorMap[b.name] || {});
    const priorOI = pb.operating_income || 0;
    const priorSales = pb.sales_amount || 0;
    const priorMargin = priorSales ? priorOI / priorSales * 100 : 0;
    return {
      name: b.name,
      flag: b.flag,
      oiDelta: oi - priorOI,
      oiDeltaPct: priorOI ? ((oi - priorOI) / Math.abs(priorOI)) * 100 : 0,
      marginDeltaPp: margin - priorMargin,
    };
  });

  const oiTop = items.slice().sort((a,b) => b.oiDelta - a.oiDelta).slice(0, 5);
  const mgnTop = items.slice().sort((a,b) => b.marginDeltaPp - a.marginDeltaPp).slice(0, 5);

  const periodLabel = hasPrior ? '전월 대비' : '—';

  function row(it, idx, type){
    const flag = it.flag ? `${it.flag} ` : '';
    if (type === 'oi') {
      const cls = it.oiDelta >= 0 ? 'pos' : 'neg';
      const sign = it.oiDelta >= 0 ? '+' : '';
      const dt = it.oiDeltaPct;
      const dtCls = dt >= 0 ? 'up' : 'down';
      const dtIcon = dt >= 0 ? 'trending-up' : 'trending-down';
      return `<div class="topn-row"><span class="rnk">${idx+1}</span><span class="nm">${flag}${it.name}</span><span class="vl ${cls}">${sign}${fmtKRW(it.oiDelta)}</span><span class="dt ${dtCls}"><i data-lucide="${dtIcon}" class="ic"></i>${Math.abs(dt).toFixed(1)}%</span></div>`;
    } else {
      const cls = it.marginDeltaPp >= 0 ? 'pos' : 'neg';
      const sign = it.marginDeltaPp >= 0 ? '+' : '';
      const dtCls = it.marginDeltaPp >= 0 ? 'up' : 'down';
      const dtIcon = it.marginDeltaPp >= 0 ? 'trending-up' : 'trending-down';
      return `<div class="topn-row"><span class="rnk">${idx+1}</span><span class="nm">${flag}${it.name}</span><span class="vl ${cls}">${sign}${it.marginDeltaPp.toFixed(1)}%p</span><span class="dt ${dtCls}"><i data-lucide="${dtIcon}" class="ic"></i></span></div>`;
    }
  }

  const oiCard = `<div class="topn-card">
    <div class="topn-card-hd">
      <div class="topn-card-title">${dimLabel}별 공헌이익 증감 TOP 5</div>
      <div class="topn-card-sub">${periodLabel}</div>
    </div>
    ${oiTop.map((it, i) => row(it, i, 'oi')).join('')}
  </div>`;

  const mgnCard = `<div class="topn-card">
    <div class="topn-card-hd">
      <div class="topn-card-title">${dimLabel}별 공헌이익률 증감 TOP 5</div>
      <div class="topn-card-sub">${periodLabel}</div>
    </div>
    ${mgnTop.map((it, i) => row(it, i, 'mgn')).join('')}
  </div>`;

  grid.innerHTML = oiCard + mgnCard;
  if (window.lucide) lucide.createIcons();
}

function renderDetailSummaryTable(breakdown){
  const wrap = $('#detailSummaryTable');
  if (!wrap) return;
  const cat = CATEGORY_DEFS.find(c => c.id === state.category);
  const lv = state.viewLevel?.[state.category] ?? 0;
  const dimLabel = cat?.path?.[lv] || cat?.label || '항목';
  const catLabel = cat?.label || '';

  // Prior-period: real backend data when available, otherwise synthesized
  // in mock-preview mode so 전월비 shows like the 요약 page.
  const priorBkd = (!USE_MOCK && _real.priorBreakdown) ? _real.priorBreakdown : [];
  const priorMap = Object.fromEntries(priorBkd.map(b => [b.name, b]));
  const hasPrior = USE_MOCK ? true : priorBkd.length > 0;
  const periodLabel = hasPrior ? '전월 대비' : '—';

  const tot = breakdown.reduce((acc, b) => {
    acc.sales += b.sales_amount || 0;
    acc.gross += b.gross_profit || 0;
    acc.oi    += b.operating_income || 0;
    return acc;
  }, { sales: 0, gross: 0, oi: 0 });
  const totMgn = tot.sales ? tot.oi / tot.sales * 100 : 0;

  const priorTot = (USE_MOCK ? breakdown.map(synthPriorRow) : priorBkd).reduce((acc, b) => {
    acc.sales += b.sales_amount || 0;
    acc.gross += b.gross_profit || 0;
    acc.oi    += b.operating_income || 0;
    return acc;
  }, { sales: 0, gross: 0, oi: 0 });
  const priorTotMgn = priorTot.sales ? priorTot.oi / priorTot.sales * 100 : 0;

  const pctDelta = (cur, prv) => prv ? (cur - prv) / Math.abs(prv) * 100 : null;
  const ppDelta  = (cur, prv) => hasPrior ? cur - prv : null;

  function deltaCell(v, suffix){
    if (v === undefined || v === null) return '<td class="num">—</td>';
    const cls = v > 0.1 ? 'up' : v < -0.1 ? 'down' : 'flat';
    const sign = v >= 0 ? '+' : '';
    return `<td class="num"><span class="delta ${cls}">${cls==='up'?'▲ ':cls==='down'?'▼ ':'— '}${sign}${v.toFixed(1)}${suffix||'%'}</span></td>`;
  }

  function bodyRow(b, depth){
    const pb = USE_MOCK ? synthPriorRow(b) : (priorMap[b.name] || {});
    const margin = (b.sales_amount) ? b.operating_income / b.sales_amount * 100 : 0;
    const priorMargin = (pb.sales_amount) ? (pb.operating_income||0) / pb.sales_amount * 100 : 0;
    const dSales = pctDelta(b.sales_amount, pb.sales_amount);
    const dGross = pctDelta(b.gross_profit, pb.gross_profit);
    const dOI    = pctDelta(b.operating_income, pb.operating_income);
    const dMgn   = ppDelta(margin, priorMargin);
    const flag = b.flag ? `${b.flag} ` : '';
    const cls = depth === 0 ? 'label parent' : 'label indent';
    return `<tr class="${depth===0?'is-parent':''}">
      <td class="${cls}">${flag}${b.name}</td>
      <td class="num">${fmtKRW(b.sales_amount)}</td>
      ${deltaCell(dSales)}
      <td class="num">${fmtKRW(b.gross_profit)}</td>
      ${deltaCell(dGross)}
      <td class="num">${fmtKRW(b.operating_income)}</td>
      ${deltaCell(dOI)}
      <td class="num">${(b.operating_margin||0).toFixed(1)}%</td>
      ${deltaCell(dMgn, '%p')}
    </tr>`;
  }

  const maxDepth = cat?.path?.length || 1;
  const canChild = lv < maxDepth - 1 && typeof api.breakdownAt === 'function';
  const rows = breakdown.slice(0, 20).map(b => {
    let html = bodyRow(b, 0);
    if (canChild) {
      let kids = [];
      try { kids = api.breakdownAt(state.category, [b.name], lv + 1) || []; } catch(e) { kids = []; }
      html += kids.slice(0, 12).map(kb => bodyRow(kb, 1)).join('');
    }
    return html;
  }).join('');

  const totDSales = pctDelta(tot.sales, priorTot.sales);
  const totDGross = pctDelta(tot.gross, priorTot.gross);
  const totDOI    = pctDelta(tot.oi,    priorTot.oi);
  const totDMgn   = ppDelta(totMgn, priorTotMgn);

  wrap.innerHTML = `
    <div class="detail-tbl-wrap">
      <div class="detail-tbl-hd">
        <div class="detail-tbl-title"><i data-lucide="table-2" class="ic"></i>${catLabel} 성과 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:11px;margin-left:4px">(누적)</span></div>
        <div class="detail-tbl-tools">단위: 억원, % &nbsp;·&nbsp; * ${periodLabel}</div>
      </div>

// Build a flat tree array for hlist rendering. Uses breakdownAt with explicit
// drill+level (no state mutation), starting at state.viewLevel.
function buildTree(category){
  const cat = CATEGORY_DEFS.find(c => c.id === category);
  const maxDepth = cat.path.length;
  const viewLevel = state.viewLevel?.[category] ?? 0;
  const expandedSet = state.expanded[category] || new Set();
  const initialDrill = state.drill[category].slice(0, viewLevel);
  const result = [];

  function walk(currentDrill, depthFromView){
    const level = viewLevel + depthFromView;
    const rows = api.breakdownAt
      ? api.breakdownAt(category, currentDrill, level)
      : (function(){
          // Fallback for real API: temp-mutate state.drill
          const saved = state.drill[category];
          state.drill[category] = currentDrill;
          const r = api.breakdown();
          state.drill[category] = saved;
          return r;
        })();
    rows.forEach((r, idx) => {
      const key = [...currentDrill, r.name].join(' > ');
      const hasChildren = level < maxDepth - 1;
      const isExpanded = expandedSet.has(key);
      result.push({
        ...r, depth: depthFromView, key, hasChildren, expanded: isExpanded,
        ancestors: currentDrill, siblingRank: idx + 1,
      });
      if (isExpanded && hasChildren) walk([...currentDrill, r.name], depthFromView + 1);
    });
  }
  walk(initialDrill, 0);
  return result;
}

function attachDrillClicks(){
  if (state.category === 'sales') {
    $$('.cat-tabs ~ * [data-sv]').forEach(b => b.onclick = () => {
      state.salesView = b.dataset.sv;
      applyAll();
    });
    return;
  }
  // Tree expand/collapse-all buttons (per current category)
  const expandAll = $('#treeExpandAll');
  const collapseAll = $('#treeCollapseAll');
  if (expandAll) expandAll.onclick = () => {
    const cat = state.category;
    if (cat === 'sales') return;
    const tree = buildTreeFullyExpanded(cat);
    state.expanded[cat] = new Set(tree.filter(n => n.hasChildren).map(n => n.key));
    applyAll();
  };
  if (collapseAll) collapseAll.onclick = () => {
    if (state.category === 'sales') return;
    state.expanded[state.category].clear();
    applyAll();
  };
}

// Build a fully-expanded tree (used by Expand All button) to discover all keys
function buildTreeFullyExpanded(category){
  const cat = CATEGORY_DEFS.find(c => c.id === category);
  const maxDepth = cat.path.length;
  const savedDrill = state.drill[category].slice();
  const savedExpanded = state.expanded[category];
  // Use a synthetic set that returns true for everything during walk
  state.expanded[category] = { has: () => true };
  const result = buildTree(category);
  state.expanded[category] = savedExpanded;
  state.drill[category] = savedDrill;
  return result;
}

function renderSalesDetailTable(opts){
  const wrap = $('#salesDetailTable');
  if (!wrap) return;
  const all = opts.all, b2b = opts.b2b, b2c = opts.b2c;
  function deltaCell(v, suffix){
    const cls = v > 0.1 ? 'up' : v < -0.1 ? 'down' : 'flat';
    const sign = v >= 0 ? '+' : '';
    return `<td class="num"><span class="delta ${cls}">${cls === 'up' ? '▲ ' : cls === 'down' ? '▼ ' : '— '}${sign}${v.toFixed(1)}${suffix||'%'}</span></td>`;
  }
  function rowFor(label, k, shareDenom, isTotal){
    const share = shareDenom ? (k.sales_amount / shareDenom * 100) : 100;
    const dS = ((Math.abs(hash(label,'s')) % 100) / 100 - 0.3) * 14;
    const dG = ((Math.abs(hash(label,'g')) % 100) / 100 - 0.3) * 16;
    const dO = ((Math.abs(hash(label,'o')) % 100) / 100 - 0.3) * 18;
    const dM = ((Math.abs(hash(label,'m')) % 100) / 100 - 0.5) * 3;
    const cls = isTotal ? ' class="is-total"' : '';
    return `<tr${cls}>
      <td class="label">${label}</td>
      <td class="num">${fmtKRW(k.sales_amount)}</td>
      <td class="num">${share.toFixed(1)}%</td>
      ${deltaCell(dS)}
      <td class="num">${fmtKRW(k.gross_profit)}</td>
      ${deltaCell(dG)}
      <td class="num">${fmtKRW(k.operating_income)}</td>
      ${deltaCell(dO)}
      <td class="num">${(k.operating_margin||0).toFixed(1)}%</td>
      ${deltaCell(dM, '%p')}
    </tr>`;
  }
  wrap.innerHTML = `
    <div class="detail-tbl-wrap">
      <div class="detail-tbl-hd">
        <div class="detail-tbl-title"><i data-lucide="table-2" class="ic"></i>판매유형별 성과 요약 <span style="font-weight:500;color:var(--text-tertiary);font-size:11px;margin-left:4px">(누적)</span></div>

      </div>
      <div class="detail-tbl-scroll">
        <table class="detail-tbl">
          <thead>
            <tr>
              <th>판매유형</th>
              <th class="num">매출액</th>
              <th class="num">비중</th>
              <th class="num">전월 대비</th>
              <th class="num">매출총이익</th>
              <th class="num">전월 대비</th>
              <th class="num">공헌이익</th>
              <th class="num">전월 대비</th>
              <th class="num">공헌이익률</th>
              <th class="num">전월 대비</th>
            </tr>
          </thead>
          <tbody>
            ${rowFor('B2B', b2b, all.sales_amount, false)}
            ${rowFor('B2C', b2c, all.sales_amount, false)}
            ${rowFor('전체', all, null, true)}

async function loadRawPage(){
  if(!USE_MOCK){
    const p = new URLSearchParams();
    activeMonths().forEach(m => p.append('months', m));
    if(state.rawFilter.group)       p.set('group',       state.rawFilter.group);
    if(state.rawFilter.department)  p.set('department',  state.rawFilter.department);
    if(state.rawFilter.continent1)  p.set('continent1',  state.rawFilter.continent1);
    if(state.rawFilter.continent)   p.set('continent',   state.rawFilter.continent);
    if(state.rawFilter.country)     p.set('country',     state.rawFilter.country);
    if(state.rawFilter.line)        p.set('line',        state.rawFilter.line);
    if(state.rawFilter.category)   p.set('category',   state.rawFilter.category);
    if(state.rawFilter.brand)      p.set('brand',      state.rawFilter.brand);
    if(state.rawFilter.salesType)  p.set('sales_type', state.rawFilter.salesType);
    p.set('page',     state.rawPage);
    p.set('per_page', state.rawPerPage);
    if(state.rawSearch) p.set('search', state.rawSearch);
    try{ _real.raw = await fetch('/api/raw?'+p).then(r=>r.json()); } catch(e){}
  }
  renderRaw();
}

function renderRaw(){
  if (state.category !== 'rawdata') return;
  const res = USE_MOCK ? api.raw(state.rawPage, state.rawPerPage) : (_real.raw||{total:0,page:1,per_page:100,rows:[],columns:[]});
  if($('#rawTotal')) $('#rawTotal').textContent = fmtFull(res.total);
  const pages = Math.max(1, Math.ceil(res.total / state.rawPerPage));
  if($('#rawPgInfo')) $('#rawPgInfo').textContent = `페이지 ${state.rawPage} / ${pages}`;

  // column name → Korean label mapping
  const COL_LABEL = {
    Year_Month:'연월', Group:'그룹', Honbu:'그룹', Department:'부서', Team:'부서',
    Sales_Type:'판매유형', Continent:'대륙', Continent1:'권역', Continent2:'대륙',
    Country:'국가', Country_Flag:'국기', Customer:'거래처', Brand:'브랜드',
    Line:'라인', Category:'카테고리', Product_Name:'품명', Product_Code:'품번',
    Specification:'규격', Sales_Quantity:'수량', Sales_Amount:'매출액',
    Cost_of_Sales:'매출원가', Gross_Profit:'매출총이익',
    SG_and_A_Expenses:'판관비', Operating_Income:'공헌이익',
  };
  const NUM_KRW  = new Set(['Sales_Amount','Cost_of_Sales','Gross_Profit','SG_and_A_Expenses','Operating_Income']);
  const NUM_QTY  = new Set(['Sales_Quantity']);

  // fixed display order (user-specified)
  const COL_ORDER = [
    'Year_Month',
    'Brand',
    'Sales_Type',
    USE_MOCK ? 'Honbu' : 'Group',
    USE_MOCK ? 'Team'  : 'Department',
    'Customer',
    'Continent1', 'Continent2', 'Country',
    'Line', 'Category',
    'Product_Code', 'Product_Name', 'Specification',
    'Sales_Quantity',
    'Sales_Amount', 'Cost_of_Sales', 'Gross_Profit', 'SG_and_A_Expenses', 'Operating_Income',
  ];

  // available keys from data (to skip columns that don't exist in this dataset)
  const available = new Set(
    (res.columns && res.columns.length)
      ? res.columns
      : (res.rows[0] ? Object.keys(res.rows[0]) : [])
  );
  const cols = COL_ORDER.filter(c => available.has(c));

  // update thead
  const thead = $('#rawThead');
  if(thead) thead.innerHTML = '<tr>' + cols.map(c => {
    const num = NUM_KRW.has(c) || NUM_QTY.has(c);
    return `<th${num?' class="num"':''}>${COL_LABEL[c]||c}</th>`;
  }).join('') + '</tr>';

  const rawTb = $('#rawTb');
  const esc = s => String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  if(rawTb) rawTb.innerHTML = res.rows.map(r => {
    const flag = r.Country_Flag || '';
    return '<tr>' + cols.map(c => {
      const v = r[c];
      const sv = v == null ? '' : String(v);
      if(c === 'Sales_Type') return `<td><span class="pill ${v==='B2C'?'b2c':'b2b'}">${sv}</span></td>`;
      if(c === 'Country' && flag) return `<td class="td-clip-sm"><span class="flag">${flag}</span> ${sv}</td>`;
      if(c === 'Year_Month' || c === 'Product_Code') return `<td class="mono td-clip-sm">${sv}</td>`;
      if(NUM_KRW.has(c)){
        const n = Number(v)||0;
        const cls = (c==='Gross_Profit'||c==='Operating_Income') ? (n>=0?'pos':'neg') : '';
        return `<td class="num">${cls?`<span class="${cls}">`:''}${fmtKRW(n)}${cls?'</span>':''}</td>`;
      }
      if(NUM_QTY.has(c)) return `<td class="num">${fmtFull(Number(v)||0)}</td>`;
      return `<td class="td-clip-sm" title="${esc(sv)}">${sv}</td>`;
    }).join('') + '</tr>';
  }).join('');
  // pagination
  const rawPagi = $('#rawPagi');
  if(!rawPagi) return;
  const cur = state.rawPage, win = 5;
  let from = Math.max(1, cur - Math.floor(win / 2));
  let to = Math.min(pages, from + win - 1);
  if (to - from < win - 1) from = Math.max(1, to - win + 1);
  const btn = (label, page, dis = false, act = false) => `<button class="pg-btn${act ? ' active' : ''}" ${dis ? 'disabled' : ''} data-page="${page}">${label}</button>`;
  let html = btn('‹‹', 1, cur === 1) + btn('‹', cur - 1, cur === 1);
  for (let i = from; i <= to; i++) html += btn(i, i, false, i === cur);
  html += btn('›', cur + 1, cur === pages) + btn('››', pages, cur === pages);
  html += `<span class="pg-info">${(cur-1)*state.rawPerPage + 1} – ${Math.min(cur*state.rawPerPage, res.total)} / ${fmtFull(res.total)}</span>`;
  rawPagi.innerHTML = html;
  $$('#rawPagi .pg-btn').forEach(b => b.onclick = () => {
    const p = parseInt(b.dataset.page);
    if (!isNaN(p) && p !== state.rawPage) {
      state.rawPage = p;
      if(USE_MOCK){ renderRaw(); } else { loadRawPage(); }
    }
  });
}

async function downloadCSV(){
  if(USE_MOCK){ alert('\uBAA8\uC758 \uB370\uC774\uD130 \uBAA8\uB4DC\uC5D0\uC11C\uB294 \uB2E4\uC6B4\uB85C\uB4DC\uAC00 \uC9C0\uC6D0\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.'); return; }

  // Build filter params \u2014 use activeMonths() to respect current slider range
  const p = new URLSearchParams();
  activeMonths().forEach(m => p.append('months', m));
  if(state.rawFilter.group)       p.append('group',       state.rawFilter.group);
  if(state.rawFilter.department)  p.append('department',  state.rawFilter.department);
  if(state.rawFilter.continent1)  p.append('continent1',  state.rawFilter.continent1);
  if(state.rawFilter.continent)   p.append('continent',   state.rawFilter.continent);
  if(state.rawFilter.country)     p.append('country',     state.rawFilter.country);
  if(state.rawFilter.line)        p.append('line',        state.rawFilter.line);
  if(state.rawFilter.category)   p.append('category',   state.rawFilter.category);
  if(state.rawFilter.salesType)  p.append('sales_type', state.rawFilter.salesType);
  if(state.rawSearch)            p.set('search',        state.rawSearch);

  const CHUNK = 300000;
  const ts = () => new Date().toISOString().slice(0,19).replace(/[-:]/g,'').replace('T','_');

  _setCsvProgress(0, '\uB370\uC774\uD130 \uAC74\uC218 \uD655\uC778 \uC911\u2026');

  try {
    // 1. Get total row count
    const cntRes = await fetch('/api/export-count?' + p);
    if(!cntRes.ok) throw new Error('\uAC74\uC218 \uC870\uD68C \uC2E4\uD328: ' + cntRes.status);
    const { count } = await cntRes.json();
    const chunks = Math.max(1, Math.ceil(count / CHUNK));

    _setCsvProgress(2, `\uCD1D ${count.toLocaleString()}\uD589 \u00B7 ${chunks}\uAC1C \uD30C\uC77C\uB85C \uBD84\uD560 \uB2E4\uC6B4\uB85C\uB4DC`);

    for(let i = 1; i <= chunks; i++){
      const from = ((i-1)*CHUNK+1).toLocaleString();
      const to   = Math.min(i*CHUNK, count).toLocaleString();
      const baseP = 2 + (i-1)/chunks*94;
      const sliceP = 94/chunks;

      _setCsvProgress(baseP, `\uD30C\uC77C ${i}/${chunks} \uC900\uBE44 \uC911\u2026 (${from}~${to}\uD589)`);

      const cp = new URLSearchParams(p);
      cp.set('chunk_size', CHUNK);
      cp.set('chunk_num',  i);

      const resp = await fetch('/api/export-csv?' + cp);
      if(!resp.ok) throw new Error(`\uC11C\uBC84 \uC624\uB958 (\uD30C\uC77C ${i}): ${resp.status}`);

      // streaming download \u2192 \uC810\uC9C4\uC801 progress
      const contentLength = resp.headers.get('Content-Length');
      const fileSize = contentLength ? parseInt(contentLength) : 0;
      const reader = resp.body.getReader();
      const buffers = [];
      let received = 0;
      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        buffers.push(value);
        received += value.length;
        const filePct = fileSize > 0 ? received/fileSize : 0;
        const curP = baseP + filePct * sliceP * 0.9;
        const rcvMB = (received/1048576).toFixed(1);
        const totMB = fileSize > 0 ? `/${(fileSize/1048576).toFixed(1)}MB` : 'MB';
        _setCsvProgress(curP, `\uD30C\uC77C ${i}/${chunks} \uC218\uC2E0 \uC911\u2026 ${rcvMB}${totMB}`);
      }

      const blob = new Blob(buffers);
      const suffix = chunks > 1 ? `_${i}of${chunks}` : '';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `FI_Export_${ts()}${suffix}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      _setCsvProgress(baseP + sliceP, `\uD30C\uC77C ${i}/${chunks} \uC800\uC7A5 \uC644\uB8CC`);
      if(i < chunks) await new Promise(r => setTimeout(r, 400));
    }

    _setCsvProgress(100, '\uBAA8\uB4E0 \uD30C\uC77C \uB2E4\uC6B4\uB85C\uB4DC \uC644\uB8CC!');
    setTimeout(_hideCsvProgress, 1800);
  } catch(e){
    _hideCsvProgress();
    alert('\uB2E4\uC6B4\uB85C\uB4DC \uC911 \uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4:\n' + e.message);
  }
}

/* ═════════════════════════════════════════════════════════════════════
   TREE RAIL — full hierarchy navigator (left context sidebar)
   ═════════════════════════════════════════════════════════════════════ */
// Returns hierarchy levels for a category: array of {opts, icon, childrenOf}
function treeHierarchy(cat){
  if (cat === 'org') {
    return {
      rootLabel: '전체', rootIcon: 'layout-grid',
      levels: [
        { icon:'tag', opts: USE_MOCK ? HONBUS : REAL_BRANDS },
        { icon:'gem', childrenOf: (parent) => USE_MOCK ? [] : (HIER_BRAND_GROUP[parent]||[]) },
        { icon:'users', childrenOf: (parent) => USE_MOCK ? (HONBU_TEAM_MAP[parent]||[]) : (HIER_GROUP_DEPT[parent]||[]) },
      ],
    };
  }
  if (cat === 'region') {
    return {
      rootLabel: '전체', rootIcon: 'layout-grid',
      levels: [
        { icon:'globe-2',  opts: USE_MOCK ? CONTINENTS : REAL_CONTINENTS1 },
        { icon:'map',      childrenOf: (parent) => USE_MOCK ? [] : (HIER_CONT1_CONT2[parent]||[]) },
        { icon:'map-pin',  childrenOf: (parent) => USE_MOCK ? COUNTRIES.filter(c=>c.cont===parent).map(c=>c.name) : (HIER_CONTINENT_COUNTRY[parent]||[]) },
        { icon:'briefcase', childrenOf: (parent) => USE_MOCK ? CUSTOMERS.slice(0, 8) : (HIER_COUNTRY_CUSTOMER[parent]||[]) },
      ],
    };
  }
  if (cat === 'product') {
    // Line ↔ Category are NOT strictly hierarchical, so the tree groups SKUs by
    // whichever axis the breadcrumb (viewLevel) selects:
    //   라인별(0) → 라인 > SKU,  카테고리별(1) → 카테고리 > SKU,  SKU별(2) → 라인 > SKU
    const vl = state.viewLevel?.product ?? 0;
    if (vl === 1) {
      const allCats = USE_MOCK ? [...new Set(Object.values(CATEGORIES_BY_LINE).flat())] : (typeof REAL_CATEGORIES !== 'undefined' ? REAL_CATEGORIES : []);
      return {
        rootLabel: '전체 상품', rootIcon: 'layout-grid',
        levels: [
          { icon:'package', opts: allCats },
          { icon:'box', childrenOf: (parent) => USE_MOCK ? SKUS.filter(s=>s.cat===parent).map(s=>s.name) : [] },
        ],
      };
    }
    return {
      rootLabel: '전체 상품', rootIcon: 'layout-grid',
      levels: [
        { icon:'git-branch', opts: USE_MOCK ? LINES : REAL_LINES },
        { icon:'box', childrenOf: (parent) => USE_MOCK ? SKUS.filter(s=>s.line===parent).map(s=>s.name) : [] },
      ],
    };
  }
  if (cat === 'sales') {
    return {
      rootLabel: '전체 판매유형', rootIcon: 'shopping-bag',
      levels: [
        { icon:'tag', opts: ['B2B', 'B2C'] },
      ],
    };
  }
  return null;
}

function renderTreeRail(){
  const shell = $('#layoutShell');
  const cat = state.category;
  const hasTree = ['org','region','product','sales'].includes(cat);
  if (!shell) return;

  shell.classList.toggle('no-tree', !hasTree);
  shell.classList.toggle('tree-collapsed', hasTree && state.treeCollapsed);
  if (!hasTree) return;
  const _sb = $('#treeRailSearch');
  if (_sb) _sb.style.display = (cat === 'sales') ? 'none' : 'flex';

  const scroll = $('#treeRailScroll');
  if (!scroll) return;
  const h = treeHierarchy(cat);
  if (!h) { scroll.innerHTML = ''; return; }

  // ── Sales category uses state.salesView (not drill) ───────────────
  if (cat === 'sales') {
    const rows = [];
    const allActive = !state.salesView || state.salesView === 'all';
    rows.push(`<div class="tree-node${allActive ? ' active' : ''}" data-sv="all" style="padding-left:8px">
      <span class="tw-chev leaf"></span>
      <i data-lucide="${h.rootIcon}" class="tw-ic"></i>
      <span class="tw-label">${h.rootLabel}</span>
    </div>`);
    h.levels[0].opts.forEach(name => {
      const active = state.salesView === name;
      rows.push(`<div class="tree-node${active ? ' active' : ''}" data-sv="${name}" data-depth="1" style="padding-left:24px">
        <span class="tw-chev leaf"></span>
        <i data-lucide="${h.levels[0].icon}" class="tw-ic"></i>
        <span class="tw-label">${name}</span>
      </div>`);
    });
    scroll.innerHTML = rows.join('');
    scroll.querySelectorAll('.tree-node').forEach(el => {
      el.addEventListener('click', () => {
        state.salesView = el.dataset.sv;
        applyAll();
      });
    });
    if (window.lucide) lucide.createIcons();
    return;
  }

  const exp = state.treeExpanded[cat];
  const drill = state.drill[cat];
  const rows = [];
  const term = (state.treeSearch || '').trim().toLowerCase();
  const searching = term.length > 0;
  const useCheckbox = (cat === 'region');

  // does the subtree rooted at this node contain a label matching the search term?
  function subtreeMatches(level, name, path){
    if (name.toLowerCase().includes(term)) return true;
    if (level >= h.levels.length - 1) return false;
    const next = h.levels[level+1];
    const kids = next.childrenOf ? (next.childrenOf(name, path)||[]) : [];
    return kids.some(k => k && subtreeMatches(level+1, k, [...path, k]));
  }

  // Root node "전체"
  const rootActive = drill.length === 0;
  if (!searching) {
    rows.push(`<div class="tree-node" data-depth="0" data-path="" style="padding-left:8px">
      <span class="tw-chev leaf"></span>
      <i data-lucide="${h.rootIcon}" class="tw-ic"></i>
      <span class="tw-label">${h.rootLabel}</span>
    </div>`);
  }

  // Recursive walk
  function walk(level, parentPath){
    if (level >= h.levels.length) return;
    const def = h.levels[level];
    let opts;
    if (level === 0) opts = def.opts || [];
    else opts = (def.childrenOf ? def.childrenOf(parentPath[parentPath.length-1], parentPath) : []);
    opts = opts.filter(o => o != null && String(o).trim() !== '');

    // Sort by sales_amount descending using cached breakdown data
    if (!USE_MOCK) {
      const _tk = level === 0 ? `${cat}||0` : `${cat}|${parentPath.join(',')}|${level}`;
      const _tr = (_real.treeData && _real.treeData[_tk]) || [];
      if (_tr.length > 0) {
        const _sm = Object.fromEntries(_tr.map(r => [r.name, r.sales_amount || 0]));
        opts = opts.slice().sort((a, b) => (_sm[b] || 0) - (_sm[a] || 0));
      }
    }

    opts.forEach(name => {
      const path = [...parentPath, name];
      const key = path.join(' > ');
      if (searching && !subtreeMatches(level, name, path)) return;
      const isExpanded = searching ? true : exp.has(key);
      const hasChildren = level < h.levels.length - 1 &&
        (h.levels[level+1].childrenOf ? (h.levels[level+1].childrenOf(name, path)||[]).filter(o=>o&&String(o).trim()).length > 0 : true);
      const active = drill.length === path.length && drill.every((v,i) => v === path[i]);
      const indent = 8 + (level + 1) * 16;
      const chev = hasChildren
        ? `<span class="tw-chev${isExpanded ? ' expanded' : ''}" data-toggle="${escapeAttr(key)}"><i data-lucide="chevron-right" class="ic"></i></span>`
        : `<span class="tw-chev leaf"></span>`;
      const checkbox = useCheckbox
        ? `<span class="tw-check${active ? ' checked' : ''}" style="position:relative"><i data-lucide="check" class="ic"></i></span>`
        : '';
      rows.push(`<div class="tree-node${active ? ' active' : ''}" data-depth="${level+1}" data-path="${escapeAttr(key)}" style="padding-left:${indent}px">
        ${chev}
        ${checkbox}
        <i data-lucide="${def.icon}" class="tw-ic"></i>
        <span class="tw-label">${name}</span>
      </div>`);
      if (isExpanded && hasChildren) walk(level + 1, path);
    });
  }
  walk(0, []);

  scroll.innerHTML = rows.join('');

  // Wire clicks
  scroll.querySelectorAll('.tw-chev[data-toggle]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const key = el.dataset.toggle;
      if (exp.has(key)) exp.delete(key); else exp.add(key);
      renderTreeRail();
    };
  });
  scroll.querySelectorAll('.tree-node').forEach(el => {
    el.addEventListener('click', () => {
      const pathStr = el.dataset.path;
      const path = pathStr ? pathStr.split(' > ') : [];
      const maxDepth = CATEGORY_DEFS.find(c => c.id === cat).path.length;
      // checkbox toggle-off: clicking the currently-active node clears to parent
      const isActiveNow = state.drill[cat].length === path.length && state.drill[cat].every((v,i)=>v===path[i]);
      const nextPath = (useCheckbox && isActiveNow) ? path.slice(0, -1) : path;
      state.drill[cat] = nextPath;
      // For product, the grouping axis is driven by the breadcrumb (viewLevel),
      // not by tree clicks — keep it; other categories advance with the path.
      if (cat !== 'product') state.viewLevel[cat] = Math.min(nextPath.length, maxDepth - 1);
      // auto-expand the clicked node so its children show in the tree
      if (nextPath.length) state.treeExpanded[cat].add(nextPath.join(' > '));
      // sync filterSel single-select so other UI stays consistent
      if (state.filterSel[cat]) {
        Object.keys(state.filterSel[cat]).forEach(lv => state.filterSel[cat][lv] = new Set());
        nextPath.forEach((v, i) => { if (state.filterSel[cat][i]) state.filterSel[cat][i].add(v); });
      }
      applyAll();
    });
  });

  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   CATEGORY FILTERS — cascading dropdowns per category
   ═════════════════════════════════════════════════════════════════════ */
function renderCatFilters(){
  const wrap = $('#catFilters');
  const cat = state.category;
  if (cat === 'sales' || cat === 'rawdata' || cat === 'overview' || cat === 'tableau') { wrap.innerHTML = ''; return; }

  const d = state.drill[cat];
  let levels = [];

  const fs = state.filterSel[cat] || {};
  const fv = lv => fs[lv] && fs[lv].size ? [...fs[lv]] : [];

  if (cat === 'org') {
    const selBrands = fv(0);
    const selGroups = fv(1);
    const groups = selBrands.length
      ? [...new Set(selBrands.flatMap(b => HIER_BRAND_GROUP[b]||[]))]
      : REAL_GROUPS;
    const depts = selGroups.length
      ? [...new Set(selGroups.flatMap(g => HIER_GROUP_DEPT[g]||[]))]
      : (selBrands.length ? [...new Set(selBrands.flatMap(b => (HIER_BRAND_GROUP[b]||[]).flatMap(g => HIER_GROUP_DEPT[g]||[])))] : REAL_DEPARTMENTS);
    levels = [
      { lv: 0, label: '브랜드', icon: 'tag',       opts: USE_MOCK ? HONBUS : REAL_BRANDS },
      { lv: 1, label: '그룹',   icon: 'building-2', opts: USE_MOCK ? [] : groups },
      { lv: 2, label: '부서',   icon: 'users',      opts: USE_MOCK ? ALL_TEAMS : depts },
    ];
  } else if (cat === 'region') {
    const selCont1s = fv(0);
    const selCont2s = fv(1);
    const selCtrys  = fv(2);
    const cont2s = selCont1s.length ? [...new Set(selCont1s.flatMap(c=>HIER_CONT1_CONT2[c]||[]))] : REAL_CONTINENTS;
    const mockCountries = selCont2s.length ? COUNTRIES.filter(c=>selCont2s.includes(c.cont)).map(c=>c.name) : COUNTRIES.map(c=>c.name);
    const realCountries = selCont2s.length ? [...new Set(selCont2s.flatMap(c=>HIER_CONTINENT_COUNTRY[c]||[]))]
                        : selCont1s.length ? [...new Set(selCont1s.flatMap(c=>(HIER_CONT1_CONT2[c]||[]).flatMap(k=>HIER_CONTINENT_COUNTRY[k]||[])))]
                        : REAL_COUNTRIES;
    const realCustomers = selCtrys.length ? [...new Set(selCtrys.flatMap(c=>HIER_COUNTRY_CUSTOMER[c]||[]))]
                        : selCont2s.length ? [...new Set(selCont2s.flatMap(c=>(HIER_CONTINENT_COUNTRY[c]||[]).flatMap(k=>HIER_COUNTRY_CUSTOMER[k]||[])))]
                        : REAL_CUSTOMERS;
    levels = [
      { lv: 0, label: '권역',   icon: 'globe-2',   opts: USE_MOCK ? CONTINENTS : REAL_CONTINENTS1 },
      { lv: 1, label: '대륙',   icon: 'map',       opts: USE_MOCK ? [] : cont2s },
      { lv: 2, label: '국가',   icon: 'map-pin',   opts: USE_MOCK ? mockCountries : realCountries },
      { lv: 3, label: '거래처', icon: 'briefcase', opts: USE_MOCK ? CUSTOMERS : realCustomers },
    ];
  } else if (cat === 'product') {
    const selLines = fv(0);
    const selCats  = fv(1);
    const mockCats = selLines.length ? [...new Set(selLines.flatMap(l=>CATEGORIES_BY_LINE[l]||[]))] : [...new Set(Object.values(CATEGORIES_BY_LINE).flat())];
    const realCats = selLines.length ? [...new Set(selLines.flatMap(l=>HIER_LINE_CATEGORY[l]||[]))] : REAL_CATEGORIES;
    let skus = SKUS;
    if (selLines.length) skus = skus.filter(s=>selLines.includes(s.line));
    if (selCats.length)  skus = skus.filter(s=>selCats.includes(s.cat));
    levels = [
      { lv: 0, label: '라인',     icon: 'git-branch', opts: USE_MOCK ? LINES : REAL_LINES },
      { lv: 1, label: '카테고리', icon: 'package',    opts: USE_MOCK ? mockCats : realCats },
      { lv: 2, label: 'SKU',      icon: 'box',        opts: USE_MOCK ? skus.map(s=>s.name) : [] },
    ];
  }

  wrap.innerHTML = levels.map((L, i) => {
    const selSet = (fs[L.lv] || new Set());
    const has = selSet.size > 0;
    const opts = L.opts.filter(o => o != null && String(o).trim() !== '');
    const arrow = i < levels.length - 1 ? '<div class="cat-filter-arrow"><i data-lucide="chevron-right" class="ic"></i></div>' : '';
    const trigLabel = has
      ? (selSet.size === 1 ? [...selSet][0] : `${selSet.size}개 선택`)
      : '전체 ' + L.label;
    const optsHtml = opts.map(o => {
      const chk = selSet.has(o);
      return `<div class="cf-opt${chk ? ' selected' : ''}" data-val="${escapeAttr(o)}">
        <span class="cf-chk">${chk ? '✓' : ''}</span>${o}
      </div>`;
    }).join('');
    return `
      <div class="cat-filter">
        <label class="cat-filter-label"><i data-lucide="${L.icon}" class="ic"></i>${L.label}</label>
        <div class="cf-wrap" data-level="${L.lv}">
          <button type="button" class="cf-trigger${has ? ' has-value' : ''}">
            <span class="cf-val">${trigLabel}</span>
            <i data-lucide="chevron-down" class="ic cf-chevron"></i>
          </button>
          <div class="cf-panel">
            <div class="cf-search-wrap"><i data-lucide="search" class="ic"></i><input class="cf-search" placeholder="검색…" autocomplete="off"></div>
            <div class="cf-list">
              <div class="cf-opt all-opt${!has ? ' selected' : ''}" data-val="__all__">
                <span class="cf-chk">${!has ? '✓' : ''}</span>전체 ${L.label}
              </div>
              ${optsHtml}
            </div>
          </div>
        </div>
      </div>
      ${arrow}
    `;
  }).join('');
  const anySel = Object.values(fs).some(s => s && s.size > 0);
  if (anySel) {
    wrap.insertAdjacentHTML('beforeend',
      `<button class="cat-filter-clear" id="catFilterClear"><i data-lucide="x" class="ic"></i>선택 해제</button>`);
    $('#catFilterClear').onclick = () => { fsClear(cat); state.drill[cat] = []; state.expanded[cat] = new Set(); applyAll(); };
  }
  if (window.lucide) lucide.createIcons();
  initCatFilterDropdowns(cat);
}

function initCatFilterDropdowns(cat){
  const closeAll = () => {
    $$('#catFilters .cf-panel').forEach(p => { p.style.display = 'none'; });
    $$('#catFilters .cf-trigger').forEach(t => t.classList.remove('open'));
  };

  $$('#catFilters .cf-wrap').forEach(wrap => {
    const lv     = parseInt(wrap.dataset.level);
    const trigger= wrap.querySelector('.cf-trigger');
    const panel  = wrap.querySelector('.cf-panel');
    const search = wrap.querySelector('.cf-search');
    const list   = wrap.querySelector('.cf-list');

    trigger.onclick = (e) => {
      e.stopPropagation();
      const isOpen = panel.style.display === 'block';
      closeAll();
      if (!isOpen) {
        panel.style.display = 'block';
        trigger.classList.add('open');
        search.value = '';
        filterCfOpts(list, '');
        search.focus();
      }
    };

    search.oninput = () => filterCfOpts(list, search.value);
    search.onkeydown = (e) => { if (e.key === 'Escape') closeAll(); e.stopPropagation(); };
    search.onclick = (e) => e.stopPropagation();
    panel.onclick = (e) => e.stopPropagation();

    list.onclick = (e) => {
      const opt = e.target.closest('.cf-opt');
      if (!opt) return;
      const v = opt.dataset.val;
      if (!state.filterSel[cat]) state.filterSel[cat] = {};
      if (!state.filterSel[cat][lv]) state.filterSel[cat][lv] = new Set();
      const selSet = state.filterSel[cat][lv];
      if (v === '__all__') {
        // 전체 선택 → 이 레벨 및 하위 레벨 클리어
        for (let k = lv; k <= 2; k++) { if (state.filterSel[cat][k]) state.filterSel[cat][k].clear(); }
      } else {
        // 토글
        if (selSet.has(v)) selSet.delete(v);
        else selSet.add(v);
        // 하위 레벨 클리어 (상위가 바뀌면 하위 선택 초기화)
        for (let k = lv + 1; k <= 2; k++) { if (state.filterSel[cat][k]) state.filterSel[cat][k].clear(); }
      }
      // viewLevel 갱신
      const depth = fsDepth(cat);
      const maxDepth = CATEGORY_DEFS.find(c => c.id === cat).path.length;
      state.viewLevel[cat] = Math.min(maxDepth - 1, depth);
      state.expanded[cat] = new Set();
      // 패널은 닫지 않음 — 계속 체크 가능
      applyAll();
      renderCatFilters(); // 체크 상태 갱신
      if (window.lucide) lucide.createIcons();
      initCatFilterDropdowns(cat);
      // 패널 다시 열기
      const thisPanels = $$('#catFilters .cf-wrap');
      if (thisPanels[lv]) {
        const p2 = thisPanels[lv].querySelector('.cf-panel');
        const t2 = thisPanels[lv].querySelector('.cf-trigger');
        if (p2) { p2.style.display = 'block'; t2 && t2.classList.add('open'); }
      }
    };
  });

  document.addEventListener('click', () => closeAll(), { capture: false });
}

function filterCfOpts(list, q){
  const lq = q.toLowerCase().trim();
  $$('.cf-opt', list).forEach(opt => {
    if (opt.classList.contains('all-opt')) { opt.style.display = lq ? 'none' : ''; return; }
    opt.style.display = (!lq || opt.textContent.toLowerCase().includes(lq)) ? '' : 'none';
  });
}

function escapeAttr(s){ return String(s).replace(/"/g, '&quot;'); }

/* ═════════════════════════════════════════════════════════════════════
   TWEAKS — density / palette / chart style
   ═════════════════════════════════════════════════════════════════════ */
function applyTweaks(){
  document.documentElement.dataset.density = tweaks.density || 'comfy';
  document.documentElement.dataset.palette = tweaks.palette || 'marine';
  document.documentElement.dataset.tone = tweaks.tone || 'default';
  $$('#tweaksPanel [data-tweak]').forEach(group => {
    const key = group.dataset.tweak;
    group.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.v === tweaks[key]);
    });
  });
  const dv = $('#densityVal');     if (dv) dv.textContent = tweaks.density;
  const pv = $('#paletteVal');     if (pv) pv.textContent = tweaks.palette;
  const cv = $('#chartStyleVal');  if (cv) cv.textContent = tweaks.chartStyle;
  const tv = $('#toneVal');        if (tv) tv.textContent = tweaks.tone || 'default';
}

function setTweak(key, val){
  if (tweaks[key] === val) return;
  tweaks[key] = val;
  applyTweaks();
  try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: val}}, '*'); } catch(e){}
  // re-render anything color/chart-dependent
  if (window.__rendered) applyAll();
}

function setupTweaks(){
  // Register message listener BEFORE announcing availability
  window.addEventListener('message', (e) => {
    const t = e.data && e.data.type;
    if (t === '__activate_edit_mode') $('#tweaksPanel').classList.add('open');
    else if (t === '__deactivate_edit_mode') $('#tweaksPanel').classList.remove('open');
  });
  // Click handlers on panel
  $$('#tweaksPanel [data-tweak]').forEach(group => {
    const key = group.dataset.tweak;
    group.querySelectorAll('button').forEach(b => {
      b.onclick = () => setTweak(key, b.dataset.v);
    });
  });
  $('#tweaksClose').onclick = () => {
    $('#tweaksPanel').classList.remove('open');
    try { window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){}
  };
  // Announce availability — only AFTER the listener is registered
  try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
}

function getChartStyleOpts(){
  // Synthex tone implies the soft chart style (rounded bars, smooth filled lines)
  const s = (tweaks.tone === 'synthex') ? 'soft' : (tweaks.chartStyle || 'crisp');
  return {
    barRadius: s === 'soft' ? 8 : s === 'editorial' ? 0 : 2,
    lineFill: s === 'soft',
    lineTension: s === 'editorial' ? 0 : s === 'soft' ? 0.5 : 0.32,
    lineWidth: s === 'editorial' ? 1 : s === 'soft' ? 2.5 : 1.5,
    pointRadius: s === 'editorial' ? 0 : s === 'soft' ? 0 : 2.5,
    pointHoverRadius: s === 'editorial' ? 4 : s === 'soft' ? 4 : 5,
    donutCutout: s === 'soft' ? '72%' : s === 'editorial' ? '56%' : '64%',
    donutBorder: s === 'soft' ? 0 : s === 'editorial' ? 1 : 2,
    barBorderWidth: s === 'editorial' ? 1 : 0,
  };
}

/* ═════════════════════════════════════════════════════════════════════
   APPLY ALL
   ═════════════════════════════════════════════════════════════════════ */
async function applyAll(){
  // 카테고리/필터 변경 시 CPL 실데이터 캐시 초기화 (다음 renderCategoryPl에서 재fetch)
  state.cplData = null;
  _cplDataLoading = false;
  if(!USE_MOCK){
    if(state.category !== 'rawdata' && state.category !== 'tableau'){
      const strip = document.getElementById('kpiStrip');
      if(strip) strip.innerHTML='<div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div>불러오는 중…</div>';
      try{ await RealApi.prefetch(); } catch(e){ console.error('prefetch failed',e); }
    }
  }
  renderCatTabs();
  renderTreeRail();
  renderCatFilters();
  renderCrumb();
  // Page title per category
  const _titleMap = { overview:'손익 요약 대시보드', org:'조직별 손익 대시보드', region:'지역별 손익 대시보드', product:'상품별 손익 대시보드', sales:'판매유형별 손익 대시보드', rawdata:'원시 데이터', tableau:'커스텀 분석' };
  const _pt = $('#pageTitle'); if (_pt) _pt.textContent = _titleMap[state.category] || '손익 대시보드';
  renderHeroShell();
  renderWaterfallShell();
  renderChangeDriversShell();
  // legacy 8-tile KPI strip stays hidden; renderHeroShell renders the new hero
  // renderKPI();
  renderMainView();
  if(state.category === 'rawdata'){
    state.rawPage = 1;
    await loadRawPage();
  }
  window.__rendered=true;
  if(window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   INIT
   ═════════════════════════════════════════════════════════════════════ */
async function init(){
  applyTheme(savedTheme);
  applyTweaks();
  $('#themeBtn').onclick = () => applyTheme(document.documentElement.classList.contains('theme-dark')?'light':'dark');
  setupTweaks();
  $('#btnReset').onclick = resetFilters;

  // Tree rail collapse / reopen
  const treeCollapseBtn = $('#treeCollapseBtn');
  const treeReopenBtn = $('#treeReopenBtn');
  if (treeCollapseBtn) treeCollapseBtn.onclick = () => { state.treeCollapsed = true; renderTreeRail(); };
  if (treeReopenBtn) treeReopenBtn.onclick = () => { state.treeCollapsed = false; renderTreeRail(); };
  const treeEdgeCollapse = $('#treeEdgeCollapse');
  const treeEdgeReopen = $('#treeEdgeReopen');
  if (treeEdgeCollapse) treeEdgeCollapse.onclick = () => { state.treeCollapsed = true; renderTreeRail(); };
  if (treeEdgeReopen) treeEdgeReopen.onclick = () => { state.treeCollapsed = false; renderTreeRail(); };
  const treeSearchInput = $('#treeSearchInput');
  if (treeSearchInput) treeSearchInput.oninput = (e) => { state.treeSearch = e.target.value; renderTreeRail(); };
  const tbPeriodBtn = $('#tbPeriodBtn');
  const periodPopover = $('#periodPopover');
  if (tbPeriodBtn && periodPopover) {
    tbPeriodBtn.onclick = (e) => {
      e.stopPropagation();
      const open = periodPopover.classList.contains('open');
      if (open) {
        periodPopover.classList.remove('open');
        tbPeriodBtn.classList.remove('open');
      } else {
        const rect = tbPeriodBtn.getBoundingClientRect();
        const w = 540;
        let left = rect.right - w;
        const margin = 12;
        if (left < margin) left = margin;
        if (left + w > window.innerWidth - margin) left = window.innerWidth - w - margin;
        periodPopover.style.left = left + 'px';
        periodPopover.style.top  = (rect.bottom + 8) + 'px';
        periodPopover.classList.add('open');
        tbPeriodBtn.classList.add('open');
      }
    };
    document.addEventListener('click', (e) => {
      if (!periodPopover.classList.contains('open')) return;
      if (periodPopover.contains(e.target) || tbPeriodBtn.contains(e.target)) return;
      periodPopover.classList.remove('open');
      tbPeriodBtn.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && periodPopover.classList.contains('open')) {
        periodPopover.classList.remove('open');
        tbPeriodBtn.classList.remove('open');
      }
    });
  }
  const prevPeriodBtn = $('#prevPeriodBtn');
  const nextPeriodBtn = $('#nextPeriodBtn');
  if(prevPeriodBtn) prevPeriodBtn.onclick = () => {
    const n = Math.abs(state.rangeEnd - state.rangeStart) + 1;
    const newEnd = Math.max(0, state.rangeStart - 1);
    const newStart = Math.max(0, newEnd - n + 1);
    state.rangeStart = newStart; state.rangeEnd = newEnd;
    updatePeriodLabel(); renderMonthGrid(); applyAll();
  };
  if(nextPeriodBtn) nextPeriodBtn.onclick = () => {
    const n = Math.abs(state.rangeEnd - state.rangeStart) + 1;
    const newStart = Math.min(ALL_MONTHS.length - 1, state.rangeEnd + 1);
    const newEnd = Math.min(ALL_MONTHS.length - 1, newStart + n - 1);
    state.rangeStart = newStart; state.rangeEnd = newEnd;
    updatePeriodLabel(); renderMonthGrid(); applyAll();
  };
  const _cacheBtn = $('#btnClearCache');
  if (_cacheBtn) _cacheBtn.onclick = async () => {
    if (!confirm('BigQuery 캐시를 초기화하고 최신 데이터를 불러올까요?\n(수십 초 소요될 수 있습니다)')) return;
    _cacheBtn.disabled = true;
    _cacheBtn.innerHTML = '<i data-lucide="loader" class="ic"></i>초기화 중…';
    if (window.lucide) lucide.createIcons();
    try {
      const r = await fetch('/api/clear-cache', { method: 'POST' });
      const d = await r.json();
      if (d.ok) { location.reload(); }
      else { alert('초기화 실패'); _cacheBtn.disabled = false; }
    } catch(e) { alert('오류: ' + e); _cacheBtn.disabled = false; }
  };
  const _navRaw = $('#navRawBtn');
  if (_navRaw) _navRaw.onclick = () => { switchCategory('rawdata'); };
  function updateNavRawBtn(){ const b=$('#navRawBtn'); if(b) b.classList.toggle('active', state.category==='rawdata'); }

  // Jinja fallback (note: literal {{ avoided to prevent Jinja2 parse error)
  const _jj = '{' + '{';
  const userName = $('#userName').textContent.trim();
  if(userName.includes(_jj)||userName==='') $('#userName').textContent='사용자';
  const userRole = $('#userRole').textContent.trim();
  if(userRole.includes(_jj)||userRole==='') $('#userRole').textContent='viewer';
  if($('#userRole').textContent.trim()==='admin') $('#userRole').classList.add('admin');
  const nameNow = $('#userName').textContent.trim();
  if(nameNow) $('#userAvatar').textContent = nameNow.charAt(0).toUpperCase();
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
  const toClean=[];
  while(walker.nextNode()){const n=walker.currentNode;if(/\{%[^%]*%\}/.test(n.textContent))toClean.push(n);}
  toClean.forEach(n=>{n.textContent=n.textContent.replace(/\{%[^%]*%\}/g,'').trim();});

  if(!USE_MOCK){
    try{
      const filters = await fetch('/api/filters').then(r=>r.json());
      ALL_MONTHS = (filters.months||[]).sort();
      state.rangeEnd = ALL_MONTHS.length - 1;
      state.rangeStart = 0;
      REAL_GROUPS      = filters.groups||[];
      REAL_DEPARTMENTS = filters.departments||[];
      REAL_CONTINENTS1 = filters.continents1||filters.continents||[];
      REAL_CONTINENTS  = filters.continents2||filters.continents||[];
      REAL_COUNTRIES   = filters.countries||[];
      REAL_LINES       = filters.lines||[];
      REAL_CATEGORIES  = filters.categories||[];
      REAL_BRANDS      = filters.brands||[];
      REAL_CUSTOMERS   = filters.customers||[];
      REAL_SALES_TYPES = filters.sales_types||[];
      HIER_BRAND_GROUP       = filters.brand_group||{};
      HIER_GROUP_DEPT        = filters.group_dept||{};
      HIER_CONT1_CONT2       = filters.cont1_cont2||{};
      HIER_CONTINENT_COUNTRY = filters.continent_country||{};
      HIER_COUNTRY_CUSTOMER  = filters.country_customer||{};
      HIER_LINE_CATEGORY     = filters.line_category||{};
    } catch(e){ console.error('Failed to load filters', e); }
  }

  initMonthSlider();
  renderPresetChips();
  await applyAll();
  if(window.lucide) lucide.createIcons();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
{% endraw %}
</script>
