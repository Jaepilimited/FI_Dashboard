  ['sgaO_hr','인건비',{member:'org',sub:true,pct:true}],
  ['sgaO_etc','기타',{member:'org',sub:true,pct:true}],
  ['contrib','공헌이익',{bold:true,pct:true,hl:'contrib'}],
  ['sgaC','판매관리비 간접비(전사)',{bold:true,pct:true,toggle:'corp'}],
  ['sgaC_adv','광고선전비',{member:'corp',sub:true,pct:true}],
  ['sgaC_log','물류비',{member:'corp',sub:true,pct:true}],
  ['sgaC_fee','수수료',{member:'corp',sub:true,pct:true}],
  ['sgaC_hr','인건비',{member:'corp',sub:true,pct:true}],
  ['sgaC_etc','기타',{member:'corp',sub:true,pct:true}],
  ['op','영업이익',{bold:true,pct:true,hl:'op'}],
];
function makePlRows(v){
  return PL_ROW_DEFS.map(function(d){ return Object.assign({ id:d[0], label:d[1], vals:v[d[0]] }, d[2]); });
}
let PL_SECTIONS = [];

function loadPlSummary(){
  const months = activeMonths();
  // Fields that come directly from the API node
  const PL_API_FIELDS = ['sales','cogs','gross','sgaD','sgaD_adv','sgaD_log','sgaD_fee','sgaD_hr','sgaD_etc',
    'sgaO','sgaO_adv','sgaO_log','sgaO_fee','sgaO_hr','sgaO_etc',
    'sgaC','sgaC_adv','sgaC_log','sgaC_fee','sgaC_hr','sgaC_etc','op'];
  // All fields including derived ones (direct = gross-sgaD, contrib = direct-sgaO)
  const PL_ALL_FIELDS = PL_API_FIELDS.concat(['direct','contrib']);
  const zeros = months.map(function(){ return 0; });
  function mkVals(node){
    const v = {};
    PL_API_FIELDS.forEach(function(f){ v[f] = node ? (node[f] || zeros.map(function(){ return 0; })) : zeros.slice(); });
    // Derive direct = gross - sgaD
    v.direct = v.gross.map(function(x, i){ return x - v.sgaD[i]; });
    // Derive contrib = direct - sgaO
    v.contrib = v.direct.map(function(x, i){ return x - v.sgaO[i]; });
    return v;
  }
  function sumVals(a, b){
    const v = {};
    PL_ALL_FIELDS.forEach(function(f){
      v[f] = a[f].map(function(x, i){ return x + (b[f][i] || 0); });
    });
    return v;
  }
  const p = new URLSearchParams();
  p.append('dim', 'Brand');
  months.forEach(function(m){ p.append('months', m); });
  const wrap = document.getElementById('plSummaryWrap');
  if (wrap) wrap.innerHTML = '<div style="padding:20px;color:var(--text-tertiary)">불러오는 중…</div>';
  fetch('/api/pl?' + p.toString(), { credentials: 'same-origin' })
    .then(function(r){ return r.json(); })
    .then(function(data){
      const nodes = data.nodes || [];
      const skNode = nodes.find(function(n){ return n.name === 'SK'; });
      const umNode = nodes.find(function(n){ return n.name === 'UM'; });
      const skVals = mkVals(skNode);
      const umVals = mkVals(umNode);
      const jeonsaVals = sumVals(skVals, umVals);
      PL_SECTIONS = [
        { key:'jeonsa', title:'1. 전사', rows: makePlRows(jeonsaVals) },
        { key:'brand',  title:'2. 브랜드 부문 (SK)', rows: makePlRows(skVals) },
        { key:'dist',   title:'3. 유통 부문', rows: makePlRows(umVals) },
      ];
      renderPlSummary();
    })
    .catch(function(err){
      console.error('[PL] /api/pl fetch failed', err);
      if (wrap) wrap.innerHTML = '<div style="padding:20px;color:var(--text-tertiary)">데이터를 불러오지 못했습니다.</div>';
    });
}
function plAggPeriods(period){
  const months = activeMonths();
  if(period === 'total') return [];
  if(period === 'monthly'){
    return months.map(function(ym,i){ return {label:parseInt(ym.split('-')[1])+'월', monthIndices:[i]}; });
  }
  const map={}, result=[];
  months.forEach(function(ym,i){
    const mon=parseInt(ym.split('-')[1]);
    let key,label;
    if(period==='quarterly'){
      const q=Math.ceil(mon/3); key='Q'+q; label=q+'분기';
    } else {
      const h=mon<=6?1:2; key='H'+h; label=h===1?'상반기':'하반기';
    }
    if(!map.hasOwnProperty(key)){map[key]=result.length;result.push({label:label,monthIndices:[]});}
    result[map[key]].monthIndices.push(i);
  });
  return result;
}
function plAggVals(vals,periods){
  return periods.map(function(p){ return p.monthIndices.reduce(function(s,i){ return s+(vals[i]||0); },0); });
}
const plExpanded = new Set();

function renderPlSummary(){
  const wrap = document.getElementById('plSummaryWrap');
  if (!wrap) return;
  if (!PL_SECTIONS.length) {
    wrap.innerHTML = '<div style="padding:20px;color:var(--text-tertiary)">불러오는 중…</div>';
    return;
  }
  const periods = plAggPeriods(state.plPeriod);
  const N = periods.length;
  const empty = '<span class="pl-empty">–</span>';
  const fmtM = function(v){
    const m = Math.round(v / 1e6);
    return (m < 0 ? '<span class="pl-neg">-' : '<span>') + Math.abs(m).toLocaleString('ko-KR') + '</span>';
  };
  let html = '';
  for (const sec of PL_SECTIONS) {
    const salesRow = sec.rows.find(function(x){ return x.id === 'sales'; });
    const salesTot = salesRow.vals.reduce(function(a,b){ return a+b; },0);
    const salesAggV = plAggVals(salesRow.vals, periods);
    html += '<div class="pl-section-title">' + sec.title + '</div>';
    html += '<table class="pl-table">';
    html += '<colgroup><col style="width:170px"><col style="width:88px">';
    for (let i = 0; i < N; i++) html += '<col>';
    html += '</colgroup>';
    html += '<thead><tr><th>구분</th><th>합계</th>';
    for (let i = 0; i < N; i++) html += '<th>' + periods[i].label + '</th>';
    html += '</tr></thead><tbody>';
    for (const row of sec.rows) {
      const memberKey = row.member ? sec.key + ':' + row.member : null;
      if (memberKey && !plExpanded.has(memberKey)) continue;
      const toggleKey = row.toggle ? sec.key + ':' + row.toggle : null;
      const tot = row.vals.reduce(function(a,b){ return a+b; },0);
      const cls = ['pl-row', row.bold?'pl-bold':'', row.sub?'pl-sub':'', row.hl?'pl-hl-'+row.hl:'', row.toggle?'pl-group':''].filter(Boolean).join(' ');
      const chev = toggleKey ? '<i data-lucide="' + (plExpanded.has(toggleKey)?'chevron-down':'chevron-right') + '" class="pl-chev"></i>' : '';
      const aggV = plAggVals(row.vals, periods);
      const valCell = function(i){
        const v = aggV[i];
        if(v === undefined) return empty;
        let h = fmtM(v);
        const prev = i > 0 ? aggV[i-1] : undefined;
        if(prev){
          const d=(v-prev)/Math.abs(prev)*100;
          const up=d>0.05,down=d<-0.05;
          h+='<div class="pl-mom '+(up?'pl-up':down?'pl-down':'')+'">'+( up?'▲':down?'▼':'–')+Math.abs(d).toFixed(1)+'%</div>';
        } else {
          h+='<div class="pl-mom pl-mom-na">–</div>';
        }
        return h;
      };
      html += '<tr class="' + cls + '"' + (toggleKey ? ' data-pl-toggle="' + toggleKey + '"' : '') + '><td>' + chev + row.label + '</td><td>' + fmtM(tot) + '<div class="pl-mom pl-mom-na">&nbsp;</div></td>';
      for (let i = 0; i < N; i++) html += '<td>' + valCell(i) + '</td>';
      html += '</tr>';
      const showPct = row.pct && (!row.pctMember || plExpanded.has(sec.key + ':' + row.pctMember));
      if (showPct) {
        const pctCell = function(num, den){ return den ? ((num/den*100).toFixed(1) + '%') : empty; };
        html += '<tr class="pl-pct' + (row.sub?' pl-sub':'') + (row.hl?' pl-pct-hl-'+row.hl:'') + '"><td>%</td><td>' + pctCell(tot, salesTot) + '</td>';
        for (let i = 0; i < N; i++) html += '<td>' + pctCell(aggV[i], salesAggV[i]) + '</td>';
        html += '</tr>';
      }
    }
    html += '</tbody></table>';
  }
  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-pl-toggle]').forEach(function(tr){ tr.addEventListener('click', function(){
    const k = tr.dataset.plToggle;
    if (plExpanded.has(k)) plExpanded.delete(k); else plExpanded.add(k);
    renderPlSummary();
  }); });
  if (window.lucide) lucide.createIcons();
}

/* ─── 카테고리별 손익계산서 (PL 프레임: 섹션 전체/SK/유통 × 열 차원 + 하위 top10 펼치기) ─── */
const CPL_SEC_DEFS = [
  { key:'all',  label:'전체' },
  { key:'sk',   label:'SK'   },
  { key:'dist', label:'유통' },
];
const CPL_SUB_LABELS = { adv:'광고선전비', log:'물류비', fee:'수수료', hr:'인건비', etc:'기타' };
const cplColExp = new Set();
// Detail 손익계산서 column mode: 'dim' (차원별 columns) or 'month' (월별 columns, 요약처럼)
let cplViewMode = 'dim';
// Month-mode 차원별 open/close state (per category:ym) + one-time seed flag.
const cplMonthExp = new Set();
let cplMonthSeeded = false;

// ─── /api/pl 실데이터 캐시 ───────────────────────────────────────────────────
// state.cplData = { months:[...], byNode:{ '<name>':{ SK:{...}, UM:{...} } } }
// null = 아직 없거나 로딩 중
let _cplDataLoading = false;

// 현재 카테고리+필터 상태에 맞는 /api/pl dim 컬럼 결정
function _cplDimCol(){
  const cat = state.category;
  const vl = (state.viewLevel && state.viewLevel[cat] != null) ? state.viewLevel[cat] : 0;
  if (cat === 'org')     return vl <= 1 ? 'Group' : 'Department';
  if (cat === 'region')  return vl === 0 ? 'Continent1' : vl === 1 ? 'Continent2' : vl === 2 ? 'Country' : 'Customer';
  if (cat === 'product') return vl === 0 ? 'Line' : vl === 1 ? 'Category' : 'Product_Name';
  if (cat === 'sales')   return 'Sales_Type';
  return 'Group';
}

// 현재 필터를 URLSearchParams에 추가 (RealApi.buildParams와 동일 규칙, fsArr 재사용)
function _cplAppendDrillFilters(p){
  const cat = state.category;
  const months = activeMonths();
  if (months.length) months.forEach(function(m){ p.append('months', m); });
  if (cat === 'org'){
    // brand 필터는 SK/UM을 명시적으로 설정했으므로 여기서는 group/department만 추가
    fsArr(cat,1).forEach(function(v){ p.append('group', v); });
    fsArr(cat,2).forEach(function(v){ p.append('department', v); });
  } else if (cat === 'region'){
    fsArr(cat,0).forEach(function(v){ p.append('continent1', v); });
    fsArr(cat,1).forEach(function(v){ p.append('continent', v); });
    fsArr(cat,2).forEach(function(v){ p.append('country', v); });
    fsArr(cat,3).forEach(function(v){ p.append('customer', v); });
  } else if (cat === 'product'){
    fsArr(cat,0).forEach(function(v){ p.append('line', v); });
    fsArr(cat,1).forEach(function(v){ p.append('category', v); });
    fsArr(cat,2).forEach(function(v){ p.append('product', v); });
  } else if (cat === 'sales'){
    if (state.salesView && state.salesView !== 'all') p.set('sales_type', state.salesView);
  }
}

// /api/pl 비동기 로드 → state.cplData 저장 → renderCategoryPl 호출
async function loadCplData(){
  if (_cplDataLoading) return;
  _cplDataLoading = true;
  state.cplData = null;
  // "불러오는 중" 표시
  const wrap = document.getElementById('categoryPlSection');
  if (wrap) wrap.innerHTML = '<div style="padding:20px;color:var(--text-tertiary)">불러오는 중…</div>';
  try {
    const dimCol = _cplDimCol();
    const pSK = new URLSearchParams();
    pSK.append('dim', dimCol);
    pSK.append('brand', 'SK');
    _cplAppendDrillFilters(pSK);
    const pUM = new URLSearchParams();
    pUM.append('dim', dimCol);
    pUM.append('brand', 'UM');
    _cplAppendDrillFilters(pUM);
    const [dSK, dUM] = await Promise.all([
      fetch('/api/pl?' + pSK.toString(), { credentials: 'same-origin' }).then(function(r){ return r.json(); }),
      fetch('/api/pl?' + pUM.toString(), { credentials: 'same-origin' }).then(function(r){ return r.json(); }),
    ]);
    // months: SK/UM 합집합 정렬
    const monthsSet = new Set();
    (dSK.months || []).forEach(function(m){ monthsSet.add(m); });
    (dUM.months || []).forEach(function(m){ monthsSet.add(m); });
    const months = Array.from(monthsSet).sort();
    const n = months.length;
    const zeros = function(){ return months.map(function(){ return 0; }); };
    const PL_FIELDS = ['sales','cogs','gross','op',
      'sgaD','sgaD_adv','sgaD_log','sgaD_fee','sgaD_hr','sgaD_etc',
      'sgaO','sgaO_adv','sgaO_log','sgaO_fee','sgaO_hr','sgaO_etc',
      'sgaC','sgaC_adv','sgaC_log','sgaC_fee','sgaC_hr','sgaC_etc'];
    // node 이름별로 SK/UM 배열 수집
    const byNode = {};
    function mergeNode(brand, apiData){
      const apiMonths = apiData.months || [];
      const idxMap = {};
      apiMonths.forEach(function(m, i){ idxMap[m] = i; });
      (apiData.nodes || []).forEach(function(nd){
        const name = nd.name;
        if (!byNode[name]) byNode[name] = { SK:{}, UM:{} };
        if (!byNode[name][brand]) byNode[name][brand] = {};
        const target = byNode[name][brand];
        PL_FIELDS.forEach(function(f){
          if (!target[f]) target[f] = zeros();
          const src = nd[f] || [];
          months.forEach(function(m, ti){
            const si = idxMap[m];
            if (si != null && src[si] != null) target[f][ti] += src[si];
          });
        });
        // 파생: direct = gross - sgaD, contrib = direct - sgaO
        target.direct = target.gross.map(function(v, i){ return v - target.sgaD[i]; });
        target.contrib = target.direct.map(function(v, i){ return v - target.sgaO[i]; });
      });
    }
    mergeNode('SK', dSK);
    mergeNode('UM', dUM);
    // all 합산용 헬퍼는 cplMetrics에서 처리
    state.cplData = { months: months, byNode: byNode };
  } catch(e){
    console.error('[CPL] loadCplData error', e);
    state.cplData = { months: activeMonths(), byNode: {} };
  } finally {
    _cplDataLoading = false;
  }
  renderCategoryPl();
}

// 노드 이름에서 sec(all/sk/dist)에 맞는 월별 배열 객체 반환
// 반환 키: sales, cogs, gross, sgaD, sgaD_adv, ..., sgaO, ..., sgaC, ..., op, direct, contrib (모두 月별 배열)
function cplMetrics(sec, nodeName){
  const cplData = state.cplData;
  const months = (cplData && cplData.months) ? cplData.months : activeMonths();
  const n = months.length;
  const zeros = function(){ return months.map(function(){ return 0; }); };
  const PL_ALL = ['sales','cogs','gross','op',
    'sgaD','sgaD_adv','sgaD_log','sgaD_fee','sgaD_hr','sgaD_etc',
    'sgaO','sgaO_adv','sgaO_log','sgaO_fee','sgaO_hr','sgaO_etc',
    'sgaC','sgaC_adv','sgaC_log','sgaC_fee','sgaC_hr','sgaC_etc',
    'direct','contrib'];
  const nodeData = (cplData && cplData.byNode) ? cplData.byNode[nodeName] : null;
  function getArr(brand, field){
    return (nodeData && nodeData[brand] && nodeData[brand][field]) ? nodeData[brand][field] : zeros();
  }
  function addArrs(a, b){ return a.map(function(v, i){ return v + b[i]; }); }
  const result = {};
  if (sec.key === 'all'){
    PL_ALL.forEach(function(f){
      result[f] = addArrs(getArr('SK', f), getArr('UM', f));
    });
  } else if (sec.key === 'sk'){
    PL_ALL.forEach(function(f){ result[f] = getArr('SK', f); });
  } else { // dist = UM
    PL_ALL.forEach(function(f){ result[f] = getArr('UM', f); });
  }
  return result;
}

function cplDims(){
  // /api/pl 노드 이름 목록을 우선 사용 (state.cplData가 있을 때)
  if (state.cplData && state.cplData.byNode) {
    const names = Object.keys(state.cplData.byNode);
    return names.slice(0, 10).map(function(name){ return { name: name, flag: null, _children: [] }; });
  }
  // 폴백: api.breakdown() 사용 (cplData 미로드 시)
  const cat = state.category;
  const savedVl = state.viewLevel ? state.viewLevel[cat] : undefined;
  const savedDrill = (state.drill && state.drill[cat]) ? state.drill[cat].slice() : [];
  let dims = [];
  try {
    if (state.viewLevel) state.viewLevel[cat] = 0;
    if (state.drill) state.drill[cat] = [];
    dims = (api.breakdown() || []).slice(0, 8);
    dims.forEach(function(d){ d._children = []; });
  } catch(e){}
  if (state.viewLevel) state.viewLevel[cat] = savedVl;
  if (state.drill) state.drill[cat] = savedDrill;
  return dims;
}

// id가 'sgaD.adv' 형태면 'm.sgaD_adv' 배열, 단순 id면 'm[id]' 배열을 반환
function cplRowValue(m, id){
  if (id.indexOf('.') < 0) return m[id] || [];
  const parts = id.split('.');
  const key = parts[0] + '_' + parts[1]; // 'sgaD.adv' → 'sgaD_adv'
  return m[key] || [];
}

function renderCategoryPl(){
  const wrap = document.getElementById('categoryPlSection');
  if (!wrap) return;
  // 데이터가 없으면 loadCplData 트리거 (이미 로딩 중이면 스킵)
  if (!state.cplData) {
    if (!_cplDataLoading) loadCplData();
    return;
  }
  const dims = cplDims();
  if (!dims.length) { wrap.innerHTML = ''; return; }
  const cat = CATEGORY_DEFS.find(function(c){ return c.id === state.category; });
  const empty = '<span class="pl-empty">–</span>';
  const fmtMm = function(v){
    const m = Math.round(v / 1e6);
    return (m < 0 ? '<span class="pl-neg">-' : '<span>') + Math.abs(m).toLocaleString('ko-KR') + '</span>';
  };
  const colSpanLabel = '전체 / SK / 유통 × 월별';
  const subText = '월(月) 헤더 클릭 → 차원별 펼침 · 차원 헤더 클릭 → 하위 드릴다운 · 굵은 행 클릭 → 세부 계정 · 값 아래 ▲▼는 전월 대비';
  let html = '<div class="card row-grid-full" style="margin-bottom:14px">'
    + '<div class="card-hd"><div>'
    + '<div class="card-title"><i data-lucide="table-2"></i>손익계산서 <span style="font-weight:500;color:var(--text-tertiary);font-size:11px;margin-left:4px">(' + colSpanLabel + ')</span></div>'
    + '<div class="card-sub">' + subText + '</div>'
    + '</div><div style="display:flex;align-items:center;gap:12px">'
    + '<div class="waterfall-card-unit">단위: 백만원</div></div></div>'
    + '<div class="card-body card-body-flush"><div class="pl-table-wrap">';
  {
    // /api/pl 결과의 months 사용 (activeMonths와 교집합으로 필터)
    const activeMths = activeMonths();
    const cplMonths = (state.cplData && state.cplData.months) ? state.cplData.months : activeMths;
    // activeMonths 기준으로 정렬된 교집합 (activeMonths에 없는 달은 제외)
    const activeMthsSet = new Set(activeMths);
    const months = cplMonths.filter(function(m){ return activeMthsSet.has(m); });
    // Default: open the first month so the 차원별 breakdown is visible at a glance.
    if (!cplMonthSeeded) { if (months[0]) cplMonthExp.add(state.category + ':' + months[0]); cplMonthSeeded = true; }
    const isMonthOpen = function(ym){ return cplMonthExp.has(state.category + ':' + ym); };
    const momCell = function(cur, prev){
      if (prev === undefined || !prev) return '<div class="pl-mom pl-mom-na">–</div>';
      const d = (cur - prev) / Math.abs(prev) * 100;
      const up = d > 0.05, down = d < -0.05;
      return '<div class="pl-mom ' + (up ? 'pl-up' : down ? 'pl-down' : '') + '">' + (up ? '▲' : down ? '▼' : '–') + Math.abs(d).toFixed(1) + '%</div>';
    };
    // 배열 합산 헬퍼 (월 인덱스는 cplMonths 기준으로 이미 맞춰져 있음)
    const arrSum = function(arrs, mIdx){ return arrs.reduce(function(a, ss){ return a + (ss[mIdx] || 0); }, 0); };
    // cplMonths에서 activeMonths 교집합 인덱스 매핑
    const cplIdxOf = function(ym){ return cplMonths.indexOf(ym); };
    // 월배열을 activeMonths 교집합으로 슬라이싱
    const sliceToActive = function(arr){
      return months.map(function(ym){ const i = cplIdxOf(ym); return (i >= 0 && arr && arr[i] != null) ? arr[i] : 0; });
    };
    CPL_SEC_DEFS.forEach(function(sec){
      const secKey = state.category + ':' + sec.key;
      // Display columns inside an open month: top-level dims
      const dcols = [];
      dims.forEach(function(d){
        const ck = state.category + ':' + d.name;
        const exp = cplColExp.has(ck);
        dcols.push({ name:d.name, flag:d.flag, key:d.name, ck:ck, expandable:false, expanded:false, child:false });
      });
      // 각 dim별 cplMetrics 결과 (월배열 포함)
      const topM = dims.map(function(d){ return cplMetrics(sec, d.name); });
      const colM = dcols.map(function(col, ci){ return { col:col, M:topM[ci] }; });
      // 전체(dim 합) metric 배열
      const totM = {};
      ['sales','cogs','gross','op','sgaD','sgaD_adv','sgaD_log','sgaD_fee','sgaD_hr','sgaD_etc',
       'sgaO','sgaO_adv','sgaO_log','sgaO_fee','sgaO_hr','sgaO_etc',
       'sgaC','sgaC_adv','sgaC_log','sgaC_fee','sgaC_hr','sgaC_etc','direct','contrib'].forEach(function(f){
        const arrs = topM.map(function(M){ return M[f] || []; });
        totM[f] = cplMonths.map(function(_, ci){ return arrs.reduce(function(a, arr){ return a + (arr[ci] || 0); }, 0); });
      });
      // 각 dim에 대해 activeMonths 교집합 배열 가져오기
      const seriesForDimId = function(dimIdx, id){ return sliceToActive(cplRowValue(topM[dimIdx], id)); };
      const seriesForTotId = function(id){ return sliceToActive(cplRowValue(totM, id)); };
      // 합계 열: totM으로 전체 월합산 (activeMonths 교집합 기준)
      const totSalesSeries = seriesForTotId('sales');
      const totSalesV = totSalesSeries.reduce(function(a, v){ return a + v; }, 0);
      html += '<div class="pl-section-title">▶ ' + sec.label + '</div>';
      const totalLeafCols = months.reduce(function(acc, ym){ return acc + (isMonthOpen(ym) ? dcols.length+1 : 1); }, 0);
      html += '<table class="pl-table pl-month-matrix">';
      html += '<colgroup><col style="width:170px"><col style="width:88px">';
      for (let c = 0; c < totalLeafCols; c++) html += '<col>';
      html += '</colgroup>';
      html += '<thead>';
      html += '<tr><th rowspan="2">구분</th><th rowspan="2">합계</th>';
      months.forEach(function(ym){
        const open = isMonthOpen(ym);
        const span = open ? (dcols.length + 1) : 1;
        html += '<th class="pl-month-group" colspan="' + span + '" data-cpl-month="' + ym + '"><i data-lucide="' + (open ? 'chevron-down' : 'chevron-right') + '" class="pl-chev"></i>' + ym.slice(2).replace('-', '.') + '</th>';
      });
      html += '</tr><tr>';
      months.forEach(function(ym){
        if (isMonthOpen(ym)) {
          dcols.forEach(function(col){
            const lbl = (col.flag ? col.flag + ' ' : '') + col.name;
            html += '<th class="pl-col-dim">' + lbl + '</th>';
          });
        }
        html += '<th class="pl-col-total">계</th>';
      });
      html += '</tr></thead><tbody>';
      CPL_ROW_DEFS.forEach(function(row){
        const memberKey = row.member ? secKey + ':' + row.member : null;
        if (memberKey && !plExpanded.has(memberKey)) return;
        const toggleKey = row.toggle ? secKey + ':' + row.toggle : null;
        const cls = ['pl-row', row.bold?'pl-bold':'', row.sub?'pl-sub':'', row.hl?'pl-hl-'+row.hl:'', row.toggle?'pl-group':''].filter(Boolean).join(' ');
        const chev = toggleKey ? '<i data-lucide="' + (plExpanded.has(toggleKey)?'chevron-down':'chevron-right') + '" class="pl-chev"></i>' : '';
        // 월별 배열: dim별 + 합계
        const seriesByDim = dims.map(function(d, di){ return seriesForDimId(di, row.id); });
        const totSeries = seriesForTotId(row.id);
        const totV = totSeries.reduce(function(a, v){ return a + v; }, 0);
        const salesSeries = seriesForTotId('sales');
        html += '<tr class="' + cls + '"' + (toggleKey ? ' data-cpl-toggle="' + toggleKey + '"' : '') + '><td>' + chev + row.label + '</td>';
        html += '<td>' + fmtMm(totV) + '<div class="pl-mom pl-mom-na">&nbsp;</div></td>';
        months.forEach(function(ym, i){
          if (isMonthOpen(ym)) {
            seriesByDim.forEach(function(ss){ html += '<td>' + fmtMm(ss[i]) + momCell(ss[i], i > 0 ? ss[i-1] : undefined) + '</td>'; });
          }
          html += '<td class="pl-col-total">' + fmtMm(totSeries[i]) + momCell(totSeries[i], i > 0 ? totSeries[i-1] : undefined) + '</td>';
        });
        html += '</tr>';
        const showPct = row.pct && (!row.pctMember || plExpanded.has(secKey + ':' + row.pctMember));
        if (showPct) {
          const salesByDim = dims.map(function(d, di){ return seriesForDimId(di, 'sales'); });
          html += '<tr class="pl-pct' + (row.sub?' pl-sub':'') + (row.hl?' pl-pct-hl-'+row.hl:'') + '"><td>%</td>';
          html += '<td>' + (totSalesV ? (totV/totSalesV*100).toFixed(1) + '%' : empty) + '</td>';
          months.forEach(function(ym, i){
            if (isMonthOpen(ym)) {
              seriesByDim.forEach(function(ss, di){ const den = salesByDim[di][i]; html += '<td>' + (den ? (ss[i]/den*100).toFixed(1) + '%' : empty) + '</td>'; });
            }
            const td = totSalesSeries[i];
            html += '<td class="pl-col-total">' + (td ? (totSeries[i]/td*100).toFixed(1) + '%' : empty) + '</td>';
          });
          html += '</tr>';
        }
      });
      html += '</tbody></table>';
    });
  }
  html += '</div></div></div>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-cpl-toggle]').forEach(function(tr){ tr.addEventListener('click', function(){
    const k = tr.dataset.cplToggle;
    if (plExpanded.has(k)) plExpanded.delete(k); else plExpanded.add(k);
    renderCategoryPl();
  }); });
  wrap.querySelectorAll('[data-cpl-col]').forEach(function(th){ th.addEventListener('click', function(){
    const k = state.category + ':' + th.dataset.cplCol;
    if (cplColExp.has(k)) cplColExp.delete(k); else cplColExp.add(k);
    renderCategoryPl();
  }); });
  wrap.querySelectorAll('[data-cpl-month]').forEach(function(th){ th.addEventListener('click', function(){
    const k = state.category + ':' + th.dataset.cplMonth;
    if (cplMonthExp.has(k)) cplMonthExp.delete(k); else cplMonthExp.add(k);
    renderCategoryPl();
  }); });
  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   KPI STRIP
   ═════════════════════════════════════════════════════════════════════ */
function renderKPI(){
  if (state.category === 'rawdata') {
    const strip = $('#kpiStrip');
    if (strip) strip.innerHTML = '';
    return;
  }
  const k = api.kpi();
  const trend = api.monthlyTrend();
  const last  = trend.length >= 1 ? trend[trend.length - 1] : {};
  const prv   = trend.length >= 2 ? trend[trend.length - 2] : {};
  const delta = (cur, prev) => prev ? (cur - prev) / prev * 100 : 0;
  const sp = key => trend.map(r => r[key]);

  const c = chartColors();
  const items = [
    { label:'매출액',     val: fmtKRW(k.sales_amount), color:c.accent, delta: delta(last.sales_amount, prv.sales_amount), spark: sp('sales_amount'), primary: true },
    { label:'매출원가',   val: fmtKRW(k.cost_of_sales), color:c.tertiary, delta: delta(last.cost_of_sales, prv.cost_of_sales), spark: sp('cost_of_sales') },
    { label:'매출총이익', val: fmtKRW(k.gross_profit), color:c.positive, delta: delta(last.gross_profit, prv.gross_profit), spark: sp('gross_profit') },
    { label:'총이익률',   val: fmtPct(k.gross_margin), color:c.positive, delta: delta(last.sales_amount ? last.gross_profit/last.sales_amount*100 : 0, prv.sales_amount ? prv.gross_profit/prv.sales_amount*100 : 0), spark: trend.map(r => r.sales_amount ? r.gross_profit/r.sales_amount*100 : 0) },
    { label:'판관비',     val: fmtKRW(k.sga_expenses), color:c.amber, delta: delta(last.sga_expenses, prv.sga_expenses), spark: sp('sga_expenses') },
    { label:'공헌이익',   val: fmtKRW(k.operating_income), color: k.operating_income >= 0 ? c.positive : c.negative, delta: delta(last.operating_income, prv.operating_income), spark: sp('operating_income') },
    { label:'공헌이익률', val: fmtPct(k.operating_margin), color: k.operating_margin >= 0 ? c.positive : c.negative, delta: delta(last.sales_amount ? last.operating_income/last.sales_amount*100 : 0, prv.sales_amount ? prv.operating_income/prv.sales_amount*100 : 0), spark: trend.map(r => r.sales_amount ? r.operating_income/r.sales_amount*100 : 0) },
    { label:'매출수량',   val: fmtQty(k.sales_quantity), color:c.teal, hideDelta: true, spark: trend.map(r => Math.round(r.sales_amount / 35000)) },
  ];
  $('#kpiStrip').innerHTML = items.map((it, i) => {
    const dCls = it.hideDelta ? '' : (it.delta > 0.5 ? 'up' : it.delta < -0.5 ? 'down' : 'flat');
    const dIcon = it.delta > 0.5 ? 'trending-up' : it.delta < -0.5 ? 'trending-down' : 'minus';
    const dHtml = it.hideDelta ? '' : `<div class="kpi-delta ${dCls}"><i data-lucide="${dIcon}" class="ic"></i><span>${fmtDelta(it.delta)}</span></div>`;
    return `<div class="kpi${it.primary ? ' primary' : ''}">
      <div class="kpi-spark">${sparkline(it.spark, it.color)}</div>
      <div class="kpi-label">${it.label}${METRIC_FORMULAS[it.label]?`<span class="kpi-hint" data-metric="${it.label}" tabindex="0">ⓘ</span>`:''}</div>
      <div class="kpi-value" style="color:${it.color}">${it.val}</div>
      ${dHtml}
    </div>`;
  }).join('');
  if (window.lucide) lucide.createIcons();
}

/* ═════════════════════════════════════════════════════════════════════
   SMTREND EXTERNAL TOOLTIP  (global — called by Chart.js after render)
   ═════════════════════════════════════════════════════════════════════ */
function getSmTip(){
  var el = document.getElementById('smTrendTip');
  if(!el){
    el = document.createElement('div');
    el.id = 'smTrendTip';
    el.style.cssText = [
      'position:fixed','z-index:9500','pointer-events:none',
      'opacity:0','transition:opacity .12s',
      'background:#0D1829','color:#fff',
      'border-radius:8px','padding:9px 12px',
      'font-size:11.5px','line-height:1.65',
      "font-family:'Pretendard Variable','Pretendard',sans-serif",
      'box-shadow:0 6px 24px rgba(0,0,0,.5)',
      'min-width:160px',
      'border:1px solid rgba(255,255,255,.1)'
    ].join(';');
    document.body.appendChild(el);
  }
  return el;
}
function smTipHandler(ctx){
  var tooltip = ctx.tooltip;
  var el = getSmTip();
  if(tooltip.opacity === 0){ el.style.opacity = '0'; return; }

  var title = (tooltip.title && tooltip.title[0]) || '';
  var pts   = tooltip.dataPoints || [];

  var html = '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;letter-spacing:.05em">' + title + '</div>';
  pts.forEach(function(pt){
    if(pt.raw == null) return;
    var isPct  = pt.dataset.yAxisID === 'y2';
    var val    = isPct ? pt.raw.toFixed(1) + '%' : fmtKRW(pt.raw);
    var rawColor = typeof pt.dataset.borderColor === 'string' ? pt.dataset.borderColor : '';
    /* If color is same as tooltip bg (#0D1829) or very dark, use white */
    var color = (rawColor && rawColor !== '#0D1829' && rawColor !== '#0a0e14')
                  ? rawColor : 'rgba(255,255,255,0.75)';
    html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-top:3px">'
          + '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + color + ';flex-shrink:0"></span>'
          + '<span style="color:rgba(255,255,255,.65)">' + pt.dataset.label + '</span>'
          + '<span style="margin-left:auto;padding-left:12px;font-weight:700;font-family:\'JetBrains Mono\',monospace">' + val + '</span>'
          + '</div>';
  });

  el.innerHTML = html;
  el.style.opacity = '1';

  var r  = ctx.chart.canvas.getBoundingClientRect();
  var tw = el.offsetWidth, th = el.offsetHeight;
  var vw = window.innerWidth, vh = window.innerHeight;
  var lx = r.left + tooltip.caretX + 14;
  var ty = r.top  + tooltip.caretY - th / 2;
  if(lx + tw > vw - 8) lx = r.left + tooltip.caretX - tw - 14;
  if(ty < 8) ty = 8;
  if(ty + th > vh - 8) ty = vh - th - 8;
  el.style.left = lx + 'px';
  el.style.top  = ty + 'px';
}

   TREND CHART EXTERNAL TOOLTIP  (stacked bar — fixes 합계 footer clipping)

function getTrendTip(){

    el.style.cssText = [
      'position:fixed','z-index:9500','pointer-events:none',

      'border:1px solid rgba(255,255,255,.1)'
    ].join(';');
    document.body.appendChild(el);
  }
  return el;
}
function trendTipHandler(ctx){
  var tooltip = ctx.tooltip;
  var el = getTrendTip();
  if(tooltip.opacity === 0){ el.style.opacity = '0'; return; }
  var title = (tooltip.title && tooltip.title[0]) || '';
  var pts = tooltip.dataPoints || [];
  var html = '<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;letter-spacing:.05em">' + title + '</div>';
  var salesTotal = 0;
  pts.forEach(function(pt){
    if(pt.raw == null) return;
    var isPct = pt.dataset.yAxisID === 'y2';
    var val = isPct ? (pt.raw||0).toFixed(1) + '%' : fmtKRW(pt.raw);
    if(!isPct) salesTotal += (pt.raw || 0);
    var bg = typeof pt.dataset.backgroundColor === 'string' ? pt.dataset.backgroundColor : '';
    var bc = typeof pt.dataset.borderColor === 'string' ? pt.dataset.borderColor : '';
    var color = (bg && bg.length > 3) ? bg : (bc && bc.length > 3) ? bc : 'rgba(255,255,255,0.75)';
    var dot = isPct
      ? '<span style="display:inline-block;width:14px;height:0;border-top:2px solid '+color+';vertical-align:middle;flex-shrink:0"></span>'
      : '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+color+';flex-shrink:0"></span>';
    html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-top:2px">'
          + dot
          + '<span style="color:rgba(255,255,255,.65)">' + pt.dataset.label + '</span>'
          + '<span style="margin-left:auto;padding-left:12px;font-weight:700;font-family:\'JetBrains Mono\',monospace">' + val + '</span>'
          + '</div>';
  });
  if(salesTotal > 0){
    html += '<div style="border-top:1px solid rgba(255,255,255,.12);margin-top:6px;padding-top:5px;display:flex;align-items:center;justify-content:space-between;white-space:nowrap">'
          + '<span style="color:rgba(255,255,255,.45);font-size:10.5px;font-weight:600">합계(매출)</span>'
          + '<span style="font-weight:700;font-family:\'JetBrains Mono\',monospace">' + fmtKRW(salesTotal) + '</span>'
          + '</div>';
  }
  el.innerHTML = html;
  el.style.opacity = '1';
  var r = ctx.chart.canvas.getBoundingClientRect();
  var tw = el.offsetWidth, th = el.offsetHeight;
  var vw = window.innerWidth, vh = window.innerHeight;
  var lx = r.left + tooltip.caretX + 14;
  var ty = r.top + tooltip.caretY - th / 2;
  if(lx + tw > vw - 8) lx = r.left + tooltip.caretX - tw - 14;
  if(ty < 8) ty = 8;
  if(ty + th > vh - 8) ty = vh - th - 8;
  el.style.left = lx + 'px';
  el.style.top = ty + 'px';
}

async function initTableauView(){
  await tblLoadFields();
  await tblLoadViews();
  tblInitDnD();
  tblRenderShelfChips();
  $$('#tblChartBtns .tbl-chart-btn').forEach(btn => {
    btn.onclick = () => {
      state.tableau.config.chartType = btn.dataset.type;
      $$('#tblChartBtns .tbl-chart-btn').forEach(b => b.classList.toggle('active', b===btn));
      tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
    };
  });
  $$('.tbl-mode-btn').forEach(btn => {
    btn.onclick = () => {
      state.tableau.config.mode = btn.dataset.mode;
      $$('.tbl-mode-btn').forEach(b => b.classList.toggle('active', b===btn));
      const wrap = $('#tblWrap');
      if (wrap) wrap.classList.toggle('pivot-mode', btn.dataset.mode === 'pivot');
      tblMarkUnsaved(); tblAutoSave(); tblRenderViz();
    };
  });
  { const wrap = $('#tblWrap'); if (wrap) wrap.classList.toggle('pivot-mode', state.tableau.config.mode === 'pivot'); }
  const sortSel = $('#tblSortSel');
  if (sortSel) sortSel.onchange = () => { state.tableau.config.sort = sortSel.value; tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery(); };
  const limitSel = $('#tblLimitSel');
  if (limitSel) limitSel.onchange = () => { state.tableau.config.limit = parseInt(limitSel.value); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery(); };
  const fieldSearch = $('#tblFieldSearch');
  if (fieldSearch) fieldSearch.oninput = () => tblRenderFields(fieldSearch.value.trim().toLowerCase());
  const clearSorts = $('#tblClearSorts');
  if (clearSorts) clearSorts.onclick = () => {
    state.tableau.config.fieldSorts = [];
    tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
  };
  const resetAll = $('#tblResetAll');
  if (resetAll) resetAll.onclick = () => {
    if (!confirm('현재 시트의 모든 선반·필터·설정을 초기화할까요?\n(실행 취소 Ctrl+Z 로 되돌릴 수 있습니다)')) return;
    state.tableau.config = tblEmptyConfig();
    state.tableau.queryResult = null;
    tblRenderShelfChips(); tblSyncToolbar(); tblUpdateSortControls();
    tblMarkUnsaved(); tblAutoSave(); tblRenderViz(); tblSetVizFooter(null);
    if (state.tableau._pushHistory) state.tableau._pushHistory();
  };
  $$('.tbl-shelf-clear-btn').forEach(btn => {
    btn.onclick = () => {
      const s = btn.dataset.shelf;
      const cfg = state.tableau.config;
      if (s === 'color' || s === 'size' || s === 'label') { cfg[s] = null; }
      else if (s === 'filters') { cfg.filters = {}; }
      else if (s === 'detail') { cfg.detail = []; }
      else {
        if ((s === 'rows' || s === 'columns') && Array.isArray(cfg.fieldSorts)) {
          const removing = new Set(cfg[s] || []);
          cfg.fieldSorts = cfg.fieldSorts.filter(fs => !removing.has(fs.field));
        }
        cfg[s] = [];
      }
      tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
    };
  });
  const exportCSV = $('#tblExportCSV');
  if (exportCSV) exportCSV.onclick = tblExportCSV;
  const exportPNG = $('#tblExportPNG');
  if (exportPNG) exportPNG.onclick = tblExportPNG;

  /* ── Undo / Redo ── */
  function tblPushHistory() {
    const st = state.tableau;
    const snap = JSON.stringify(st.config);
    if (st.history[st.historyIndex] === snap) return;
    st.history = st.history.slice(0, st.historyIndex + 1);
    st.history.push(snap);
    if (st.history.length > 50) { st.history.shift(); } else { st.historyIndex++; }
    tblUpdateUndoRedo();
  }
  function tblUpdateUndoRedo() {
    const st = state.tableau;
    const u = $('#tblUndo'), r = $('#tblRedo');
    if (u) u.disabled = st.historyIndex <= 0;
    if (r) r.disabled = st.historyIndex >= st.history.length - 1;
  }
  state.tableau._pushHistory = tblPushHistory;
  /* undo/redo 공통: 복원 → 정규화 config로 항목 교체(redo 보존) → 툴바 동기화 → 저장 */
  const tblRestoreHistory = (idx) => {
    const st = state.tableau;
    st.config = JSON.parse(st.history[idx]);
    tblApplyViewConfig(st.config);
    st.history[idx] = JSON.stringify(st.config); /* 정규화 반영 — push 가드가 redo 스택을 자르지 않도록 */
    st.historyIndex = idx;
    tblRenderShelfChips(); tblSyncToolbar(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery(); tblUpdateUndoRedo();
  };
  const undoBtn = $('#tblUndo');
  if (undoBtn) undoBtn.onclick = () => {
    const st = state.tableau;
    if (st.historyIndex > 0) tblRestoreHistory(st.historyIndex - 1);
  };
  const redoBtn = $('#tblRedo');
  if (redoBtn) redoBtn.onclick = () => {
    const st = state.tableau;
    if (st.historyIndex < st.history.length - 1) tblRestoreHistory(st.historyIndex + 1);
  };
  /* keydown은 전역 1회만 등록 (탭 재진입 시 누적 방지) — 현재 DOM의 버튼을 동적 조회 */
  if (!state.tableau._keysBound) {
    state.tableau._keysBound = true;
    document.addEventListener('keydown', e => {
      if (state.category !== 'tableau') return;
      /* 입력 필드 안에서는 네이티브 텍스트 undo 우선 */
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); $('#tblUndo')?.click(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); $('#tblRedo')?.click(); }
    });
  }
  tblPushHistory(); // seed initial state

  /* ── Swap rows/cols ── */
  const swapBtn = $('#tblSwapAxes');
  if (swapBtn) swapBtn.onclick = () => {
    tblPushHistory();
    const cfg = state.tableau.config;
    [cfg.rows, cfg.columns] = [cfg.columns, cfg.rows];
    tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
  };

  /* ── Reference line toggle ── */
  const refBtn = $('#tblRefLine');
  if (refBtn) refBtn.onclick = () => {
    tblPushHistory();
    state.tableau.config.showRefLine = !state.tableau.config.showRefLine;
    refBtn.classList.toggle('active', state.tableau.config.showRefLine);
    tblMarkUnsaved(); tblAutoSave(); tblRenderViz();
  };

  if (window.lucide) lucide.createIcons();
  const saveBtn = $('#tblSaveBtn');
  if (saveBtn) saveBtn.onclick = async () => {
    const id = state.tableau.currentId;
    if (!id) return;
    clearTimeout(state.tableau.saveTimer);
    await fetch(`/api/views/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:state.tableau.config})});
    const v = state.tableau.views.find(v=>v.id===id);
    if (v) v.config = JSON.parse(JSON.stringify(state.tableau.config));
    saveBtn.textContent = '저장됨'; saveBtn.classList.add('saved');
  };
}

async function tblLoadFields(){
  try {
    const r = await fetch('/api/tableau/fields').then(r=>r.json());
    state.tableau.fields = { dimensions: r.dimensions||[], measures: r.measures||[], date_dims: r.date_dims||[] };
    tblRenderFields();
  } catch(e){ console.error('[tbl] fields load error', e); }
}

function tblRenderFields(filter){
  const panel = $('#tblFieldsContent');
  if (!panel) return;
  const { dimensions, measures, date_dims } = state.tableau.fields;
  const dateDimsSet = new Set(date_dims || []);
  const q = (filter || '').toLowerCase();
  const chip = (f, type) => {
    const isDate = type === 'dim' && dateDimsSet.has(f);
    const icon = isDate ? 'calendar' : (type === 'dim' ? 'tag' : 'hash');
    const extra = isDate ? ' date-dim' : '';
    return `<div class="tbl-field-chip ${type}${extra}" draggable="true" data-field="${f}" data-ftype="${type}">` +
           `<i data-lucide="${icon}" class="ic"></i>${f}</div>`;
  };
  const match = f => !q || f.toLowerCase().includes(q);
  const dateDimFields = dimensions.filter(f => dateDimsSet.has(f) && match(f));
  const pureDimFields = dimensions.filter(f => !dateDimsSet.has(f) && match(f));
  const measFields = measures.filter(match);
  let html = '';
  if (dateDimFields.length) html += `<div class="tbl-fields-section"><div class="tbl-fields-label"><i data-lucide="calendar" class="ic" style="width:10px;height:10px;margin-right:3px"></i>날짜 차원</div>${dateDimFields.map(f=>chip(f,'dim')).join('')}</div>`;
  if (pureDimFields.length) html += `<div class="tbl-fields-section"><div class="tbl-fields-label"><i data-lucide="tag" class="ic" style="width:10px;height:10px;margin-right:3px"></i>차원</div>${pureDimFields.map(f=>chip(f,'dim')).join('')}</div>`;
  if (measFields.length) html += `<div class="tbl-fields-section"><div class="tbl-fields-label"><i data-lucide="hash" class="ic" style="width:10px;height:10px;margin-right:3px"></i>측정값</div>${measFields.map(f=>chip(f,'meas')).join('')}</div>`;
  if (!html) html = `<div style="padding:12px;font-size:11px;color:var(--text-tertiary);text-align:center">검색 결과 없음</div>`;
  panel.innerHTML = html;
  if (window.lucide) lucide.createIcons({nodes:[panel]});
  tblInitDnD();
}

function tblInitDnD(){
  $$('#tblFieldsContent .tbl-field-chip').forEach(chip => {
    chip.ondragstart = e => {
      state.tableau.dragField = { name: chip.dataset.field, ftype: chip.dataset.ftype };
      e.dataTransfer.effectAllowed = 'copy';
    };
    chip.ondragend = () => { state.tableau.dragField = null; };
  });
  $$('.tbl-shelf').forEach(shelf => {
    shelf.ondragover = e => { e.preventDefault(); shelf.classList.add('drag-over'); };
    shelf.ondragleave = () => shelf.classList.remove('drag-over');
    shelf.ondrop = e => {
      e.preventDefault();
      shelf.classList.remove('drag-over');
      /* 선반 간 칩 이동 (Tableau 스타일) */
      const dc = state.tableau.dragChip;
      if (dc) {
        if (dc.shelf !== shelf.dataset.shelf) tblMoveBetweenShelves(dc.shelf, dc.field, shelf.dataset.shelf);
        return;
      }
      const f = state.tableau.dragField;
      if (!f) return;
      tblAddToShelf(shelf.dataset.shelf, f.name);
    };
  });
  /* 칩을 필드 패널로 끌어내면 선반에서 제거 (Tableau 스타일) */
  const fieldsPanel = $('#tblFields');
  if (fieldsPanel) {
    fieldsPanel.ondragover = e => { if (state.tableau.dragChip) { e.preventDefault(); fieldsPanel.classList.add('drag-remove'); } };
    fieldsPanel.ondragleave = () => fieldsPanel.classList.remove('drag-remove');
    fieldsPanel.ondrop = e => {
      fieldsPanel.classList.remove('drag-remove');
      const dc = state.tableau.dragChip;
      if (!dc) return;
      e.preventDefault();
      state.tableau.dragChip = null;
      tblRemoveFromShelf(dc.shelf, dc.field);
    };
  }
}

/* 필드 종류 판별 + 선반별 허용 타입 */
function tblFieldKind(f){ return state.tableau.fields.measures.includes(f) ? 'meas' : 'dim'; }
function tblShelfAccepts(shelf, f){
  const k = tblFieldKind(f);
  if (shelf === 'measures') return k === 'meas';
  if (shelf === 'rows' || shelf === 'columns' || shelf === 'color' || shelf === 'detail' || shelf === 'filters') return k === 'dim';
  return true; /* size, label은 둘 다 허용 */
}
function tblFlashShelfReject(shelf){
  const el = $(`#tblShelf_${shelf}`);
  if (!el) return;
  el.classList.add('reject');
  setTimeout(()=>el.classList.remove('reject'), 600);
}

/* 선반 간 칩 이동 */
function tblMoveBetweenShelves(from, field, to){
  if (from === to) return;
  if (!tblShelfAccepts(to, field)) { tblFlashShelfReject(to); state.tableau.dragChip = null; return; }
  const cfg = state.tableau.config;
  /* 원본 선반에서 제거 */
  if (from === 'color' || from === 'size' || from === 'label') { cfg[from] = null; }
  else if (from === 'detail') { cfg.detail = (cfg.detail || []).filter(f => f !== field); }
  else if (from === 'filters') { delete cfg.filters[field]; }
  else {
    cfg[from] = (cfg[from] || []).filter(f => f !== field);
    if (from === 'measures') {
      if (cfg.measureAggs) delete cfg.measureAggs[field];
      if (cfg.tableCalcs) delete cfg.tableCalcs[field];
    }
    if ((from === 'rows' || from === 'columns') && cfg.fieldSorts) cfg.fieldSorts = cfg.fieldSorts.filter(s => s.field !== field);
  }
  /* 대상 선반에 추가 */
  if (to === 'color' || to === 'size' || to === 'label') { cfg[to] = field; }
  else if (to === 'detail') { if (!Array.isArray(cfg.detail)) cfg.detail = []; if (!cfg.detail.includes(field)) cfg.detail.push(field); }
  else if (to === 'filters') { if (!cfg.filters[field]) cfg.filters[field] = []; }
  else {
    if (!cfg[to]) cfg[to] = [];
    if (!cfg[to].includes(field)) {
      cfg[to].push(field);
      if (to === 'measures') { if (!cfg.measureAggs) cfg.measureAggs = {}; if (!cfg.measureAggs[field]) cfg.measureAggs[field] = 'SUM'; }
    }
  }
  state.tableau.dragChip = null;
  tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
}

function tblAddToShelf(shelf, fieldName){
  if (!tblShelfAccepts(shelf, fieldName)) { tblFlashShelfReject(shelf); return; }
  const cfg = state.tableau.config;
  if (shelf === 'color' || shelf === 'size' || shelf === 'label') {
    cfg[shelf] = fieldName;
  } else if (shelf === 'detail') {
    if (!Array.isArray(cfg.detail)) cfg.detail = [];
    if (!cfg.detail.includes(fieldName)) cfg.detail.push(fieldName);
  } else if (shelf === 'filters') {
    if (!cfg.filters[fieldName]) cfg.filters[fieldName] = [];
  } else {
    if (!cfg[shelf]) cfg[shelf] = [];
    if (!cfg[shelf].includes(fieldName)) {
      cfg[shelf].push(fieldName);
      if (shelf === 'measures') {
        if (!cfg.measureAggs) cfg.measureAggs = {};
        if (!cfg.measureAggs[fieldName]) cfg.measureAggs[fieldName] = 'SUM';
      }
    }
  }
  tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
}

function tblRemoveFromShelf(shelf, fieldName){
  const cfg = state.tableau.config;
  if (shelf === 'color' || shelf === 'size' || shelf === 'label') {
    cfg[shelf] = null;
  } else if (shelf === 'detail') {
    cfg.detail = (cfg.detail || []).filter(f => f !== fieldName);
  } else if (shelf === 'filters') {
    delete cfg.filters[fieldName];
  } else {
    cfg[shelf] = (cfg[shelf] || []).filter(f => f !== fieldName);
    if (shelf === 'measures') {
      if (cfg.measureAggs) delete cfg.measureAggs[fieldName];
      if (cfg.tableCalcs) delete cfg.tableCalcs[fieldName]; /* 재추가 시 잊힌 계산 부활 방지 */
    }
    if ((shelf === 'rows' || shelf === 'columns') && cfg.fieldSorts) cfg.fieldSorts = cfg.fieldSorts.filter(s => s.field !== fieldName);
  }
  tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
}

function tblRenderShelfChips(){
  const cfg = state.tableau.config;
  const { dimensions } = state.tableau.fields;
  const isDim = f => dimensions.includes(f);
  const fieldSorts = Array.isArray(cfg.fieldSorts) ? cfg.fieldSorts : [];
  const multiSort = fieldSorts.length > 1;

  const renderChips = (shelf, items) => {
    const el = $(`#tblChips_${shelf}`);
    if (!el) return;
    el.innerHTML = items.map(f => {
      const chipCls = isDim(f) ? 'dim' : 'meas';
      let inner = '';
      const txt = `<span class="tbl-chip-txt" title="${f}">${f}</span>`;
      if (shelf === 'measures') {
        const agg = (cfg.measureAggs || {})[f] || 'SUM';
        const calc = (cfg.tableCalcs || {})[f];
        const calcLabels = {pct_total:'%합계', running_sum:'누적', diff_prev:'차이'};
        const calcBadge = calc ? `<span class="tbl-calc-badge" title="테이블 계산: ${calcLabels[calc]||calc}">${calcLabels[calc]||calc}</span>` : '';
        inner = `<span class="tbl-agg-badge" data-field="${f}">${agg}</span>${txt}${calcBadge}`;
      } else if (shelf === 'filters') {
        const cnt = ((cfg.filters || {})[f] || []).length;
        inner = `${txt}<span class="tbl-filter-count">${cnt ? cnt+'개 선택' : 'ALL'}</span>`;
      } else if (shelf === 'rows' || shelf === 'columns') {
        const sortIdx = fieldSorts.findIndex(s => s.field === f);
        const sortEntry = sortIdx >= 0 ? fieldSorts[sortIdx] : null;
        const isSorted = !!sortEntry;
        const dirIcon = sortEntry ? (sortEntry.dir === 'asc' ? '↑' : '↓') : '⇅';
        const numBadge = isSorted && multiSort ? `<span class="tbl-sort-priority">${sortIdx + 1}</span>` : '';
        const title = isSorted ? (sortEntry.dir === 'asc' ? '클릭: 내림차순' : '클릭: 정렬 제거') : '클릭: 오름차순 정렬';
        const isDate = state.tableau.fields.date_dims.includes(f);
        const gran = isDate ? ((cfg.dateGranularity||{})[f] || 'MONTH') : null;
        const granBadge = isDate
          ? `<span class="tbl-gran-badge" data-field="${f}" title="날짜 단위 변경">${gran}</span>`
          : '';
        inner = `${granBadge}${txt}<span class="tbl-sort-btn${isSorted?' sorted':''}" data-field="${f}" data-shelf="${shelf}" title="${title}">${numBadge}${dirIcon}</span>`;
      } else {
        inner = txt;
      }
      return `<span class="tbl-s-chip ${chipCls}" data-shelf="${shelf}" data-field="${f}" draggable="true">${inner}<span class="tbl-s-chip-del" data-shelf="${shelf}" data-field="${f}">×</span></span>`;
    }).join('');

    /* Del button */
    el.querySelectorAll('.tbl-s-chip-del').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); tblRemoveFromShelf(btn.dataset.shelf, btn.dataset.field); };
    });
    /* Agg badge */
    el.querySelectorAll('.tbl-agg-badge').forEach(badge => {
      badge.onclick = (e) => { e.stopPropagation(); tblShowAggSelector(e, badge.dataset.field); };
    });
    /* Date granularity badge — cycle YEAR → QUARTER → MONTH → DAY */
    el.querySelectorAll('.tbl-gran-badge').forEach(badge => {
      badge.onclick = (e) => {
        e.stopPropagation();
        const f = badge.dataset.field;
        const order = ['YEAR','QUARTER','MONTH']; /* 데이터가 YYYY-MM이므로 DAY는 의미 없음 */
        const cur = (cfg.dateGranularity||{})[f] || 'MONTH';
        const next = order[(order.indexOf(cur) + 1) % order.length];
        if (!cfg.dateGranularity) cfg.dateGranularity = {};
        cfg.dateGranularity[f] = next;
        tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
      };
    });
    /* Sort button — cycle: none → asc → desc → none */
    el.querySelectorAll('.tbl-sort-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const f = btn.dataset.field;
        if (!Array.isArray(cfg.fieldSorts)) cfg.fieldSorts = [];
        const idx = cfg.fieldSorts.findIndex(s => s.field === f);
        if (idx === -1) cfg.fieldSorts.push({field: f, dir: 'asc'});
        else if (cfg.fieldSorts[idx].dir === 'asc') cfg.fieldSorts[idx].dir = 'desc';
        else cfg.fieldSorts.splice(idx, 1);
        tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
        tblUpdateSortControls();
      };
    });
    /* Filter chip click */
    if (shelf === 'filters') {
      el.querySelectorAll('.tbl-s-chip').forEach(chip => {
        chip.style.cursor = 'pointer';
        chip.onclick = (e) => { if (!e.target.classList.contains('tbl-s-chip-del')) tblShowFilterPicker(e, chip.dataset.field); };
      });
    }
    /* 모든 선반 칩: 드래그 시작/종료 (선반 간 이동 + 패널로 제거용) */
    el.querySelectorAll('.tbl-s-chip[draggable]').forEach(chip => {
      chip.ondragstart = e => {
        state.tableau.dragChip = {shelf, field: chip.dataset.field};
        chip.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.stopPropagation();
      };
      chip.ondragend = () => { chip.classList.remove('dragging'); setTimeout(()=>{state.tableau.dragChip = null;}, 50); };
    });
    /* 같은 선반 내 재정렬 (rows/columns/measures/detail — 순서가 의미있는 선반) */
    if (shelf === 'rows' || shelf === 'columns' || shelf === 'measures' || shelf === 'detail') {
      el.querySelectorAll('.tbl-s-chip[draggable]').forEach(chip => {
        chip.ondragover = e => {
          if (!state.tableau.dragChip || state.tableau.dragChip.shelf !== shelf || state.tableau.dragChip.field === chip.dataset.field) return;
          e.preventDefault(); e.stopPropagation();
          chip.classList.add('drag-over');
        };
        chip.ondragleave = () => chip.classList.remove('drag-over');
        chip.ondrop = e => {
          e.preventDefault(); e.stopPropagation();
          chip.classList.remove('drag-over');
          const dc = state.tableau.dragChip;
          if (!dc || dc.shelf !== shelf || dc.field === chip.dataset.field) return;
          const arr = cfg[shelf] || [];
          const from = arr.indexOf(dc.field), to = arr.indexOf(chip.dataset.field);
          if (from === -1 || to === -1) return;
          arr.splice(from, 1); arr.splice(to, 0, dc.field);
          state.tableau.dragChip = null;
          tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
        };
      });
    }
    /* Shelf clear button visibility */
    const clearBtn = $(`#tblShelfClear_${shelf}`);
    if (clearBtn) clearBtn.style.display = items.length ? 'inline-flex' : 'none';
  };

  renderChips('rows',    cfg.rows || []);
  renderChips('columns', cfg.columns || []);
  renderChips('measures',cfg.measures || []);
  renderChips('color',   cfg.color ? [cfg.color] : []);
  renderChips('size',    cfg.size  ? [cfg.size]  : []);
  renderChips('label',   cfg.label ? [cfg.label] : []);
  /* 와일드카드(__wc__) 키는 일반 칩 목록에서 제외 — 별도 렌더 */
  renderChips('filters', Object.keys(cfg.filters || {}).filter(k => !k.startsWith('__wc__')));
  /* 와일드카드 필터 칩 추가 렌더 */
  {
    const fEl = $('#tblChips_filters');
    if (fEl) {
      Object.entries(cfg.filters || {}).filter(([k]) => k.startsWith('__wc__')).forEach(([k, v]) => {
        const chip = document.createElement('span');
        chip.className = 'tbl-s-chip dim';
        chip.style.cursor = 'pointer';
        const fname = v.field || k.slice(6);
        chip.innerHTML = `<span class="tbl-chip-txt" title="${fname} 와일드카드">${fname}</span><span class="tbl-filter-count">${v.exclude?'제외':'패턴'} ${(v.patterns||[]).length}</span><span class="tbl-s-chip-del">×</span>`;
        chip.querySelector('.tbl-s-chip-del').onclick = (e) => {
          e.stopPropagation();
          delete cfg.filters[k];
          tblRenderShelfChips(); tblMarkUnsaved(); tblAutoSave(); tblExecuteQuery();
        };
        chip.onclick = (e) => { if (!e.target.classList.contains('tbl-s-chip-del')) tblShowFilterPicker(e, fname); };
        fEl.appendChild(chip);
      });
      const clearBtn = $('#tblShelfClear_filters');
      if (clearBtn && Object.keys(cfg.filters||{}).length) clearBtn.style.display = 'inline-flex';
    }
  }
  tblUpdateSortControls();
}

async function tblExecuteQuery(){
  if (state.tableau._pushHistory) state.tableau._pushHistory();
  const cfg = state.tableau.config;
  /* 세부정보 선반 제거됨 — 과거 저장 뷰에 남은 detail 설정 정리 */
  if (Array.isArray(cfg.detail) && cfg.detail.length) cfg.detail = [];
  if (!cfg.measures || !cfg.measures.length) { tblRenderViz(); tblSetVizFooter(null); return; }
  state.tableau.loading = true;
  state.tableau.pivotClientSort = null;
  tblSetVizLoading(true);
  /* 시퀀스 토큰 — 늦게 도착한 이전 쿼리가 최신 결과를 덮어쓰지 않도록 */
  const seq = (state.tableau._querySeq = (state.tableau._querySeq || 0) + 1);
  const t0 = performance.now();
  try {
    const r = await fetch('/api/tableau/query', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:cfg})}).then(r=>r.json());
    if (seq !== state.tableau._querySeq) return; /* 더 새로운 쿼리가 진행 중 — 이 응답은 폐기 */
    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
    if (r.error) { tblSetVizError(r.error); tblSetVizFooter(null); return; }
    state.tableau.queryResult = r;
    tblRenderViz();
    tblSetVizFooter({rows: (r.rows||[]).length, sec: elapsed, rowFields: r.row_fields||[], colFields: r.col_fields||[], measures: r.measures||[]});
  } catch(e) { if (seq === state.tableau._querySeq) { tblSetVizError('쿼리 실패: ' + e); tblSetVizFooter(null); } }
  finally { if (seq === state.tableau._querySeq) state.tableau.loading = false; }
}

function tblSetVizFooter(info){
  const el = $('#tblVizFooter');
  if (!el) return;
  if (!info) { el.innerHTML = ''; return; }
  const {rows, sec, rowFields, colFields, measures} = info;
  const isCross = rowFields.length > 0 && colFields.length > 0;
  const shape = isCross
    ? `${[...new Set(state.tableau.queryResult?.rows?.map(r=>rowFields.map(f=>r[f]).join('·')))].length}행 × ${[...new Set(state.tableau.queryResult?.rows?.map(r=>colFields.map(f=>r[f]).join('·')))].length}열`
    : `${rows}행`;
  const sortInfo = Array.isArray(state.tableau.config.fieldSorts) && state.tableau.config.fieldSorts.length
    ? state.tableau.config.fieldSorts.map((s,i)=>`${i+1}. ${s.field} ${s.dir==='asc'?'↑':'↓'}`).join(' › ')
    : '';
  const tn = state.tableau.config.topN;
  const topNInfo = tn && tn.n ? `${tn.dir==='asc'?'하위':'상위'} ${tn.n} (${tn.measure})` : '';
  el.innerHTML = `<span>${shape}</span>`
    + (topNInfo?`<span class="tbl-vf-sep"></span><span style="color:var(--accent)">${topNInfo}</span>`:'')
    + (sortInfo?`<span class="tbl-vf-sep"></span><span>${sortInfo}</span>`:'')
    + `<span class="tbl-vf-sep"></span><span>${sec}s</span>`;
}

function tblSetVizLoading(on){
  const viz = $('#tblViz');
  if (!viz||!on) return;
  viz.innerHTML = '<div class="tbl-viz-empty"><div class="spinner"></div><p>쿼리 실행 중…</p></div>';
}

function tblFmtNum(v){
  if (typeof v !== 'number') return String(v||'');
  const a = Math.abs(v);
  if (a>=1e12) return (v/1e12).toFixed(1)+'조';
  if (a>=1e8)  return (v/1e8).toFixed(1)+'억';
  if (a>=1e4)  return (v/1e4).toFixed(1)+'만';
  if (a>=1e3)  return (v/1e3).toFixed(1)+'천';
  return v.toFixed(0);
}

function tblRenderEChart(viz, result, cfg){
  viz.innerHTML = '<div class="tbl-echarts" id="tblEChartsEl" style="height:100%;min-height:360px"></div>';
  const el = $('#tblEChartsEl');
  if (!el||!window.echarts){ viz.innerHTML='<div class="tbl-viz-empty"><p>ECharts 로딩 실패</p></div>'; return; }
  if (state.tableau.echartsInst) { try{state.tableau.echartsInst.dispose();}catch(e){} }
  const isDark = document.documentElement.classList.contains('theme-dark');
  const inst = echarts.init(el, isDark?'dark':null, {renderer:'canvas'});
  state.tableau.echartsInst = inst;
  const rows=result.rows, measures=result.measures||[], groupBy=result.group_by||[];
  const rowFields=result.row_fields||[], colFields=result.col_fields||[];
  const colorFieldName=result.color_field||cfg.color||null;
  const sizeFieldName =result.size_field ||cfg.size ||null;
  const dataLabelField=result.label_field||cfg.label||null;   /* 레이블 선반 */
  const detailFields  =result.detail_fields||cfg.detail||[];  /* 세부정보 선반 */
  const isCrossTab = rowFields.length>0 && colFields.length>0;
  const type=cfg.chartType;
  const cc=chartColors();                  /* 앱 공통 테마 색 (CSS 변수 연동) */
  const palette=chartPalette();            /* 브랜드 팔레트 — 라이트/다크/팔레트 트윅 자동 반영 */
  const meas=measures[0]||'';
  const getRowVal = r => rowFields.map(rf=>String(r[rf]??'')).join(' · ');
  const getColVal = r => colFields.map(cf=>String(r[cf]??'')).join(' · ');
  /* 색상/레이블 필드 결정 — 레이블/세부정보 차원은 축에서 제외 */
  let labels, labelField, colorField, colorByItem=false;
  const auxDims = new Set([...(detailFields||[]), ...(dataLabelField && groupBy.includes(dataLabelField) ? [dataLabelField] : [])]);
  if (isCrossTab) {
    labels = [...new Set(rows.map(getColVal))];
    labelField = null;
    colorField = null;
  } else {
    const nonColorGroupBy = groupBy.filter(f => f !== colorFieldName && !auxDims.has(f));
    labelField = nonColorGroupBy[0] || (colorFieldName && groupBy.includes(colorFieldName) ? colorFieldName : groupBy.filter(f=>!auxDims.has(f))[0]) || groupBy[0] || null;
    colorField = colorFieldName && groupBy.includes(colorFieldName) && colorFieldName !== labelField ? colorFieldName : null;
    labels = labelField?[...new Set(rows.map(r=>String(r[labelField]??'')))]:[];
  }
  /* 날짜 차원 축은 기본 시간순 — 명시적 필드 정렬·TopN이 없을 때만 */
  const _dateDims = new Set((state.tableau.fields && state.tableau.fields.date_dims) || []);
  const _chronoOK = !(Array.isArray(cfg.fieldSorts) && cfg.fieldSorts.length) && !(cfg.topN && cfg.topN.n);
  if (_chronoOK) {
    if (isCrossTab) { if (colFields.length && colFields.every(f=>_dateDims.has(f))) labels.sort(); }
    else if (labelField && _dateDims.has(labelField)) labels.sort();
  }
  /* 데이터 레이블 포맷터: 레이블 선반 필드 값 표시 (차원→텍스트, 측정값→숫자) */
  const mkDataLabel = (pos) => {
    if (!dataLabelField) return undefined;
    const inside = pos === 'inside';
    return {show:true, position:pos||'top', fontSize:10,
      color:inside?'#fff':(isDark?'#ccc':'#555'),
      textBorderColor:inside?'rgba(0,0,0,0.35)':(isDark?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.85)'),
      textBorderWidth:2,
      formatter:p=>{const r=p.data&&p.data.__row; if(!r)return ''; const v=r[dataLabelField];
        return typeof v==='number'?tblFmtNum(v):String(v??'');}};
  };
  /* 세부정보 툴팁 포맷터: 기본 내용 + 세부정보 필드 값 추가 */
  const mkDetailTooltip = (base) => {
    if (!detailFields.length) return base;
    return {trigger:'axis', formatter: params => {
      const arr = Array.isArray(params)?params:[params];
      let html = arr[0].axisValueLabel||arr[0].name||'';
      arr.forEach(p=>{ html += `<br/>${p.marker||''}${p.seriesName}: <b>${tblFmtNum(typeof p.value==='object'?p.value?.value:p.value)}</b>`; });
      const row = arr[0].data && arr[0].data.__row;
      if (row) detailFields.forEach(df=>{ if(row[df]!==undefined) html += `<br/><span style="opacity:.65">${df}: ${row[df]}</span>`; });
      return html;
    }};
  };
  let option={};
  if (type==='pie'||type==='donut') {
    /* 색상 선반이 있으면 그 필드를, 없으면 labelField를 파이 슬라이스 키로 사용 */
    const pieKeyField = colorFieldName && groupBy.includes(colorFieldName) ? colorFieldName : labelField;
    const pieTooltip = detailFields.length
      ? {trigger:'item', formatter:p=>{let h=`${p.name}: ${tblFmtNum(p.value)} (${p.percent}%)`;const r=p.data&&p.data.__row;if(r)detailFields.forEach(df=>{if(r[df]!==undefined)h+=`<br/><span style="opacity:.65">${df}: ${r[df]}</span>`;});return h;}}
      : {trigger:'item',formatter:'{b}: {c} ({d}%)'};
    /* 레이블 선반: 슬라이스 이름 + 레이블 필드 값 표시 */
    const pieLabel = dataLabelField
      ? {show:true,formatter:p=>{const r=p.data&&p.data.__row;const v=r?r[dataLabelField]:null;
          return `${p.name}\n${typeof v==='number'?tblFmtNum(v):String(v??'')}`;}}
      : undefined;
    option={tooltip:pieTooltip,legend:{orient:'vertical',right:10,top:'center',textStyle:{color:isDark?'#ccc':'#333'}},
      series:[{type:'pie',radius:type==='donut'?['45%','70%']:'60%',
        data:rows.map((r,i)=>({name:isCrossTab?getColVal(r):String(r[pieKeyField]||''),value:r[meas]||0,__row:r,itemStyle:{color:palette[i%palette.length]}})),
        label:pieLabel,
        emphasis:{itemStyle:{shadowBlur:10}}}]};
  } else if (type==='scatter'||type==='bubble') {
    const xF=measures[0]||'', yF=measures[1]||measures[0]||'';
    /* 크기 선반 우선, 없으면 measures[2], 없으면 xF */
    const sF = sizeFieldName||measures[2]||xF;
    const maxS=Math.max(...rows.map(r=>r[sF]||0),1);
    const isBubble = type==='bubble'||!!sizeFieldName;
    const mkSym = d=>Math.max(6,Math.sqrt(d[2]/maxS)*60);
    /* 산점도 레이블: 포인트 우측에 레이블 필드 값 표시 */
    const scatterLabel = mkDataLabel('right');
    if (colorField) {
      /* 색상 필드별 시리즈 분리 */
      const colorGroups=[...new Set(rows.map(r=>String(r[colorField]||'')))];
      option={tooltip:{trigger:'item',formatter:p=>`${p.seriesName}<br/>${xF}: ${tblFmtNum(p.value[0])}<br/>${yF}: ${tblFmtNum(p.value[1])}${sizeFieldName?`<br/>${sizeFieldName}: ${tblFmtNum(p.value[2])}`:''}` },
        xAxis:{type:'value',name:xF,axisLabel:{color:isDark?'#aaa':'#666'}},
        yAxis:{type:'value',name:yF,axisLabel:{color:isDark?'#aaa':'#666'}},
        legend:{show:true,textStyle:{color:isDark?'#ccc':'#333'}},
        series:colorGroups.map((grp,gi)=>({name:grp,type:'scatter',
          data:rows.filter(r=>String(r[colorField]||'')===grp).map(r=>({value:[r[xF]||0,r[yF]||0,r[sF]||0],__row:r})),
          symbolSize:isBubble?mkSym:8,itemStyle:{color:palette[gi%palette.length]},label:scatterLabel}))};
    } else {
      option={tooltip:{trigger:'item',formatter:p=>`${p.value[3]}<br/>${xF}: ${tblFmtNum(p.value[0])}<br/>${yF}: ${tblFmtNum(p.value[1])}${sizeFieldName?`<br/>${sizeFieldName}: ${tblFmtNum(p.value[2])}`:''}` },
        xAxis:{type:'value',name:xF,axisLabel:{color:isDark?'#aaa':'#666'}},yAxis:{type:'value',name:yF,axisLabel:{color:isDark?'#aaa':'#666'}},
        series:[{type:'scatter',data:rows.map(r=>({value:[r[xF]||0,r[yF]||0,r[sF]||0,isCrossTab?getRowVal(r):String(r[labelField]||'')],__row:r})),
          symbolSize:isBubble?mkSym:8,itemStyle:{color:p=>palette[p.dataIndex%palette.length]},label:scatterLabel}]};
    }
  } else if (type==='heatmap') {
    /* 히트맵: X=col 필드 또는 colorField, Y=row 필드 */
    const xField = isCrossTab ? null : (colorFieldName&&groupBy.includes(colorFieldName)?colorFieldName:groupBy[1]||groupBy[0]||'');
    const yField = isCrossTab ? null : (groupBy[0]||'');
    const xVals = isCrossTab ? [...new Set(rows.map(getColVal))] : [...new Set(rows.map(r=>String(r[xField]||'')))];
    const yVals = isCrossTab ? [...new Set(rows.map(getRowVal))] : [...new Set(rows.map(r=>String(r[yField]||'')))];
    if (_chronoOK) {
      if ((isCrossTab && colFields.every(f=>_dateDims.has(f))) || (!isCrossTab && xField && _dateDims.has(xField))) xVals.sort();
      if ((isCrossTab && rowFields.every(f=>_dateDims.has(f))) || (!isCrossTab && yField && _dateDims.has(yField))) yVals.sort();
    }
    const hData = rows.map(r=>[
      xVals.indexOf(isCrossTab?getColVal(r):String(r[xField]||'')),
      yVals.indexOf(isCrossTab?getRowVal(r):String(r[yField]||'')),
      r[meas]||0
    ]);
    const maxV=Math.max(...hData.map(d=>d[2]),1);
    option={tooltip:{position:'top',formatter:p=>`${xVals[p.data[0]]} / ${yVals[p.data[1]]}<br/>${meas}: ${tblFmtNum(p.data[2])}`},
      xAxis:{type:'category',data:xVals,axisLabel:{rotate:45,color:isDark?'#aaa':'#666'}},yAxis:{type:'category',data:yVals,axisLabel:{color:isDark?'#aaa':'#666'}},
      visualMap:{min:0,max:maxV,calculable:true,orient:'horizontal',bottom:5,left:'center',inRange:{color:[hexA(cc.accent,0.08),hexA(cc.accent,0.55),cc.accent]},textStyle:{color:isDark?'#aaa':'#666'}},
      series:[{type:'heatmap',data:hData,label:{show:true,formatter:p=>tblFmtNum(p.data[2])},emphasis:{itemStyle:{shadowBlur:10}}}]};
  } else if (type==='treemap') {
    /* 트리맵: colorField가 있으면 상위 그룹 → 하위 항목 구조 */
    let tmData;
    if (!isCrossTab && colorField && labelField) {
      const colorGroups=[...new Set(rows.map(r=>String(r[colorField]||'')))];
      tmData=colorGroups.map((grp,gi)=>({
        name:grp,
        value:rows.filter(r=>String(r[colorField]||'')===grp).reduce((s,r)=>s+(r[meas]||0),0),
        itemStyle:{color:palette[gi%palette.length]},
        children:rows.filter(r=>String(r[colorField]||'')===grp).map(r=>({name:String(r[labelField]||''),value:r[meas]||0}))
      }));
    } else {
      tmData=rows.map(r=>({name:isCrossTab?getColVal(r):String(r[labelField]||''),value:r[meas]||0}));
    }
    option={tooltip:{formatter:p=>`${p.name}: ${tblFmtNum(p.value)}`},
      series:[{type:'treemap',data:tmData,label:{show:true,formatter:p=>`${p.name}\n${tblFmtNum(p.value)}`},levels:[{itemStyle:{borderWidth:2}}]}]};
  } else if (type==='waterfall') {
    /* 폭포수: colorField가 있으면 색상으로 구분 */
    const wfLabels = isCrossTab ? rows.map(getColVal) : rows.map(r=>String(r[labelField]||''));
    const wfVals=rows.map(r=>r[meas]||0);
    const helperArr=wfVals.map((_,i)=>i===0?0:wfVals.slice(0,i).reduce((s,v)=>s+v,0));
    const colorByGroup = colorField ? rows.map(r=>{ const g=String(r[colorField]||''); const groups=[...new Set(rows.map(r2=>String(r2[colorField]||'')))]; return palette[groups.indexOf(g)%palette.length]; }) : null;
    option={tooltip:{trigger:'axis'},
      xAxis:{type:'category',data:wfLabels,axisLabel:{color:isDark?'#aaa':'#666'}},
      yAxis:{type:'value',axisLabel:{color:isDark?'#aaa':'#666',formatter:v=>tblFmtNum(v)}},
      series:[{type:'bar',stack:'wf',data:helperArr.map(v=>({value:v,itemStyle:{opacity:0}})),tooltip:{show:false}},
        {type:'bar',stack:'wf',data:wfVals,
          itemStyle:{color:p=>colorByGroup?colorByGroup[p.dataIndex]:(wfVals[p.dataIndex]>=0?cc.positive:cc.negative)},
          label:{show:true,position:'top',formatter:p=>tblFmtNum(p.value)}}]};
  } else {
    const isLine=type==='line'||type==='area'||type==='stacked_area';
    const isStacked=type==='stacked_bar'||type==='stacked_area';
    const isArea=type==='area'||type==='stacked_area';
    const isCombo=type==='combo';
    let series=[];
    if (isCrossTab) {
      const rowGroups=[...new Set(rows.map(getRowVal))];
      if (_chronoOK && rowFields.length && rowFields.every(f=>_dateDims.has(f))) rowGroups.sort();
      /* 행 차원이 고카디널리티(>30)이고 열이 소수(≤15)면 인코딩 교환:
         X축=행(줌으로 탐색), 시리즈=열 — 시리즈 수백 개로 색이 무의미해지는 것을 방지 */
      const flipEncoding = rowGroups.length > 30 && labels.length <= 15;
      const xCats   = flipEncoding ? rowGroups : labels;
      const serKeys = flipEncoding ? labels    : rowGroups;
      const getSerVal = flipEncoding ? getColVal : getRowVal;
      const getCatVal = flipEncoding ? getRowVal : getColVal;
      serKeys.forEach((grp,gi)=>{
        const gRows=rows.filter(r=>getSerVal(r)===grp);
        const data=xCats.map(cat=>{const r=gRows.find(r=>getCatVal(r)===cat);return {value:r?(r[meas]||0):0, __row:r||null};});
        const t=isCombo&&gi>0?'line':(isLine?'line':'bar');
        series.push({name:grp,type:t,data,stack:isStacked?'total':undefined,areaStyle:isArea?{}:undefined,smooth:isLine,itemStyle:{color:palette[gi%palette.length]},label:mkDataLabel(isStacked?'inside':'top')});
      });
      labels = xCats;
    } else if (colorField) {
      /* 색상 필드별 시리즈 분리 */
      const colorGroups=[...new Set(rows.map(r=>String(r[colorField]||'')))];
      series=colorGroups.map((grp,gi)=>{
        const gRows=rows.filter(r=>String(r[colorField]||'')===grp);
        const data=labels.map(lb=>{const r=gRows.find(r=>String(r[labelField]||'')===lb);return {value:r?(r[meas]||0):0, __row:r||null};});
        const t=isCombo&&gi>0?'line':(isLine?'line':'bar');
        return{name:grp,type:t,data,stack:isStacked?'total':undefined,areaStyle:isArea?{}:undefined,smooth:isLine,itemStyle:{color:palette[gi%palette.length]},label:mkDataLabel(isStacked?'inside':'top')};
      });
    } else {
      /* 측정값별 시리즈 (colorFieldName === labelField 이면 항목별 색상 개별 지정) */
      colorByItem = !!(colorFieldName && !colorField);
      measures.forEach((m,mi)=>{
        const t=isCombo&&mi>0?'line':(isLine?'line':'bar');
        const data = colorByItem
          ? rows.map((r,i)=>({value:r[m]||0, __row:r, itemStyle:{color:palette[i%palette.length]}}))
          : rows.map(r=>({value:r[m]||0, __row:r}));
        const s = {name:m,type:t,data,stack:isStacked?'total':undefined,areaStyle:isArea?{}:undefined,smooth:isLine,yAxisIndex:isCombo&&mi>0?1:0,label:mkDataLabel(isStacked?'inside':'top')};
        if (!colorByItem) s.itemStyle = {color:palette[mi%palette.length]};
        series.push(s);
      });
    }
    const yAxes=isCombo&&measures.length>1
      ?[{type:'value',axisLabel:{color:isDark?'#aaa':'#666',formatter:v=>tblFmtNum(v)}},{type:'value',alignTicks:true,axisLabel:{color:isDark?'#aaa':'#666',formatter:v=>tblFmtNum(v)}}]
      :[{type:'value',axisLabel:{color:isDark?'#aaa':'#666',formatter:v=>tblFmtNum(v)}}];
    option={tooltip:mkDetailTooltip({trigger:'axis'}),legend:{show:series.length>1,textStyle:{color:isDark?'#ccc':'#333'}},
      grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},
      xAxis:{type:'category',data:labels,axisLabel:{color:isDark?'#aaa':'#666',rotate:labels.length>12?30:0}},
      yAxis:yAxes,series};
  }
  /* ── 평균 기준선 (showRefLine) ── */
  if (cfg.showRefLine && option.series && option.series.length) {
    option.series.forEach(s => {
      if (s.type === 'bar' || s.type === 'line') {
        s.markLine = s.markLine || {};
        s.markLine.silent = true;
        s.markLine.label = {formatter: p => '평균 ' + tblFmtNum(p.value)};
        s.markLine.lineStyle = {type:'dashed', color:cc.amber, width:1.5};
        s.markLine.data = (s.markLine.data||[]).concat([{type:'average'}]);
      }
    });
  }

  /* ── 테이블 계산 yAxis 포맷 ── */
  if (cfg.tableCalcs && option.yAxis) {
    const hasPct = Object.values(cfg.tableCalcs||{}).some(v=>v==='pct_total');
    if (hasPct) {
      const axes = Array.isArray(option.yAxis) ? option.yAxis : [option.yAxis];
      axes.forEach(a => { a.axisLabel = {...(a.axisLabel||{}), formatter: v => v.toFixed(1)+'%'}; });
    }
  }

  /* ── 고카디널리티 가독성 보정 ── */
  const nSeries = (option.series||[]).length;
  const nLegend = (type==='pie'||type==='donut') ? rows.length : nSeries;
  const axisCats = (option.xAxis && !Array.isArray(option.xAxis) && option.xAxis.type==='category' && option.xAxis.data) ? option.xAxis.data.length : 0;
  /* 범례: 13개 이상 스크롤, 40개 초과 숨김 (툴팁으로 식별) */
  if (option.legend && option.legend.show !== false) {
    if (nLegend > 40) option.legend.show = false;
    else if (nLegend > 12) {
      if (type==='pie'||type==='donut') Object.assign(option.legend, {type:'scroll'});
      else Object.assign(option.legend, {type:'scroll', top:0});
    }
  }
  /* 축 카테고리 30개 초과: 상위 30개 창 + 줌 슬라이더로 탐색 */
  if (axisCats > 30 && type!=='heatmap') {
    option.dataZoom = [
      {type:'inside', start:0, end:Math.max(100*30/axisCats, 3)},
      {type:'slider', height:16, bottom:6, brushSelect:false, start:0, end:Math.max(100*30/axisCats, 3)}
    ];
    option.grid = {...(option.grid||{}), bottom:'13%'};
  }
  /* 시리즈 20개 초과: axis 툴팁이 화면을 덮으므로 개별(item) 툴팁으로 */
  if (nSeries > 20 && option.tooltip && option.tooltip.trigger === 'axis') option.tooltip.trigger = 'item';

  /* ── 프리미엄 공통 스타일: 폰트·모션·바 라운딩·라인 두께 ── */
  option.textStyle = {fontFamily:"'Pretendard Variable',Pretendard,-apple-system,sans-serif", ...(option.textStyle||{})};
  option.animationDuration = 450;
  option.animationEasing = 'cubicOut';
  if (option.tooltip) option.tooltip = {confine:true, ...option.tooltip};
  (option.series||[]).forEach(s=>{
    if (s.type==='bar' && !s.stack) s.itemStyle = {borderRadius:[5,5,0,0], ...(s.itemStyle||{})};
    if (s.type==='line') { s.lineStyle = {width:2.5, ...(s.lineStyle||{})}; if (s.symbolSize===undefined) s.symbolSize = 6; }
  });

  if (isDark) option.backgroundColor='transparent';
  inst.setOption(option);

  /* 범례 클릭은 ECharts 기본 클라이언트 토글 사용 (SQL 필터 미연동 — 가역성 보장) */

  /* resize 리스너 단일 등록 (렌더마다 누적 방지) */
  if (!state.tableau._resizeBound) {
    state.tableau._resizeBound = true;
    window.addEventListener('resize', () => {
      const i = state.tableau.echartsInst;
      if (i && !i.isDisposed()) i.resize();
    });
  }
}

function tblRenderPivot(viz, result, cfg){
  const measures=result.measures||[], groupBy=result.group_by||[];
  const rowFields=result.row_fields||[], colFields=result.col_fields||[];
  const isCrossTab = rowFields.length>0 && colFields.length>0;
  if (!result.rows.length){viz.innerHTML='<div class="tbl-viz-empty"><p>데이터 없음</p></div>';return;}
  const fieldSorts = Array.isArray(cfg.fieldSorts)?cfg.fieldSorts:[];
  const fieldSortsEmpty = fieldSorts.length===0;
  const cs = state.tableau.pivotClientSort;

  /* ─── 정렬 인디케이터 헬퍼 ─── */
  const sortInd = (isActive, dir, priority, total) => {
    if (!isActive) return `<span class="tbl-sort-ind">⇅</span>`;
    const num = total>1&&priority>=0 ? `<sup style="font-size:7px">${priority+1}</sup>` : '';
    return `<span class="tbl-sort-ind active">${num}${dir==='asc'?'↑':'↓'}</span>`;
  };

  if (isCrossTab) {
    /* ─── 크로스탭 매트릭스 ─── */
    const getRowKey = r => rowFields.map(f=>String(r[f]??'')).join(' · ');
    const getColKey = r => colFields.map(f=>String(r[f]??'')).join(' · ');
    const rawRowKeys = [...new Set(result.rows.map(getRowKey))];
    const colKeys    = [...new Set(result.rows.map(getColKey))];
    /* 날짜 차원 열은 기본 시간순 (명시적 정렬이 없을 때) */
    const _pDateDims = new Set((state.tableau.fields && state.tableau.fields.date_dims) || []);
    if (fieldSortsEmpty && !(cfg.topN && cfg.topN.n) && colFields.every(f=>_pDateDims.has(f))) colKeys.sort();
    const meas = measures[0]||'';
    const dataMap = {};
    result.rows.forEach(r => {
      const rk=getRowKey(r), ck=getColKey(r);
      if (!dataMap[rk]) dataMap[rk]={};
      if (!dataMap[rk][ck]) dataMap[rk][ck]={};
      measures.forEach(m => { dataMap[rk][ck][m]=(dataMap[rk][ck][m]||0)+(r[m]||0); });
    });
    /* 클라이언트 정렬 적용 */
    const getTotal = rk => measures.reduce((s,m)=>s+colKeys.reduce((ss,ck)=>ss+((dataMap[rk]?.[ck]?.[m])||0),0),0);
    const getColSum= (rk,ck)=>measures.reduce((s,m)=>s+((dataMap[rk]?.[ck]?.[m])||0),0);
    let rowKeys = [...rawRowKeys];
    if (cs) {
      if (cs.type==='rowLabel')  rowKeys.sort((a,b)=>cs.dir==='asc'?a.localeCompare(b):b.localeCompare(a));
      else if (cs.type==='total') rowKeys.sort((a,b)=>cs.dir==='asc'?getTotal(a)-getTotal(b):getTotal(b)-getTotal(a));
      else if (cs.type==='col')   rowKeys.sort((a,b)=>cs.dir==='asc'?getColSum(a,cs.colKey)-getColSum(b,cs.colKey):getColSum(b,cs.colKey)-getColSum(a,cs.colKey));
    }
    const rowLabel = rowFields.join(' · ');
    viz.innerHTML='<div class="tbl-pivot-wrap"><table class="tbl-pivot-table" id="tblCrossTab"></table><div class="tbl-crosstab-info" id="tblCrossInfo"></div></div>';
    const tbl = $('#tblCrossTab');
    const info = $('#tblCrossInfo');
    if (info) info.textContent = `${rowKeys.length}행 × ${colKeys.length}열`;
    /* 헤더 생성 */
    const thead = tbl.createTHead();
    const hrow1 = thead.insertRow();
    /* 행 레이블 헤더 */
    const thRow = document.createElement('th');
    thRow.classList.add('sortable');
    const rowLabelDir = cs?.type==='rowLabel'?cs.dir:null;
    thRow.innerHTML = rowLabel + sortInd(!!rowLabelDir, rowLabelDir, -1, 1);
    thRow.title = '행 기준 정렬';
    thRow.onclick = () => {
      const cur = state.tableau.pivotClientSort;
      if (cur?.type==='rowLabel') state.tableau.pivotClientSort = cur.dir==='asc'?{type:'rowLabel',dir:'desc'}:null;
      else state.tableau.pivotClientSort={type:'rowLabel',dir:'asc'};
      tblRenderViz();
    };
    hrow1.appendChild(thRow);
    if (measures.length>1) {
      thRow.setAttribute('rowspan','2');
      colKeys.forEach(ck=>{ const th=document.createElement('th');th.colSpan=measures.length;th.style.textAlign='center';th.classList.add('sortable');
        const colDir=cs?.type==='col'&&cs.colKey===ck?cs.dir:null;
        th.innerHTML=ck+sortInd(!!colDir,colDir,-1,1);th.title=`${ck} 기준 정렬`;
        th.onclick=()=>{const cur=state.tableau.pivotClientSort;if(cur?.type==='col'&&cur.colKey===ck)state.tableau.pivotClientSort=cur.dir==='asc'?{type:'col',colKey:ck,dir:'desc'}:null;else state.tableau.pivotClientSort={type:'col',colKey:ck,dir:'desc'};tblRenderViz();};
        hrow1.appendChild(th); });
      const thTotal=document.createElement('th');thTotal.colSpan=measures.length;thTotal.className='col-total sortable';
      const totDir=cs?.type==='total'?cs.dir:null;

          if(idx===-1)cfg.fieldSorts.push({field:col,dir:'asc'});
